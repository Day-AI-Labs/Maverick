# Maverick hosted demo — Render blueprint (Model 3: one-click cloud).
#
# Push this repo to GitHub, then in Render: New > Blueprint and point it at the
# repo. Render builds the single image from deploy/docker/Dockerfile and runs
# the dashboard. MAVERICK_DASHBOARD_TOKEN is generated for you; set your
# ANTHROPIC_API_KEY in the Render dashboard (marked sync:false so it is never
# committed).
#
# Your demo link is then:
#   https://<service-name>.onrender.com/?token=<MAVERICK_DASHBOARD_TOKEN>
# (copy the generated token from the service's Environment tab).
#
# Render auto-detects the listening port (8765) and routes 443 -> it with TLS.

services:
  - type: web
    name: maverick-demo
    runtime: docker
    repo: https://github.com/Day-AI-Labs/Maverick
    dockerfilePath: ./deploy/docker/Dockerfile
    dockerContext: .
    # The image ENTRYPOINT is `maverick`; this is the CMD appended to it, so the
    # container runs `maverick dashboard --host 0.0.0.0 --port 8765`.
    dockerCommand: dashboard --host 0.0.0.0 --port 8765
    healthCheckPath: /livez
    plan: starter
    autoDeploy: false
    envVars:
      - key: MAVERICK_DASHBOARD_TOKEN
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MAVERICK_BUDGET_DOLLARS
        value: "0.50"
      - key: MAVERICK_DASHBOARD_MAX_GOALS_PER_MIN
        value: "3"
      - key: MAVERICK_DASHBOARD_MAX_GOALS_GLOBAL_PER_MIN
        value: "10"
