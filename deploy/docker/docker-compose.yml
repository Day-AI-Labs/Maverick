# Maverick — docker compose stack.
#
# Spins up the agent in a container with persistent state mounted from
# the host. Useful for VPS deployments and for users who want isolation.
#
# First run:
#   docker compose -f deploy/docker/docker-compose.yml run --rm maverick init
#
# Subsequent runs:
#   docker compose -f deploy/docker/docker-compose.yml run --rm maverick start "..."

services:
  maverick:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: maverick:latest
    container_name: maverick
    # The image runs as the unprivileged "maverick" user (uid/gid 1000), so
    # state lives under /home/maverick/.maverick, not /root. Ensure the host
    # ${HOME}/.maverick dir is readable/writable by uid 1000.
    volumes:
      - ${HOME}/.maverick:/home/maverick/.maverick
      - ${HOME}/maverick-workspace:/workspace
    env_file:
      - ${HOME}/.maverick/.env
    environment:
      MAVERICK_CONFIG: /home/maverick/.maverick/config.toml
    stdin_open: true
    tty: true
