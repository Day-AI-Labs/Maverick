{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "maverick.secretName" . }}
  labels:
    {{- include "maverick.labels" . | nindent 4 }}
type: Opaque
{{- if .Values.secret.data }}
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
