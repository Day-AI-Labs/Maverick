{{- include "maverick.validate" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maverick.fullname" . }}
  labels:
    {{- include "maverick.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- if .Values.persistence.enabled }}
    type: Recreate          # RWO volume: tear down before re-attach
    {{- else }}
    type: RollingUpdate
    {{- end }}
  selector:
    matchLabels:
      {{- include "maverick.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "maverick.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: maverick
          image: {{ include "maverick.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["dashboard", "--host", "0.0.0.0", "--port", "{{ .Values.service.targetPort }}"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            {{- if eq .Values.worldModel.backend "postgres" }}
            - name: MAVERICK_WORLD_BACKEND
              value: "postgres"
            {{- if .Values.worldModel.postgres.rls }}
            - name: MAVERICK_PG_RLS
              value: "1"
            {{- end }}
            {{- end }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "maverick.secretName" . }}
          {{- if .Values.probes.enabled }}
          readinessProbe:
            httpGet: {path: "/", port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: "/", port: http}
            initialDelaySeconds: 15
            periodSeconds: 30
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: state
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "maverick.fullname" . }}-state
      {{- end }}
