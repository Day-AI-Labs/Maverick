# Default values for the maverick chart.
# Override with `helm install maverick ./deploy/helm/maverick -f my-values.yaml`.

image:
  repository: ghcr.io/day-ai-labs/maverick
  tag: ""              # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Dashboard listen port (the image's `dashboard` subcommand).
service:
  type: ClusterIP
  port: 80
  targetPort: 8765

# Replicas. IMPORTANT: SQLite is single-writer on a RWO volume, so keep this at
# 1 unless you have moved the world model to Postgres (see worldModel below).
# The chart refuses to render >1 replica without worldModel.backend=postgres.
replicaCount: 1

# Persistent state (~/.maverick). Required for the default SQLite backend.
persistence:
  enabled: true
  size: 10Gi
  accessMode: ReadWriteOnce
  storageClass: ""     # "" = cluster default
  # Mounted at the non-root user's home; do not change unless the image does.
  mountPath: /home/maverick/.maverick

# World-model backend. "sqlite" (default) pins replicaCount to 1. Set to
# "postgres" + provide a DSN (via secret) to scale horizontally.
worldModel:
  backend: sqlite      # sqlite | postgres
  # When backend=postgres, the DSN is read from env MAVERICK_PG_DSN, sourced
  # from the secret below (key: MAVERICK_PG_DSN). Enable Postgres row-level
  # security for DB-enforced tenant isolation.
  postgres:
    rls: true

# Secrets. Provide provider keys / tokens here (chart creates a Secret) OR set
# create=false and reference an existing Secret by name.
secret:
  create: true
  name: ""             # defaults to <fullname>-secrets
  # Key/value pairs rendered into the Secret (base64-encoded by Helm).
  # e.g. ANTHROPIC_API_KEY, MAVERICK_DASHBOARD_TOKEN, MAVERICK_PG_DSN.
  data: {}
  #   ANTHROPIC_API_KEY: sk-ant-...
  #   MAVERICK_DASHBOARD_TOKEN: <strong-random>

# Extra plain (non-secret) env vars.
env: {}
#   MAVERICK_TENANT_BY_USER: "1"

# Enterprise (regulated-deployment) hardening. Off by default: the kernel runs
# fail-open and cloud-capable unless you opt in. When required=true the chart
# sets MAVERICK_REQUIRE_ENTERPRISE=1 so the dashboard refuses to start unless the
# data-boundary guarantees actually hold (egress lock, at-rest sealing, audit
# signing). Turn the boundary ON separately via the enterprise config / its env
# (e.g. env.MAVERICK_ENTERPRISE: "1" + a self-hosted provider); requiring the
# preflight without enabling the boundary is exactly the misconfiguration this
# gate is meant to catch.
enterprise:
  # Deployment posture (MAVERICK_PROFILE). "enterprise" (the default for this
  # chart — a server deployment is the regulated path) turns the data boundary ON
  # by default: the egress lock pins every LLM call to a self-hosted/allow-listed
  # provider, consent fails closed, and capabilities are enforced. This means you
  # MUST configure a local/self-hosted provider (ollama / vllm / tgi) or an
  # allow-listed endpoint, otherwise cloud LLM calls are refused by design. Set to
  # "standard" to run fail-open and cloud-capable (e.g. a quick non-regulated pilot
  # with a hosted Anthropic key). Any explicit [enterprise] knob still wins.
  profile: enterprise
  required: false

# Pod/container security. Matches the image: unprivileged uid/gid 1000.
# Satisfies the restricted Pod Security Standard.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false   # workspace + sqlite need writes under $HOME
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Liveness/readiness hit the deep health endpoints (/livez, /readyz) which
# verify DB writability and provider config — not the HTML root, which returns
# 200 even when the instance is degraded. The dashboard has its own auth; do not
# expose it without TLS — front with your Ingress/Gateway.
probes:
  enabled: true

# Grace period for in-flight goals to finish on SIGTERM (rolling upgrade, node
# drain). Paired with a preStop sleep so the LB deregisters first.
terminationGracePeriodSeconds: 30

# PodDisruptionBudget. Gates voluntary disruptions (node drains, upgrades). With
# the default single replica + Recreate strategy a PDB cannot prevent downtime,
# so it is off by default; enable it once you run multiple replicas on Postgres.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Horizontal Pod Autoscaler. Off by default and only valid on the Postgres
# backend: the default SQLite backend is single-writer on a RWO volume, so the
# chart hard-fails if you enable this without worldModel.backend=postgres. When
# enabled the Deployment stops pinning replicas (the HPA owns the count).
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: ""   # "" = omit the memory metric

# NetworkPolicy. Default-deny ingress except to the dashboard port, and (when
# restrictEgress=true) deny egress to RFC1918/link-local ranges to blunt SSRF to
# cloud metadata while still allowing DNS + public LLM/provider egress.
networkPolicy:
  enabled: false
  restrictEgress: false

# Prometheus Operator ServiceMonitor for /metrics. /metrics is bearer-gated when
# a dashboard token is set, so the scrape must authenticate — this wires the
# bearer from a secret. Requires the Prometheus Operator CRDs to be installed.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  # Secret + key holding the dashboard bearer token used to scrape /metrics.
  # Leave name empty to use the chart's own secret.
  bearerTokenSecret:
    name: ""
    key: MAVERICK_DASHBOARD_TOKEN

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: maverick.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
