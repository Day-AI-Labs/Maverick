# Maverick on Fly.io — reference architecture.
#
#   fly launch --copy-config --no-deploy   # then review
#   fly volumes create maverick_state --size 10
#   fly secrets set ANTHROPIC_API_KEY=... MAVERICK_DASHBOARD_TOKEN=...
#   fly deploy
#
# The dashboard/control plane is single-writer on SQLite; keep one machine
# (or move [world_model] to Postgres before scaling out).
app = "maverick"
primary_region = "iad"

[build]
  dockerfile = "../../docker/Dockerfile"

[env]
  MAVERICK_CONFIG = "/state/config.toml"

[experimental]
  cmd = ["dashboard", "--host", "0.0.0.0", "--port", "8765"]

[[mounts]]
  source = "maverick_state"
  destination = "/state"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "get"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
