# Maverick on Fly.io — minimal reference architecture.
#
#   fly launch --no-deploy --copy-config \
#     --config deploy/reference-architectures/fly/fly.toml
#   fly volumes create maverick_state --size 10
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...
#   fly deploy
#
# One machine + one volume; the dashboard listens on 8765 and Fly's proxy
# terminates TLS. Scale stays at 1 while state is SQLite on the volume.

app = "maverick"
primary_region = "iad"

[build]
  dockerfile = "../../docker/Dockerfile"

[processes]
  app = "dashboard --host 0.0.0.0 --port 8765"

[mounts]
  source = "maverick_state"
  destination = "/root/.maverick"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "off"     # the runtime schedules background goals
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
