name: Compliance Posture

# Standing SOC 2 / ISO 27001 posture gate.
#
# Applies the hardened reference deployment config
# (docs/compliance/deployment/compliant-config.toml) and asserts that
# `maverick soc2` reports a compliant-ready posture: every required control
# `enabled`, the audit chain `ok`, and a signing key present. The collector's
# own gate (`_soc2_posture_ready`) exits non-zero otherwise, failing this job.
#
# Purpose — this is a REGRESSION GATE, not a check of a live production system
# (CI cannot reach prod). It proves that the documented compliant config + the
# evidence collector still produce a green posture, so a code/config change can't
# silently break a customer's ability to pass the gate. (It would have caught the
# off-host-key false-negative fixed alongside it.) To gate an actual deployment,
# run docs/compliance/deployment/verify-posture.sh on the deployment host (or
# point this same job at a self-hosted runner in the prod environment).
#
# The audit signing key here is an EPHEMERAL throwaway generated in-job, standing
# in for the KMS/secrets-manager key a real deployment injects via
# MAVERICK_AUDIT_SIGNING_KEY. It is used only to initialize the signed chain and
# is never persisted.

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * 1" # weekly, Monday 06:23 UTC (off the :00 mark)
  pull_request:
    paths:
      - "packages/maverick-core/maverick/soc2.py"
      - "packages/maverick-core/maverick/cli/_compliance_groups.py"
      - "packages/maverick-core/maverick/audit/**"
      - "packages/maverick-core/maverick/capability.py"
      - "packages/maverick-core/maverick/quotas.py"
      - "packages/maverick-core/maverick/oidc.py"
      - "packages/maverick-core/maverick/crypto_at_rest.py"
      - "packages/maverick-core/maverick/paths.py"
      - "packages/maverick-core/maverick/deployment.py"
      - "docs/compliance/deployment/compliant-config.toml"
      - ".github/workflows/compliance-posture.yml"
  push:
    branches: [main]
    paths:
      - "packages/maverick-core/maverick/soc2.py"
      - "packages/maverick-core/maverick/cli/_compliance_groups.py"
      - "packages/maverick-core/maverick/audit/**"
      - "packages/maverick-core/maverick/capability.py"
      - "packages/maverick-core/maverick/quotas.py"
      - "packages/maverick-core/maverick/oidc.py"
      - "packages/maverick-core/maverick/crypto_at_rest.py"
      - "packages/maverick-core/maverick/paths.py"
      - "packages/maverick-core/maverick/deployment.py"
      - "docs/compliance/deployment/compliant-config.toml"
      - ".github/workflows/compliance-posture.yml"

jobs:
  posture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install maverick-core
        # The soc2 collector + CLI live entirely in maverick-core; no sibling
        # packages are needed to evaluate posture.
        run: pip install -e ./packages/maverick-core
      - name: Apply the hardened compliant config
        run: |
          mkdir -p ~/.maverick
          cp docs/compliance/deployment/compliant-config.toml ~/.maverick/config.toml
      - name: Initialize the signed audit chain (ephemeral off-host key)
        # Enterprise mode REQUIRES an off-host signing key (no local-disk key).
        # Generate a throwaway one, inject it via the env var a real deployment
        # would source from KMS, and write one signed event so the chain is
        # non-empty. The key lives only in this step's shell; the gate step below
        # verifies via the on-disk public key + `.injected` marker, no private key.
        run: |
          export MAVERICK_AUDIT_SIGNING_KEY="$(python -c 'import os;print(os.urandom(32).hex())')"
          python -c "from maverick.audit import record, EventKind; assert record(EventKind.GOAL_START, agent='ci-posture', title='posture gate init'), 'failed to write signed audit event'"
      - name: SOC 2 posture gate (maverick soc2 must be compliant-ready)
        # `maverick soc2` exits non-zero unless all required controls are
        # `enabled`, audit_log is `ok`, and a signing key is present. Capture the
        # JSON as evidence and surface it in the job summary, then enforce.
        run: |
          maverick soc2 --json > soc2-evidence.json || true
          python -m json.tool soc2-evidence.json || true
          {
            echo '### Compliance posture snapshot'
            echo '```json'
            cat soc2-evidence.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Enforcing the gate..."
          maverick soc2 > /dev/null
      - name: Upload evidence snapshot
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: soc2-evidence
          path: soc2-evidence.json
          if-no-files-found: warn
