name: Desktop bundle

# Builds the native Maverick installer (Tauri) for macOS, Windows, and
# Linux. On a version tag (`v*`) the installers are attached to that
# GitHub release, so end users can download and double-click them
# without a GitHub login.
#
# The app needs no prerequisites: pressing "Install Maverick" runs the
# same bootstrap as the one-line installers (it installs Python +
# Maverick for the user).
#
# Status: UNSIGNED. First launch trips SmartScreen (Windows) / Gatekeeper
# (macOS) with an "unknown developer" prompt. Code signing + notarization
# are gated on an Apple Developer Program membership + a Windows signing
# cert.

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'
      - 'desktop-v*'

jobs:
  bundle:
    permissions:
      contents: write   # attach installers to the release on a v* tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/installer-desktop
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux bundle deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.11.1 --activate

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/installer-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/installer-desktop/src-tauri/Cargo.toml') }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate icon variants from source icon
        # Turns the committed src-tauri/icons/icon.png into the
        # platform-specific 32x32 / 128x128 / icns / ico the bundler
        # expects (referenced in tauri.conf.json).
        run: pnpm tauri icon src-tauri/icons/icon.png

      - name: Build bundle (unsigned)
        run: pnpm tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: maverick-desktop-${{ matrix.target }}
          path: |
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.app
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.msi
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.exe
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: warn

      - name: Attach installers to the release (on v* tags)
        # Publish the built installers to the GitHub release for this tag
        # so they're downloadable without a login. softprops appends to
        # the existing release that publish.yml / release.yml create.
        # .app is a directory, not a file, so it's intentionally excluded.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.msi
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.exe
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
