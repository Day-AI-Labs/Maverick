name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install 'ruff>=0.5'
      - name: Lint
        # Also enforces the C901 cyclomatic-complexity ceiling (max 20, see
        # pyproject [tool.ruff.lint.mccabe]). Functions already over it carry
        # an explicit `# noqa: C901`; new over-complex code fails here.
        run: python -m ruff check .
      - name: Dead-code scan (vulture)
        # Catches unused parameters / module-level symbols that ruff's
        # F401/F841 don't (e.g. a vestigial function arg nothing passes).
        # Config + paths + the 80% confidence floor live in pyproject
        # [tool.vulture]; the repo is clean at that floor, so any new finding
        # fails the gate. Add a real false positive to [tool.vulture]
        # ignore_names rather than lowering the floor.
        run: |
          python -m pip install 'vulture>=2.11'
          python -m vulture
      - name: Reject bare `import tomllib` (3.11+ stdlib without 3.10 fallback)
        # Three PRs in a row broke CI on Python 3.10 by importing tomllib
        # without the documented tomli fallback. Catch it here so the
        # mistake fails the lint job in seconds, not 5 minutes into the
        # test matrix on the slowest interpreter.
        #
        # Column-0 match only: the legit pattern indents the import
        # inside a try-block, so anything at column 0 is the mistake.
        run: |
          if grep -rn --include='*.py' -E '^import[[:space:]]+tomllib([[:space:]]|$)' apps packages benchmarks; then
            echo ""
            echo "ERROR: bare 'import tomllib' found above. tomllib is 3.11+ stdlib."
            echo "Use the try/except fallback documented in CLAUDE.md."
            exit 1
          fi
      - name: Confine `shell=True` to the sandbox backends (CLAUDE.md rule 4)
        # Security boundary: tools must never call subprocess with shell=True
        # directly -- model-generated input goes through sandbox.exec(), the
        # single chokepoint that applies the configured backend AND the
        # secret-scrubbed env. A shell=True anywhere else is a command-
        # injection / unsandboxed-exec foothold. The only legitimate
        # occurrence is the LocalBackend itself under maverick/sandbox/.
        run: |
          hits="$(grep -rn --include='*.py' 'shell=True' apps packages \
                  | grep -v '/sandbox/' | grep -v '/tests/' || true)"
          if [ -n "$hits" ]; then
            echo "$hits"
            echo ""
            echo "ERROR: shell=True outside maverick/sandbox/. Route shell through"
            echo "sandbox.exec() (CLAUDE.md rule 4), or move the call into a sandbox"
            echo "backend. If genuinely required, add it to this grep's allowlist"
            echo "with a justification."
            exit 1
          fi
      - name: Secret scan (detect-secrets, no new secrets vs audited baseline)
        # Source-hygiene gate: catches an API key / token / private key
        # accidentally committed to ANY tracked file -- tests included, which
        # is exactly where a real key tends to get pasted by mistake. Every
        # current finding was hand-audited and is a placeholder, a public
        # constant (e.g. X's web-client bearer), AWS's docs example key, or a
        # deliberately-fake redaction-test fixture; all are recorded by hash in
        # .secrets.baseline. Lockfiles are excluded (dependency-hash churn) via
        # the baseline's recorded filter.
        #
        # We re-scan into a throwaway copy of the baseline and fail only when a
        # NEW (file, secret-hash) pair appears. Comparing by HASH -- not via the
        # `detect-secrets-hook` line-number sync, which exits non-zero whenever
        # an unrelated edit shifts a known fixture's line -- means only a
        # genuinely new secret trips the gate, never code movement.
        #
        # To clear a real false positive: add an inline `pragma: allowlist
        # secret` comment at the line (preferred), or re-audit the baseline with
        # `detect-secrets scan --baseline .secrets.baseline` and commit it.
        run: |
          python -m pip install 'detect-secrets>=1.5'
          cp .secrets.baseline /tmp/scan.baseline
          detect-secrets scan --baseline /tmp/scan.baseline
          python3 - <<'PY'
          import json, sys
          old = json.load(open(".secrets.baseline"))["results"]
          new = json.load(open("/tmp/scan.baseline"))["results"]
          pairs = lambda r: {(f, i["hashed_secret"]) for f, items in r.items() for i in items}
          extra = sorted(pairs(new) - pairs(old))
          if extra:
              print("ERROR: new secret(s) not in the audited .secrets.baseline:")
              for f, h in extra:
                  print(f"  {f}  (sha1 {h[:16]}...)")
              print("")
              print("If real: remove and ROTATE it. If a false positive: add an inline")
              print("`pragma: allowlist secret` comment, or re-audit the baseline via")
              print("`detect-secrets scan --baseline .secrets.baseline` and commit it.")
              sys.exit(1)
          print("detect-secrets: no new secrets vs audited baseline")
          PY
      - name: Plugin compatibility matrix (no enabled plugin may be API-incompatible)
        # Inspects every installed maverick entry point's manifest against
        # SUPPORTED_API_MAJORS + the permission grants. In this repo's CI the
        # install is plugin-free, so this validates the gate machinery; a
        # deployment pipeline runs the same command against its real install.
        run: |
          pip install -e ./packages/maverick-core -q
          python -m maverick.plugin_matrix --ci
      - name: Specialist catalog gate (1,000 packs, zero envelope errors)
        # Every domain pack must keep a non-empty tool allowlist, a valid
        # risk ceiling, a working persona, and its deny list -- the honest-
        # counting receipt behind the catalog claim. Errors fail the build.
        run: maverick domains-lint --ci
      - name: Sunset gate (past-due deprecations must be removed)
        # The deprecation registry (maverick/deprecations.py) records every
        # deprecated path with its removal version. Once the package version
        # reaches an entry's remove_in, this fails until the old path AND its
        # registry entry are deleted together -- deprecations can't rot.
        run: python -m maverick.deprecations --ci
      - name: gRPC API v1 stability contract (no breaking proto changes)
        # Parses maverick.proto into a structural inventory and diffs it
        # against the committed golden: additive changes pass, removals /
        # renumbers / type changes / rpc-shape changes fail. Breaking the v1
        # contract requires a maverick.v2 package, not an edit.
        run: python -m maverick.grpc_api.contract --check
      - name: Accessibility audit (static WCAG pass over dashboard templates)
        # Offline structural a11y checks (img alt, form labels, lang, focus
        # order, heading levels) over the shipped HTML — keeps the dashboard
        # from regressing on the basics without a browser/Node. Complements
        # the live `a11y` tool (pa11y/axe).
        run: python -m maverick.a11y_audit --ci
      - name: Failure-policy gate (audit-subsystem broad excepts are classified)
        # Requires every broad `except` in maverick/audit/* to declare its
        # failure mode (# failure-policy: fail_closed | fail_soft_with_audit |
        # best_effort) so a silently-swallowed error in the tamper-evident audit
        # log can't ship unreviewed. Narrowly scoped to audit integrity (not a
        # codebase-wide except sweep; bugbear stays off). See failure_policy.py.
        run: python -m maverick.failure_policy --ci
      - name: Schema-migration gate (no unreviewed/unsafe world-model migrations)
        # Lints world_model.MIGRATIONS: fails if a migration is malformed or an
        # unclassifiable SQL shape, so a new migration can't ship without being
        # reviewed for online/offline (hot-deploy) safety. Pure offline
        # SQL-shape check, no DB. See maverick/schema_migrations.py.
        run: python -m maverick.schema_migrations --ci
      - name: Migration governance gate (released migrations are immutable)
        # Fingerprints both backend ladders (SQLite + Postgres) and diffs them
        # against the committed migrations.lock.json: editing/removing a
        # released migration fails (it would diverge already-migrated DBs), a
        # new destructive (DROP/RENAME) migration fails, and the two backends
        # must stay at the same declared head. Add a migration -> regenerate the
        # lock (`python -m maverick.migration_governance --regen`) so the change
        # is reviewed. Pure offline check, no DB. See migration_governance.py.
        run: python -m maverick.migration_governance --ci
      - name: Evaluator-anchor governance gate (released anchors are immutable)
        # Pins every evaluator ground-truth anchor's checksum in the committed
        # evaluator_anchors.lock.json: editing a released anchor's labels or
        # dropping one fails (it invalidates every evaluator promotion judged
        # against the old ground truth), and a new anchor must be locked so the
        # addition is reviewed. The anchor is the guardrail for evaluator
        # co-evolution -- a weak or mutable anchor launders drift. Add an anchor
        # -> regenerate the lock (`python -m maverick.evaluator_evolution
        # --regen`). Pure offline check. See evaluator_evolution.py.
        run: python -m maverick.evaluator_evolution --ci
      - name: Control/data-plane e2e (goals provably run out-of-process)
        # Drives the real QueueDispatcher -> SQLite JobQueue -> Worker ->
        # shared WorldModel path end-to-end (no Redis/gRPC) and fails if the
        # split doesn't hold: the control plane must only enqueue (goal stays
        # pending), a separate worker must claim+execute, and the terminal
        # status must flow back through the shared store. Agent execution is
        # stubbed at the LLM boundary. See control_data_plane_e2e.py.
        run: python -m maverick.control_data_plane_e2e --ci
      - name: Control/data-plane soak (concurrent dispatch holds: zero-loss, exactly-once)
        # Drives many goals through the real QueueDispatcher -> SQLite JobQueue
        # -> a pool of concurrent Workers and fails if the substrate doesn't
        # hold under contention: every goal must reach 'done' exactly once (a
        # duplicate means JobQueue.claim's pending->running guard is broken =
        # double work/spend), nothing lost, queue drained clean. No Redis/gRPC;
        # execution stubbed at the LLM boundary. See control_data_plane_soak.py.
        run: python -m maverick.control_data_plane_soak --ci

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install packages (so pip-audit sees the real dependency tree)
        run: |
          set -x
          # Mirror the test job's install (minus pytest) so pip-audit audits
          # the actual resolved/installed dependencies, not an empty env.
          pip install -e ./packages/maverick-core
          pip install --no-deps -e ./packages/maverick-shield
          pip install --no-deps -e ./packages/maverick-channels
          pip install --no-deps -e ./packages/maverick-evolve
          pip install --no-deps -e ./packages/maverick-dashboard
          pip install --no-deps -e ./packages/maverick-mcp
          pip install --no-deps -e ./packages/maverick-knowledge
          pip install --no-deps -e ./apps/installer-cli
          pip install 'questionary>=2.0' 'rich>=13.7'
          # Install the network-facing deps at the patched floors declared in
          # the package extras, plus twilio (which pulls requests/urllib3), so
          # pip-audit sees the real surface we ship -- not a stale bare env.
          pip install 'fastapi>=0.110' 'uvicorn>=0.27' 'jinja2>=3.1' \
                      'httpx>=0.27' 'python-multipart>=0.0.27' \
                      'starlette>=1.0.1' 'requests>=2.33.0' 'urllib3>=2.7.0' \
                      'pillow>=12.2.0' 'twilio>=9.0'
      - name: pip-audit (known CVEs in dependencies)
        # BLOCKING: the dependency floors are now bumped past every CVE this
        # surfaced (pillow/python-multipart/requests/starlette/urllib3). A new
        # advisory should fail the build and prompt a floor bump -- that's the
        # whole point of the gate. Re-add `|| true` only as a temporary
        # measure if an upstream CVE lands with no fix available yet.
        run: |
          # The runner's default pip (26.1.1) is itself flagged by
          # PYSEC-2026-196; 26.1.2 patches it. Bump pip to the fixed floor
          # before auditing so the gate reflects our shipped dependency tree,
          # not a stale CVE in the runner's own tooling.
          python -m pip install --upgrade 'pip>=26.1.2'
          python -m pip install pip-audit
          pip-audit
      - name: SAST (bandit, high-severity)
        # BLOCKING static-analysis gate over shipped source (tests excluded:
        # asserts / subprocess there are expected). High-severity tests catch
        # the serious classes -- shell/command injection, weak crypto, insecure
        # deserialization, disabled TLS verification, bidi/trojan-source chars
        # (B613), etc. -- so a new instance fails the build. By-design findings
        # carry an inline `# nosec <id>` with justification. The shield's
        # invisible-char DETECTION patterns are written as \u escapes (not
        # literal bidi chars), so B613 runs with no skip. Tighten to medium
        # severity once the B608 false-positive parameterized-IN sites are
        # annotated.
        run: |
          python -m pip install 'bandit>=1.7'
          python -m bandit -q -r packages apps -lll -ii \
            -x '*/tests/*,*/test_*.py'
      - name: License policy (no strong-copyleft — GPL / AGPL / SSPL)
        # BLOCKING: a strong-copyleft dependency creates distribution
        # obligations incompatible with the proprietary license. Runs the
        # shipped scanner over the installed tree (the same env pip-audit saw).
        run: |
          python - <<'PY'
          import sys
          from maverick.license_scan import scan_distributions, policy_check
          # OS/distro Python packages (Ubuntu base image) are not part of the
          # shipped Maverick tree; their licenses create no obligation for us.
          SYSTEM_PKGS = {
              "python-apt", "launchpadlib", "lazr.restfulclient", "lazr.uri",
              "wadllib", "pygobject", "dbus-python", "command-not-found",
              "ubuntu-pro-client", "unattended-upgrades", "distro-info",
          }
          scanned = scan_distributions()
          violations = [v for v in policy_check(scanned)  # default: strong-copyleft
                        if v["name"].lower() not in SYSTEM_PKGS]
          if violations:
              print(f"::error::{len(violations)} strong-copyleft dependency(ies):")
              for v in violations:
                  print(f"  - {v['name']} {v['version']}: {v['license']} ({v['category']})")
              sys.exit(1)
          print(f"license policy OK: 0 strong-copyleft across {len(scanned)} packages")
          PY
      - name: SBOM (CycloneDX, supply-chain transparency)
        # NON-BLOCKING (continue-on-error): emit a CycloneDX SBOM of the
        # resolved dependency tree as a build artifact for supply-chain review
        # by regulated buyers. Generation must never gate the build, so a
        # cyclonedx-py hiccup is tolerated; the artifact is best-effort.
        continue-on-error: true
        run: |
          python -m pip install 'cyclonedx-bom>=4'
          # Generate from the installed environment (the same tree pip-audit saw).
          cyclonedx-py environment -o sbom.cyclonedx.json || \
            cyclonedx-py environment > sbom.cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: ignore

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install packages
        run: |
          set -x
          # Install maverick-core first; downstream packages use --no-deps to
          # avoid pip trying to resolve 'maverick>=0.1' from PyPI.
          pip install -e ./packages/maverick-core
          pip install --no-deps -e ./packages/maverick-shield
          pip install --no-deps -e ./packages/maverick-channels
          pip install --no-deps -e ./packages/maverick-evolve
          pip install --no-deps -e ./packages/maverick-dashboard
          pip install --no-deps -e ./packages/maverick-mcp
          pip install --no-deps -e ./packages/maverick-knowledge
          pip install --no-deps -e ./apps/installer-cli
          # Runtime deps the --no-deps installs dropped. python-multipart is
          # required by FastAPI for Form() params (used in /chat/send) and
          # must be present at app construction, not just at request time.
          pip install 'questionary>=2.0' 'rich>=13.7'
          pip install 'fastapi>=0.110' 'uvicorn>=0.27' 'jinja2>=3.1' \
                      'httpx>=0.27' 'python-multipart>=0.0.9'
          # OIDC (P4) verifier ships as the optional [oidc] extra (PyJWT);
          # install it here so the adversarial security matrix in test_oidc.py
          # actually RUNS in CI instead of self-skipping when PyJWT is absent.
          pip install pytest pytest-asyncio 'pyjwt[crypto]'
      - name: Show installed packages
        run: pip list
      - name: Test
        run: pytest -vvs --tb=long

  redteam:
    # Red-team CI (ROADMAP 2027-H1 safety): run the labelled adversarial
    # corpus through the shield's built-in detector and fail the build on any
    # missed attack or over-blocked benign case. A named job (not buried in
    # the test matrix) so the gate is visible in the checks list. The corpus
    # is maverick_shield/redteam_corpus.jsonl — grow it by PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install shield
        run: pip install -e ./packages/maverick-shield
      - name: Red-team gate (zero missed attacks)
        run: python -m maverick_shield.redteam
      - name: Calibration report (informational)
        run: python -m maverick_shield.redteam --calibrate

  eval-smoke:
    # Eval-gated-release foundation (ROADMAP P3). Real evals drive `maverick
    # start` against a live provider -- no models/network in CI -- so this gate
    # runs the eval harness machinery (registry + scorers + tau2 verifier +
    # pass@1 aggregation) against scripted solvers and asserts grading still
    # works. A code change that breaks the harness wiring fails here, fast,
    # without any API key. Deterministic and offline by construction.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install packages
        run: |
          set -x
          # Mirror the test job's core install. The smoke imports nothing that
          # needs the network-facing extras, so we skip them to stay fast.
          pip install -e ./packages/maverick-core
          pip install pytest pytest-asyncio
      - name: Eval-harness smoke (offline regression gate)
        run: pytest -vvs --tb=long benchmarks/test_eval_smoke.py

  postgres:
    # DB-backed tests for the Postgres world-model backend. The default `test`
    # job has no Postgres, so test_postgres_world.py skips there; this job
    # stands up a service + DSN so the backend is actually exercised in CI.
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector image = postgres:16 + the `vector` extension, so the same
        # service also exercises the pgvector knowledge store (round-trip below).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: maverick
          POSTGRES_PASSWORD: maverick
          POSTGRES_DB: maverick_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          set -x
          pip install -e ./packages/maverick-core
          pip install -e ./packages/maverick-knowledge
          pip install 'psycopg[binary]>=3.1'
          pip install pytest pytest-asyncio
      - name: Test PostgresWorldModel
        env:
          MAVERICK_PG_DSN: postgres://maverick:maverick@localhost:5432/maverick_test
        run: pytest -vvs packages/maverick-core/tests/test_postgres_world.py
      - name: Test pgvector knowledge store
        env:
          MAVERICK_PG_DSN: postgres://maverick:maverick@localhost:5432/maverick_test
        run: pytest -vvs packages/maverick-knowledge/tests/test_knowledge.py -k PgVectorLive

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        # Docker Hub base-image pulls intermittently time out on CI runners
        # (registry-1.docker.io i/o timeout). Retry with backoff so a transient
        # registry blip doesn't fail the whole job.
        run: |
          n=0; max=4
          until docker build -f deploy/docker/Dockerfile -t maverick:ci .; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then
              echo "::error::docker build failed after $max attempts (registry/network)"
              exit 1
            fi
            echo "docker build attempt $n/$max failed; retrying in $((n*15))s"
            sleep $((n*15))
          done
      - name: Smoke run
        # Beyond --help: dashboard and mcp import maverick-dashboard /
        # maverick-mcp. Before those packages were added to the image they
        # exited 2 ("Install: pip install ..."). These prove they're present.
        run: |
          docker run --rm maverick:ci --help
          docker run --rm maverick:ci dashboard --help
          docker run --rm maverick:ci mcp --help
