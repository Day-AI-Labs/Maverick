name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff>=0.5
      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install packages
        run: |
          pip install -e ./packages/maverick-core
          pip install -e ./packages/maverick-shield || true
          pip install -e ./packages/maverick-channels || true
          pip install -e ./apps/installer-cli || true
          pip install pytest pytest-asyncio
      - name: Test
        run: pytest -q
        # Tests will be added next session; for now this step is a
        # smoke test that all packages import cleanly.
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/docker/Dockerfile -t maverick:ci .
      - name: Smoke run
        run: docker run --rm maverick:ci --help
