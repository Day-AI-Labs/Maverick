name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release as (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate-release-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-ref.outputs.tag }}
      ref: ${{ steps.release-ref.outputs.ref }}
      prerelease: ${{ steps.release-ref.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: release-ref
        name: Validate release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"

          if [[ ! "$tag" =~ ^v[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "Release tag must start with v and contain only letters, numbers, dots, underscores, or hyphens: $tag" >&2
            exit 1
          fi

          git fetch --force --tags origin "refs/tags/$tag:refs/tags/$tag"
          tag_sha="$(git rev-list -n 1 "refs/tags/$tag")"

          if [[ "$EVENT_NAME" == "push" && "$EVENT_SHA" != "$tag_sha" ]]; then
            echo "Pushed tag $tag resolves to $tag_sha, not workflow SHA $EVENT_SHA" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  docker-image:
    needs: validate-release-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate-release-tag.outputs.ref }}
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/maverick
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate-release-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate-release-tag.outputs.tag }}
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # PyPI publishing lives in publish.yml (Trusted Publishing / OIDC).
  # The legacy token-based job that used to live here is removed: both
  # workflows triggered on the same `v*` tag and would have collided on
  # first release.

  binaries:
    needs: validate-release-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: maverick-linux-x86_64
          - os: macos-latest
            artifact: maverick-macos-arm64
          - os: windows-latest
            artifact: maverick-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate-release-tag.outputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Maverick + deps
        shell: bash
        run: |
          # NOT editable (-e): PyInstaller can't collect editable installs,
          # which is why the binary crashed with "No module named 'maverick'".
          # A regular install puts the packages in site-packages where the
          # analyzer (and the spec's collect_submodules) can find them.
          pip install ./packages/maverick-core
          pip install --no-deps ./packages/maverick-shield
          pip install --no-deps ./packages/maverick-channels
          pip install --no-deps ./packages/maverick-dashboard
          pip install --no-deps ./packages/maverick-mcp
          pip install --no-deps ./apps/installer-cli
          # Bundled deps the --no-deps installs above skipped:
          pip install 'questionary>=2.0' 'rich>=13.7'
          pip install 'fastapi>=0.110' 'uvicorn>=0.27' 'jinja2>=3.1' 'python-multipart>=0.0.9'
          # Pin to PyInstaller 6.x: earlier major lacks Python 3.12 support,
          # later (7.x in 2025+) had API drifts we don't want to chase
          # release-by-release. 6.x is well-stabilized for Python 3.10-3.12.
          pip install 'pyinstaller>=6.0,<7.0'
      - name: Diagnostic - verify sqlite3 is importable at build time
        shell: bash
        run: |
          # Prove sqlite3 is available BEFORE pyinstaller runs. If this
          # fails, the Python install on the runner doesn't have sqlite3
          # support compiled in -- which is what would silently cause
          # --hidden-import sqlite3 to be a no-op (you can't bundle what
          # doesn't exist in the source Python). The v0.1.0/v0.1.1
          # release binaries failed precisely this way on all 3 OSes.
          python -c "import sqlite3; print('sqlite3 version:', sqlite3.sqlite_version)"
          python -c "import _sqlite3; print('_sqlite3 ok')"
      - name: Build single-file binary
        shell: bash
        working-directory: build
        run: |
          # Spec file gives the analyzer an unambiguous hiddenimports list.
          # Previous attempts via --hidden-import on the CLI silently no-op'd
          # under --collect-all interaction; the spec file pattern is what
          # the PyInstaller docs recommend for non-trivial builds.
          pyinstaller --clean --noconfirm --distpath ../dist maverick.spec
      - name: Smoke-test the binary covers all subcommands
        shell: bash
        run: |
          ./dist/maverick --help
          ./dist/maverick version
          ./dist/maverick dashboard --help
          ./dist/maverick mcp --help || true
      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/maverick.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/maverick "dist/${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    # PyPI publish lives in publish.yml on the same tag; this workflow
    # only owns Docker images, single-file binaries, and the GitHub
    # release that bundles them.
    needs: [validate-release-tag, docker-image, binaries]
    runs-on: ubuntu-latest
    if: always() && needs.docker-image.result == 'success' && needs.binaries.result == 'success'
    permissions:
      contents: write   # create the GitHub Release
      actions: write    # dispatch desktop.yml to build + attach installers
      id-token: write   # keyless cosign signing (Sigstore OIDC, no stored keys)
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate-release-tag.outputs.ref }}
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Generate CycloneDX SBOM for the release
        # Per-release SBOM attached to the GitHub Release so downstream
        # security/procurement teams get a versioned bill of materials for
        # exactly the artifacts published here (audit M19). Installs the 8
        # workspace packages so the SBOM reflects the real dependency tree,
        # then emits one CycloneDX JSON named for the release tag.
        run: |
          python -m pip install --upgrade pip cyclonedx-bom
          for p in packages/maverick-core packages/maverick-shield \
                   packages/maverick-channels packages/maverick-dashboard \
                   packages/maverick-mcp packages/maverick-evolve \
                   packages/maverick-knowledge; do
            pip install --no-deps -e "$p" || true
          done
          pip install -e packages/maverick-core || true
          cyclonedx-py environment \
            -o "dist/maverick-sbom-${{ needs.validate-release-tag.outputs.tag }}.cdx.json" \
            || echo "SBOM generation failed (non-fatal); release continues"
      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1
      - name: Sign release artifacts (keyless, Sigstore)
        # Keyless signing: cosign mints a short-lived cert bound to THIS
        # workflow's OIDC identity and logs the signature to the public Rekor
        # transparency log -- no long-lived private key to store or leak. For
        # each binary + the SBOM we emit a detached `.sig` (signature) and
        # `.pem` (signing certificate); users verify with
        # `cosign verify-blob` (see deploy/verify-release.sh).
        env:
          COSIGN_YES: "true"
        run: |
          shopt -s nullglob
          for f in dist/maverick-* dist/maverick-sbom-*.cdx.json; do
            case "$f" in *.sig|*.pem) continue;; esac
            echo "signing $f"
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # The validation job resolves manual dispatches and tag pushes
          # to the same v* tag that every build job checked out.
          tag_name: ${{ needs.validate-release-tag.outputs.tag }}
          # Binaries + the per-release CycloneDX SBOM + their Sigstore
          # signatures (.sig) and signing certificates (.pem).
          files: |
            dist/maverick-*
            dist/maverick-sbom-*.cdx.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.validate-release-tag.outputs.prerelease }}

      - name: Build + attach the native desktop installers
        # The desktop installers (.dmg/.msi/.exe/.AppImage/.deb) are built
        # by desktop.yml. Dispatch it here -- rather than relying on a tag
        # push -- so it fires even when this release was cut via
        # workflow_dispatch: in that case the tag is created with
        # GITHUB_TOKEN, which can't trigger push-based workflows
        # (workflow_dispatch is the documented exception). desktop.yml's
        # attach-release job waits for the Release created just above and
        # uploads the bundles to it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate-release-tag.outputs.tag }}
        run: gh workflow run desktop.yml --ref "$TAG"
