name: Native (Rust)

# Builds and tests the native scanner core (rust/). Two outputs from one core:
#   - the `maverick_native` Python wheel (PyO3, abi3) — accelerates the shield
#     scanners; absent => pure-Python fallback, so this is additive.
#   - the `mvk-scan-wasm` package (wasm-bindgen) — TypeScript / edge.
# The whole point: CI here *exercises the native path* (the parity tests skip in
# the main suite because the wheel isn't built there) and produces installable
# artifacts. Publish is gated on a tag + configured registry credentials.

on:
  push:
    branches: [main]
    tags: ["native-v*"]
  pull_request:
    paths:
      - "rust/**"
      - "packages/maverick-core/maverick/safety/unicode_filter.py"
      - "packages/maverick-core/tests/test_native_unicode_parity.py"
      - ".github/workflows/native.yml"

permissions:
  contents: read

# A new push to the same ref supersedes in-flight runs (tags excepted — those
# feed publish and must each complete).
concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  RUST_BACKTRACE: "1"

jobs:
  core:
    name: cargo test (core crate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          workspaces: rust
      # Just the core crate: all behaviour + unit tests live here. The binding
      # crates (pyo3 cdylib, wasm-bindgen) have no host-target tests and are
      # exercised by the python/wasm parity jobs below.
      - run: cargo test -p mvk-scan --manifest-path rust/Cargo.toml

  python:
    name: wheel + native parity (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          workspaces: rust
      - name: Build the maverick_native wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m rust/mvk-scan-py/Cargo.toml --out dist
      - name: Install wheel + assert native engaged + run parity
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pytest
          # --no-index forces the install to use the wheel we just built; if no
          # wheel matches this OS/Python the install fails hard (not a silent skip).
          python -m pip install --no-index --find-links dist maverick-native
          # Make `maverick` importable so the shim under test loads (deps-free:
          # maverick.safety.unicode_filter pulls only stdlib).
          python -m pip install -e packages/maverick-core --no-deps
          # HARD GATE: the parity test self-skips when the native module is
          # absent. After explicitly building+installing it, a skip would be a
          # false green — so prove the extension imported AND the shim swapped in
          # the native callables before we let pytest run.
          python - <<'PY'
          import maverick_native
          from maverick.safety import unicode_filter as uf
          assert uf._native is not None, "shim did not pick up maverick_native"
          assert uf.normalize is not uf._normalize_py, "native normalize not engaged"
          assert uf.has_dangerous_unicode is not uf._has_dangerous_unicode_py, (
              "native has_dangerous_unicode not engaged"
          )
          print("native engaged:", maverick_native.__file__)
          PY
          python -m pytest packages/maverick-core/tests/test_native_unicode_parity.py -vv
      - uses: actions/upload-artifact@v4
        with:
          name: maverick-native-wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  wasm:
    name: wasm package + node parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          workspaces: rust
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build the wasm package (wasm-opt disabled in Cargo metadata)
        run: wasm-pack build rust/mvk-scan-wasm --target nodejs --out-dir pkg --release
      - name: Node parity test (proves WASM == pure Python)
        run: node --test rust/mvk-scan-wasm/test/parity.test.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: mvk-scan-wasm-pkg
          path: rust/mvk-scan-wasm/pkg
          if-no-files-found: error

  # --- Publish (tag-gated) ---------------------------------------------------
  # Runs only on a `native-v*` tag. PyPI uses OIDC trusted publishing (no token
  # to store) — register the `maverick-native` project + this repo as a trusted
  # publisher first, or this job is a no-op skip. npm needs NPM_TOKEN in repo
  # secrets. Until those are configured, only build + parity + artifacts run.
  publish-pypi:
    name: publish wheels to PyPI
    needs: [core, python, wasm]
    if: startsWith(github.ref, 'refs/tags/native-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          pattern: maverick-native-wheel-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-npm:
    name: publish wasm package to npm
    needs: [core, python, wasm]
    if: startsWith(github.ref, 'refs/tags/native-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: wasm-pack build rust/mvk-scan-wasm --target bundler --out-dir pkg --release
      - name: Publish (skips cleanly if NPM_TOKEN is unset)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not configured; skipping npm publish."; exit 0
          fi
          (cd rust/mvk-scan-wasm/pkg && npm publish --access public)
