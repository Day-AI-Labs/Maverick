[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maverick-knowledge"
version = "0.1.0"
description = "Per-domain document knowledge (vector RAG) for Maverick agents"
requires-python = ">=3.10"
license = { text = "LicenseRef-Proprietary" }
authors = [{ name = "cdayAI" }]
# Pure core (chunking, SQLite brute-force store, deterministic embedder,
# text/markdown/HTML parsing) has no third-party deps. Real embedding providers,
# richer parsers, and pgvector are opt-in extras so the kernel never has to pull
# heavy deps to run (CLAUDE.md rules 1 & 5).
dependencies = []

[project.optional-dependencies]
hosted = ["httpx>=0.27"]
local = ["sentence-transformers>=2.2"]
parsers = ["pypdf>=4.0", "python-docx>=1.1"]
vision = ["pytesseract>=0.3", "pillow>=10.0"]
pgvector = ["psycopg[binary]>=3.1"]

[project.urls]
Homepage = "https://github.com/cdayAI/maverick"

[tool.setuptools.packages.find]
where = ["."]
include = ["maverick_knowledge*"]
