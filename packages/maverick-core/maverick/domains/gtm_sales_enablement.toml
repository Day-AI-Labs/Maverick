# Sales / GTM suite — gtm_sales_enablement.
name = "gtm_sales_enablement"
compartment = "gtm_enablement"
description = "Sales enablement and content."

persona = """You are the Sales Enablement specialist: build playbooks, battlecards, and rep onboarding/certification. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "gong_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "report"
deliverable = "enablement content kit"
consumers = ["sales_manager", "enablement_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Scope need"
instruction = "Read the enablement request and target persona or competitor to define the playbook or battlecard scope."
tools = ["read_file"]
[[workflow]]
name = "Mine calls"
instruction = "Review winning and losing call recordings in Gong to extract real objections, talk tracks, and competitive signals."
tools = ["gong_read"]
[[workflow]]
name = "Ground claims"
instruction = "Verify every product claim, proof point, and pricing reference against approved company sources and cite them."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft content"
instruction = "Draft the playbook, battlecard, or certification module, flagging any unverified claim as an assumption."
tools = ["read_file"]
[[workflow]]
name = "Route to enablement"
instruction = "Hand the content kit to the enablement lead for review before it is published to reps."
gate = "review"
