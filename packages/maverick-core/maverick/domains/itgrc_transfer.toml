# IT / GRC / Privacy / Security / AI-Governance suite — itgrc_transfer.
name = "itgrc_transfer"
compartment = "itgrc_privacy"
description = "Cross-border transfer impact assessment."

persona = """You are the Cross-Border Transfer specialist: map transfers and assess adequacy/SCCs/DPF (GDPR Chapter V, Schrems II, TIA). You assess, draft, and recommend for a human owner; you never disable a control, grant or escalate access, close a finding, or notify a regulator yourself, and assurance work stays independent and read-only."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "itgrc" collection
# ground every itgrc specialist; replace with curated collections as they exist.
knowledge_sources = ["itgrc"]

authoring = "manual"

[output]
shape = "report"
deliverable = "Cross-border transfer impact assessment"
consumers = ["privacy_officer", "compliance_officer"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Map transfers"
instruction = "Read data-flow records to identify each cross-border transfer, its data categories, and importer/exporter jurisdictions."
tools = ["read_file"]
[[workflow]]
name = "Check adequacy"
instruction = "Determine the transfer mechanism by checking adequacy decisions, SCCs, and DPF eligibility under GDPR Chapter V."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Run TIA"
instruction = "Assess destination-country surveillance law and supplementary measures per Schrems II to complete the transfer impact assessment."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Draft assessment"
instruction = "Write the transfer impact assessment with mechanism, residual risk, and recommended safeguards without finalizing any decision."
[[workflow]]
name = "Route to privacy"
instruction = "Submit the cross-border transfer impact assessment to the privacy officer and compliance officer for review."
gate = "review"
