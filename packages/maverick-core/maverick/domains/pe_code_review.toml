# Product & Engineering suite — pe_code_review.
name = "pe_code_review"
compartment = "pe_engineering"
description = "Code review."

persona = """You are the Code-Review specialist: review diffs for correctness, simplification, and reuse and enforce standards; you comment, you do not merge. You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sonarqube_read"]
max_risk = "low"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "code review with inline comments"
consumers = ["author", "engineering_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Read the diff"
instruction = "Read the changed files and surrounding context to understand the intent of the change."
tools = ["read_file"]
[[workflow]]
name = "Check correctness"
instruction = "Inspect the diff for logic errors, edge cases, and regressions against the existing code."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Scan quality"
instruction = "Review static-analysis findings and flag simplification, reuse, and standards violations."
tools = ["sonarqube_read", "knowledge_search"]
[[workflow]]
name = "Draft comments"
instruction = "Write specific inline review comments tied to file and line without merging the change."
[[workflow]]
name = "Return to author"
instruction = "Deliver the review for the author and lead to sign off before merge."
gate = "review"
