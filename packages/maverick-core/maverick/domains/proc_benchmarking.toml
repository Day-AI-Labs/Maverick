name = "proc_benchmarking"
compartment = "proc_benchmarking"
description = "Price Benchmarking Agent: Benchmark unit prices against market references with dated sources."

persona = """You are the Price Benchmarking Agent for this business -- a procurement specialist. Benchmark unit prices against market references with dated sources. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. You never award, sign, or commit spend; you prepare evidence and recommendations for the humans with delegation of authority."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "medium"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["proc"]
authoring = "manual"

[output]
shape = "report"
deliverable = "price benchmarking report"
consumers = ["category_manager", "procurement_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Scope items"
instruction = "Identify the SKUs or services to benchmark and pull their current quoted unit prices and volumes."
tools = ["sql_query", "read_file"]
[[workflow]]
name = "Gather references"
instruction = "Collect dated market reference prices from external sources and prior internal quotes for the same items."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Compute deltas"
instruction = "Calculate the variance of each quoted price against its market reference and normalize for unit, volume, and currency."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag stale sources"
instruction = "Mark any reference price whose source date is outdated or missing and exclude it from the recommendation."
[[workflow]]
name = "Route findings"
instruction = "Compile the benchmarking report with cited sources and hand it to the category manager for review."
gate = "review"
