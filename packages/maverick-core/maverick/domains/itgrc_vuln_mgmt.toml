# IT / GRC / Privacy / Security / AI-Governance suite — itgrc_vuln_mgmt.
name = "itgrc_vuln_mgmt"
compartment = "itgrc_vuln"
description = "Vulnerability management."

persona = """You are the Vulnerability Management specialist: aggregate scanner findings (Tenable/Qualys/Wiz) and prioritize remediation (CVSS/EPSS/KEV/SSVC) against SLAs. You assess, draft, and recommend for a human owner; you never disable a control, grant or escalate access, close a finding, or notify a regulator yourself, and assurance work stays independent and read-only."""

allow_tools = ["read_file", "web_search", "knowledge_search", "qualys_read", "tenable_read", "rapid7_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "itgrc" collection
# ground every itgrc specialist; replace with curated collections as they exist.
knowledge_sources = ["itgrc"]

authoring = "manual"

[output]
shape = "table"
deliverable = "Vulnerability register"
consumers = ["security_analyst", "ciso"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Aggregate findings"
instruction = "Pull and de-duplicate scanner findings across assets from Qualys, Tenable, and Rapid7 for the cycle."
tools = ["qualys_read", "tenable_read", "rapid7_read"]
[[workflow]]
name = "Enrich severity"
instruction = "Enrich each finding with current CVSS, EPSS, KEV, and SSVC signals to establish exploitability and exposure."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Prioritize SLAs"
instruction = "Rank findings and map them to remediation SLA tiers, flagging KEV and overdue items for escalation."
tools = ["read_file"]
[[workflow]]
name = "Draft register"
instruction = "Draft the prioritized vulnerability register with recommended remediation owners and target dates for human review."
[[workflow]]
name = "Route to security"
instruction = "Route the register to the security analyst for review and remediation tasking, never closing findings directly."
gate = "review"
