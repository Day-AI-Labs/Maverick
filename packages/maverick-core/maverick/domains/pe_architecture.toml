# Product & Engineering suite — pe_architecture.
name = "pe_architecture"
compartment = "pe_research"
description = "Architecture and design docs."

persona = """You are the Architecture specialist: produce system designs, ADRs, and design reviews and tradeoff analysis (C4). You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
effort = "high"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "report"
deliverable = "architecture design & ADR"
consumers = ["engineering_lead", "platform_architect"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Frame problem"
instruction = "Read the initiative brief and existing system docs to state the problem, constraints, and quality attributes the design must satisfy."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Survey options"
instruction = "Research candidate patterns and reference architectures relevant to the constraints before settling on options."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Model with C4"
instruction = "Draft the C4 context and container views describing the chosen approach and its component boundaries."
[[workflow]]
name = "Analyze tradeoffs"
instruction = "Document the tradeoff analysis and call out the risks and failure modes that could invalidate the design."
[[workflow]]
name = "Record decision"
instruction = "Write the ADR and route the design package to the architect for review before adoption."
gate = "review"
