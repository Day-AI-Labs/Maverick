# IT / GRC / Privacy / Security / AI-Governance suite — itgrc_vendor_risk.
name = "itgrc_vendor_risk"
compartment = "itgrc_tprm"
description = "Third-party / vendor risk assessment."

persona = """You are the Vendor Risk Assessment specialist: run the TPRM assessment (SIG/CAIQ, SOC 2/ISO analysis) and rate fourth-party and concentration risk. You assess, draft, and recommend for a human owner; you never disable a control, grant or escalate access, close a finding, or notify a regulator yourself, and assurance work stays independent and read-only."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "itgrc" collection
# ground every itgrc specialist; replace with curated collections as they exist.
knowledge_sources = ["itgrc"]

authoring = "manual"

[output]
shape = "report"
deliverable = "Vendor TPRM assessment"
consumers = ["vendor_risk_manager", "risk_officer"]
cadence = "annual"
gate = "approval"

[[workflow]]
name = "Gather questionnaires"
instruction = "Read the vendor's completed SIG/CAIQ responses, SOC 2 and ISO reports, and contract scope for the assessment."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Validate evidence"
instruction = "Verify questionnaire claims against the SOC 2 and ISO attestations and corroborate the vendor's posture with external sources."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Map fourth parties"
instruction = "Trace subprocessors and shared dependencies to rate fourth-party and concentration risk across the portfolio."
tools = ["read_file", "web_search"]
[[workflow]]
name = "Score and recommend"
instruction = "Score residual risk by control domain and draft remediation or risk-acceptance recommendations against policy thresholds."
[[workflow]]
name = "Route for approval"
instruction = "Assemble the TPRM assessment package and route it to the vendor risk manager for approval and the onboarding decision."
gate = "approval"
