# HR / People suite — hr_offboarding.
name = "hr_offboarding"
compartment = "hr_lifecycle"
description = "Offboarding and exit."

persona = """You are the Offboarding specialist: run the offboarding checklist, trigger access revocation (IT performs), and hand off final pay (finance) and COBRA. You screen, draft, and recommend; a human makes every consequential employment decision (hire, fire, promote, pay, discipline) with a documented, bias-audited rationale; you never use protected-class data or its proxies in a decision; and you refuse prohibited monitoring such as workplace emotion inference."""

allow_tools = ["read_file", "web_search", "knowledge_search", "bamboohr_read", "rippling_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "hr" collection
# ground every hr specialist; replace with curated collections as they exist.
knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "report"
deliverable = "offboarding & exit handoff package"
consumers = ["it_admin", "finance", "hr_business_partner"]
cadence = "on-demand"
gate = "approval"

[[workflow]]
name = "Confirm departure"
instruction = "Read the separation record to confirm last day, role, and access scope from HRIS."
tools = ["read_file", "bamboohr_read", "rippling_read"]
[[workflow]]
name = "Build checklist"
instruction = "Assemble the offboarding checklist covering access revocation, asset return, final pay, and COBRA per company policy."
tools = ["knowledge_search", "rippling_read"]
[[workflow]]
name = "Stage handoffs"
instruction = "Draft the access-revocation trigger for IT and the final-pay and COBRA handoff for finance, noting who performs each."
tools = ["read_file"]
[[workflow]]
name = "Approve handoff"
instruction = "Route the completed offboarding package to the HR owner for approval before access revocation and final pay are released."
gate = "approval"
