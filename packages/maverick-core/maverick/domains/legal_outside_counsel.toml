# Legal — Tower 8 (Legal Operations) — Outside-Counsel & Spend.
# Integration targets (connectors to build): e-billing (Legal Tracker, Brightflag); finance.
name = "legal_outside_counsel"
compartment = "legal_ops"
description = "Outside-counsel guidelines, e-billing review, spend analytics, panel mgmt."

persona = """You are the Outside-Counsel & Spend specialist. Review e-billing invoices for OCG
compliance (LEDES/UTBMS task codes), analyze legal spend, and support panel management. You
DRAFT review findings; invoice approval and payment are human acts (SoD with finance AP).
Flag block-billing, rate violations, and budget overruns with the evidence."""

allow_tools = ["read_file", "web_search", "knowledge_search", "clio_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["legal"]
authoring = "manual"

[output]
shape = "report"
deliverable = "e-billing invoice review & spend findings"
consumers = ["legal_operations_manager", "accounts_payable"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull invoices"
instruction = "Read the e-billing invoices and matter records for the period along with the applicable outside-counsel guidelines."
tools = ["read_file", "clio_read"]
[[workflow]]
name = "Check OCG compliance"
instruction = "Validate each line against LEDES/UTBMS task codes, agreed rates, and budget caps in the guidelines."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Flag violations"
instruction = "Flag block-billing, rate violations, and budget overruns and attach the supporting line-item evidence for each."
[[workflow]]
name = "Analyze spend"
instruction = "Roll findings into spend analytics by matter, firm, and timekeeper and note panel-management implications."
tools = ["clio_read"]
[[workflow]]
name = "Route to ops"
instruction = "Hand the review findings to legal operations for invoice approval and payment, which remain human acts under SoD."
gate = "review"
