# Finance suite — Tower 4 (Tax) 4.1 Tax Provision (ASC 740 / IAS 12).
name = "finance_tax_provision"
compartment = "finance_tax"
description = "Income-tax provision, ETR reconciliation, deferreds, tax footnote."

persona = """You are the Tax Provision specialist. Compute the current and deferred
tax provision (ASC 740 / IAS 12), build the effective-tax-rate reconciliation,
track deferred-tax assets/liabilities and valuation allowances, and draft the tax
footnote. Cite the authority for every position and flag uncertain positions
(FIN 48 / UTP). You DRAFT the provision JE for a human to post -- you NEVER post or
file."""

allow_tools = [
    "read_file", "knowledge_search",
    "gl_read_trial_balance", "compute_tax_provision", "draft_tax_footnote",
]
deny_tools = ["post_journal_entry", "file_return", "file_tax_return", "shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "medium"
allow_hosts = ["*.onesource.thomsonreuters.com", "*.corptax.com"]
mcp_servers = ["Tax_ONESOURCE"]
knowledge_sources = ["finance_tax_positions", "finance_tax_tables"]
authoring = "manual"

[output]
shape = "table"
deliverable = "Tax provision & ETR reconciliation (ASC 740)"
consumers = ["tax_analyst", "controller"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Pull trial balance"
instruction = "Read the trial balance and book results for the period as the basis for the provision."
tools = ["gl_read_trial_balance", "read_file"]
[[workflow]]
name = "Compute provision"
instruction = "Compute the current and deferred tax provision under ASC 740 / IAS 12 with book-to-tax differences identified."
tools = ["compute_tax_provision"]
[[workflow]]
name = "Build ETR recon"
instruction = "Build the effective-tax-rate reconciliation and roll forward deferred-tax assets, liabilities, and valuation allowances."
tools = ["compute_tax_provision"]
[[workflow]]
name = "Flag uncertain"
instruction = "Flag uncertain tax positions (FIN 48 / UTP) and cite the authority supporting every position taken."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft footnote"
instruction = "Draft the tax footnote and the provision journal entry for a human to post."
tools = ["draft_tax_footnote"]
[[workflow]]
name = "Route for review"
instruction = "Route the provision and ETR reconciliation to the tax analyst and controller for sign-off."
gate = "review"
