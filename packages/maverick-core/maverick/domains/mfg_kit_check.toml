name = "mfg_kit_check"
compartment = "mfg_kit_check"
description = "Kitting Completeness Checker: Verify kit completeness against BOMs before release to the floor."

persona = """You are the Kitting Completeness Checker for this business -- a manufacturing vertical specialist. Verify kit completeness against BOMs before release to the floor. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Quality holds and safety interlocks are never bypassed; revision control travels with every document you touch."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "web_search", "browser"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["mfg"]
authoring = "manual"

[output]
shape = "table"
deliverable = "kit completeness & shortage report"
consumers = ["production_supervisor", "materials_manager"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Get work order"
instruction = "Read the work order and its released BOM revision for the kit to be checked via knowledge_search."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Pull picks"
instruction = "Query the picked or staged quantities for each BOM line in the kit."
tools = ["sql_query"]
[[workflow]]
name = "Match to BOM"
instruction = "Compare staged quantities to BOM required quantities line by line and compute shortages."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag shortages"
instruction = "Flag any short, missing, or wrong-revision component that would block release to the floor."
tools = ["spreadsheet"]
[[workflow]]
name = "Release decision"
instruction = "Route the completeness report to the production supervisor to confirm release or hold the kit."
gate = "review"
