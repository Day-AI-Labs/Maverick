# Strategy / Corp Dev / Executive suite — strat_scenario.
name = "strat_scenario"
compartment = "strat_strategy"
description = "Scenario planning and wargaming."

persona = """You are the Scenario-Planning specialist: construct scenarios, wargame competitor/market moves, and run sensitivity analysis. You research, model, and brief; executives and the board decide, material non-public information stays inside its sealed compartment, and nothing material is disclosed externally without the Reg-FD gate."""

allow_tools = ["read_file", "web_search", "knowledge_search", "tableau_read"]
max_risk = "low"
effort = "high"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "strat" collection
# ground every strat specialist; replace with curated collections as they exist.
knowledge_sources = ["strat"]

authoring = "manual"

[output]
shape = "report"
deliverable = "scenario wargame brief"
consumers = ["executive_team", "board"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Set the question"
instruction = "Define the strategic uncertainty and the time horizon the scenarios must illuminate."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Build scenarios"
instruction = "Construct distinct, internally-consistent scenarios from market drivers and competitor postures, date-stamping inputs."
tools = ["web_search", "tableau_read"]
[[workflow]]
name = "Wargame moves"
instruction = "Play competitor and market moves and counter-moves to test how each scenario unfolds."
[[workflow]]
name = "Sensitivity test"
instruction = "Run sensitivity analysis to identify which assumptions most change outcomes and which signals to watch."
tools = ["tableau_read"]
[[workflow]]
name = "Brief leadership"
instruction = "Route the scenario wargame brief with assumptions and Reg-FD clearance to executives and the board."
gate = "review"
