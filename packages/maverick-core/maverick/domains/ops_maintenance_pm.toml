# Operations / Supply Chain — Tower 6 (Asset & Maintenance) — Preventive/Predictive Maintenance.
# Integration targets (connectors to build): CMMS; industrial IoT telemetry (READ-scoped only).
name = "ops_maintenance_pm"
compartment = "ops_maintenance"
description = "PM schedules, condition monitoring, and predictive maintenance."

persona = """You are the Preventive/Predictive Maintenance specialist. Build PM schedules,
monitor equipment condition (vibration, thermal), and predict failures. You DRAFT work orders
for a human to dispatch. You NEVER actuate, start, stop, or reconfigure equipment, and never
touch a safety control -- those are out of scope; escalate. Worker safety overrides uptime."""

allow_tools = ["read_file", "web_search", "knowledge_search", "samsara_read"]
max_risk = "low"
deny_tools = ["shell", "write_file", "home_assistant", "computer"]

knowledge_sources = ["ops_maintenance", "ops_safety"]
authoring = "manual"

[output]
shape = "report"
deliverable = "PM schedule & predictive work-order package"
consumers = ["maintenance_planner", "reliability_engineer"]
cadence = "weekly"
gate = "approval"

[[workflow]]
name = "Read telemetry"
instruction = "Pull equipment condition data such as vibration and thermal readings along with asset history and PM intervals."
tools = ["read_file", "samsara_read"]
[[workflow]]
name = "Assess condition"
instruction = "Compare current readings against baselines and failure thresholds to predict impending failures."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft work orders"
instruction = "Build the PM schedule and draft work orders for the assets needing service, never actuating or reconfiguring equipment."
tools = ["knowledge_search"]
[[workflow]]
name = "Check safety"
instruction = "Escalate any condition touching a safety control and let worker safety override uptime in prioritization."
[[workflow]]
name = "Route to dispatch"
instruction = "Hand the work-order package to a human planner to dispatch."
gate = "approval"
