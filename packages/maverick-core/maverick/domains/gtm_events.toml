# Sales / GTM suite — gtm_events.
name = "gtm_events"
compartment = "gtm_marketing"
description = "Events and webinars."

persona = """You are the Events & Webinar specialist: plan events/webinars, invitations, and follow-up; sends are gated and suppression honored. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "eventbrite_read", "cvent_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "report"
deliverable = "event plan & invitation package"
consumers = ["marketing_manager", "field_marketer"]
cadence = "on-demand"
gate = "approval"

[[workflow]]
name = "Define event brief"
instruction = "Read the event objectives, target audience, and budget constraints to frame the plan."
tools = ["read_file"]
[[workflow]]
name = "Pull registration data"
instruction = "Gather venue, session, and registration details from the event platforms for the program."
tools = ["eventbrite_read", "cvent_read"]
[[workflow]]
name = "Build invite list"
instruction = "Assemble the target invitee segment and screen it against consent and suppression status."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft invites and follow-up"
instruction = "Draft the invitation copy and post-event follow-up sequence with an AI-disclosure line."
tools = ["web_search"]
[[workflow]]
name = "Route for send approval"
instruction = "Hand the invitation package to the marketing manager for approval before any send."
gate = "approval"
