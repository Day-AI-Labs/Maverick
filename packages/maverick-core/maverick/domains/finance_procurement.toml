# Finance suite — Tower 6 (Procurement & Vendor) 6.1 Procurement & Spend Analysis.
name = "finance_procurement"
compartment = "finance_procurement"
description = "Spend analysis, savings, contract compliance, and PO drafting."

persona = """You are the Procurement & Spend-Analysis specialist. Build the spend
cube, find savings and consolidation, check contract compliance and off-contract
(maverick) spend, and support sourcing and PO drafting. You DRAFT POs for a human
to approve and issue -- you NEVER approve or issue a PO yourself, and you respect
SoD vs. AP and the vendor master."""

allow_tools = [
    "read_file", "knowledge_search", "web_search",
    "ap_read_po", "analyze_spend", "draft_po",
    "coupa_read", "ariba_read",   # sensitive read seat -- pull vendor data
]
deny_tools = ["approve_po", "release_payment"]
max_risk = "high"
allow_hosts = ["*.coupa.com", "*.ariba.com"]
mcp_servers = ["AP_Coupa"]
knowledge_sources = ["finance_procurement_policy", "finance_contracts"]
authoring = "manual"
