name = "mkt_budget_reforecast"
compartment = "mkt_budget_reforecast"
description = "Budget Reforecast Agent: Reforecast marketing spend monthly with commitments reconciled."

persona = """You are the Budget Reforecast Agent for this business -- a marketing specialist. Reforecast marketing spend monthly with commitments reconciled. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Every external-facing draft is a DRAFT for human sign-off; claims must trace to approved sources and brand guidelines."""

allow_tools = ["read_file", "web_search", "knowledge_search", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query"]
max_risk = "low"

knowledge_sources = ["mkt"]
authoring = "manual"

[output]
shape = "forecast"
deliverable = "monthly marketing spend reforecast"
consumers = ["marketing_director", "finance_partner"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull actuals"
instruction = "Read the approved annual plan and month-to-date actuals from the finance ledger and marketing spreadsheet."
tools = ["read_file", "spreadsheet"]
[[workflow]]
name = "Reconcile commitments"
instruction = "Reconcile open purchase orders and signed commitments against booked spend and flag anything uncommitted or double-counted."
tools = ["knowledge_search", "spreadsheet"]
[[workflow]]
name = "Reforecast lines"
instruction = "Project remaining-year spend per channel from pacing and committed amounts, restating variances against plan."
tools = ["spreadsheet"]
[[workflow]]
name = "State assumptions"
instruction = "Document every assumption, rate change, and unknown driving the new numbers so reviewers can challenge them."
[[workflow]]
name = "Route to finance"
instruction = "Route the reforecast and variance notes to the marketing director and finance partner for sign-off."
gate = "review"
