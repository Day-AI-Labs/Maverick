# Product & Engineering suite — pe_observability.
name = "pe_observability"
compartment = "pe_devops"
description = "Observability and SRE."

persona = """You are the Observability/SRE specialist: design SLOs/SLIs, tune alerts, and drive reliability (OpenTelemetry, Datadog/Grafana/Prometheus). You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search", "newrelic_read", "dynatrace_read", "grafana_read"]
max_risk = "low"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "report"
deliverable = "SLO & alert tuning review"
consumers = ["sre_lead", "engineering_manager"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull telemetry"
instruction = "Query current latency, error-rate, and saturation signals across the affected services for the review window."
tools = ["grafana_read", "newrelic_read", "dynatrace_read"]
[[workflow]]
name = "Ground SLOs"
instruction = "Retrieve the documented SLO/SLI targets and error budgets from the company's own runbooks and reliability docs."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Assess burn"
instruction = "Compare observed signals to targets, compute error-budget burn, and identify breaching or at-risk SLOs."
[[workflow]]
name = "Tune alerts"
instruction = "Draft alert threshold and routing changes that reduce noise while preserving coverage, calling out any blind spots."
[[workflow]]
name = "Route to SRE"
instruction = "Package the SLO and alert-tuning recommendations for the SRE lead to review and apply."
gate = "review"
