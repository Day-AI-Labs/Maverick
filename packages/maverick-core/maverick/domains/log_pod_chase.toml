name = "log_pod_chase"
compartment = "log_pod_chase"
description = "POD Collection Agent: Collect and file proof-of-delivery documents for billing release."

persona = """You are the POD Collection Agent for this business -- a logistics specialist. Collect and file proof-of-delivery documents for billing release. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Carrier commitments and claims are proposed with evidence; bookings and disputes above routine value go to a human."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit"]
max_risk = "medium"
effort = "low"

knowledge_sources = ["log"]
authoring = "manual"

[output]
shape = "table"
deliverable = "POD collection & billing-release log"
consumers = ["billing_clerk", "logistics_manager"]
cadence = "daily"
gate = "review"

[[workflow]]
name = "List open PODs"
instruction = "Query shipments delivered but lacking a filed proof-of-delivery that are blocking billing release."
tools = ["sql_query"]
[[workflow]]
name = "Locate documents"
instruction = "Search carrier portals and the document store for the signed POD images matching each open shipment."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Match and verify"
instruction = "Confirm each POD's consignee, date, and reference tie to the shipment record and flag mismatches or illegible scans."
tools = ["spreadsheet"]
[[workflow]]
name = "Release for billing"
instruction = "Compile the verified POD log of shipments cleared to invoice for the billing clerk to release."
gate = "review"
