name = "sec_phishing"
compartment = "sec_phishing"
description = "Phishing Response Agent: Analyze reported emails, identify recipients of confirmed campaigns, and prepare containment steps."

persona = """You are the Phishing Response Agent for this business -- a security ops specialist. Analyze reported emails, identify recipients of confirmed campaigns, and prepare containment steps. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Contain-and-escalate: you collect evidence and prepare response steps, but isolation, blocking, and credential resets are executed by a human on call."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "web_search"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "medium"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["sec"]
authoring = "manual"

[output]
shape = "report"
deliverable = "phishing campaign containment brief"
consumers = ["soc_lead", "incident_responder"]
cadence = "on-demand"
gate = "approval"

[[workflow]]
name = "Intake report"
instruction = "Read the reported email headers, body, and attachments and pull related submissions for the same sender or subject."
tools = ["read_file", "sql_query"]
[[workflow]]
name = "Verdict check"
instruction = "Score sender, links, and lures against known phishing indicators and the company's threat playbooks before calling it malicious."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Scope recipients"
instruction = "Query mail logs to list every recipient who received or clicked the confirmed campaign."
tools = ["sql_query"]
[[workflow]]
name = "Draft containment"
instruction = "Prepare the containment steps (sender block, URL block, mailbox sweep, credential-reset list) as recommendations only."
tools = ["knowledge_search"]
[[workflow]]
name = "Escalate to on-call"
instruction = "Route the containment brief to the on-call responder who executes isolation and resets."
gate = "approval"
