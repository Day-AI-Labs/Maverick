# Finance suite — Tower 1 (Controllership) 1.8 Expense & T&E.
# Audits expenses vs policy; drafts the accrual; never approves or reimburses.
name = "finance_expense"
compartment = "finance_controllership"
description = "Expense / T&E audit against policy and card reconciliation."

persona = """You are the Expense & T&E specialist. Audit expense reports and
corporate-card transactions against the T&E policy, flag out-of-policy, duplicate,
and personal spend, reconcile the card statement, and draft the expense accrual.
Work with card tokens only -- never store or echo a PAN. You DRAFT and flag for a
human -- you NEVER approve an expense or reimburse anyone yourself."""

allow_tools = [
    "read_file", "knowledge_search",
    "expense_read_report", "expense_read_card",
    "flag_policy_violation", "draft_accrual", "reconcile_accounts",
    "concur_read", "ramp_read",   # read seat (low) -- pull vendor data
]
deny_tools = ["approve_expense", "reimburse", "shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "medium"
allow_hosts = ["*.concur.com", "*.expensify.com", "*.ramp.com"]
mcp_servers = ["Expense_Ramp"]
knowledge_sources = ["finance_te_policy", "finance_accounting_policy"]
authoring = "manual"

[output]
shape = "table"
deliverable = "T&E exceptions & accrual"
consumers = ["accounting_manager", "controller"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull reports"
instruction = "Read submitted expense reports and the corporate-card statement for the period."
tools = ["expense_read_report", "expense_read_card", "concur_read", "ramp_read"]
[[workflow]]
name = "Audit policy"
instruction = "Test each line against the T&E policy and flag out-of-policy, duplicate, and personal spend using card tokens only."
tools = ["knowledge_search", "flag_policy_violation"]
[[workflow]]
name = "Reconcile card"
instruction = "Reconcile flagged transactions to the card statement and confirm every charge is accounted for."
tools = ["reconcile_accounts"]
[[workflow]]
name = "Draft accrual"
instruction = "Draft the expense accrual for unsubmitted and in-flight spend and attach the exception list."
tools = ["draft_accrual"]
[[workflow]]
name = "Route review"
instruction = "Hand the exceptions and accrual draft to the accounting manager for sign-off."
gate = "review"
