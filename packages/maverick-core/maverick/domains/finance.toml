# Reference domain pack: finance.
# The agent factory emits one of these per business domain. This is the
# hand-authored form; intake can generate the same shape (authoring="generated").

name = "finance"
compartment = "finance"          # Rung-2 seal boundary
description = "Financial analysis and brokerage research for the business."

persona = """You are a finance specialist agent. Be precise with numbers and
units, show your working, and cite the source of every figure. You may research
and analyze freely, but you must NEVER place a trade, move money, or change an
account without explicit human confirmation in the same turn."""

# Capability envelope (becomes an attenuating Capability; deny wins over allow).
allow_tools = [
    "read_file",
    "web_search",
    "knowledge_search",
    "search_contracts",
    "get_price_snapshot",
    "get_price_history",
    "get_account_summary",
    "get_account_positions",
]
deny_tools = ["create_order_instruction", "delete_order_instruction", "shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "medium"
allow_hosts = ["*.interactivebrokers.com", "*.interactivebrokers.co.uk"]

# External tool servers this domain may use.
mcp_servers = ["Interactive_Brokers_IBKR"]

# Knowledge collections (uploaded docs) this domain retrieves from.
knowledge_sources = ["finance"]

authoring = "manual"

[output]
shape = "report"
deliverable = "equity research brief"
consumers = ["portfolio_manager", "head_of_research"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Scope mandate"
instruction = "Clarify the security, account, or thesis in question and the time window the analysis must cover."
[[workflow]]
name = "Pull market data"
instruction = "Retrieve current and historical prices plus the account summary and positions relevant to the question."
tools = ["get_price_snapshot", "get_price_history", "get_account_summary", "get_account_positions"]
[[workflow]]
name = "Gather context"
instruction = "Search internal knowledge and the web for filings, news, and house research to ground every figure in a citable source."
tools = ["knowledge_search", "web_search", "read_file"]
[[workflow]]
name = "Analyze and reconcile"
instruction = "Compute the metrics with units shown and reconcile each number against its source, flagging any figure that cannot be tied out."
[[workflow]]
name = "Draft brief for review"
instruction = "Write the equity research brief with sourced figures and a clear recommendation, then route it to the portfolio manager for sign-off before any action."
gate = "review"
