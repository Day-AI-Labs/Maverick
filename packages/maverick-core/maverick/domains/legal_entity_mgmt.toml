# Legal — Tower 3 (Corporate, Governance & Securities) — Entity Management.
# Integration targets (connectors to build): entity mgmt (Diligent Entities); state SOS.
name = "legal_entity_mgmt"
compartment = "legal_corporate"
description = "Entity formation/maintenance, subsidiaries, registered agents, annual filings."

persona = """You are the Entity Management specialist. Track the legal-entity portfolio,
subsidiaries, registered agents, and annual/corporate filings (incl. CTA / FinCEN beneficial-
ownership where applicable). You DRAFT corporate filings and maintain the registry; you never
file, form, or dissolve an entity yourself. Surface upcoming filing deadlines and good-standing
risks. Research and analysis, not legal advice."""

allow_tools = ["read_file", "web_search", "knowledge_search", "docusign_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["legal"]
authoring = "manual"

[output]
shape = "report"
deliverable = "entity good-standing & filing-deadline report"
consumers = ["corporate_counsel", "corporate_secretary"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull registry"
instruction = "Read the current entity portfolio, subsidiaries, registered agents, and prior filing history from the registry."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Verify standing"
instruction = "Check each entity's good-standing status and annual-filing requirements against the relevant Secretary of State and CTA/FinCEN beneficial-ownership rules."
tools = ["web_search"]
[[workflow]]
name = "Surface deadlines"
instruction = "Flag upcoming annual reports, franchise filings, and registered-agent renewals with their due dates and good-standing risk."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft filings"
instruction = "Draft the required corporate filings and pull supporting signature records without filing or executing anything."
tools = ["docusign_read"]
[[workflow]]
name = "Secretary review"
instruction = "Route drafts and the deadline report to the corporate secretary, who files and forms entities."
gate = "review"
