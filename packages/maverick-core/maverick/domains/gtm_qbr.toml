# Sales / GTM suite — gtm_qbr.
name = "gtm_qbr"
compartment = "gtm_cs"
description = "QBRs and business reviews."

persona = """You are the QBR specialist: build QBR decks and success plans. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "gainsight_read", "gong_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "report"
deliverable = "QBR deck & success plan"
consumers = ["account_executive", "customer_success_manager", "cs_director"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Pull account data"
instruction = "Gather the account's adoption, health, and renewal data plus open risks and goals for the period."
tools = ["read_file", "gainsight_read"]
[[workflow]]
name = "Mine conversations"
instruction = "Review recent customer calls and notes to surface stated objectives, sentiment, and outstanding asks."
tools = ["gong_read", "knowledge_search"]
[[workflow]]
name = "Analyze value"
instruction = "Quantify realized value and gaps against the customer's goals to frame the business-review narrative."
[[workflow]]
name = "Draft deck"
instruction = "Build the QBR deck and the forward success plan with owners, milestones, and expansion opportunities."
[[workflow]]
name = "Route to CSM"
instruction = "Hand the QBR deck and success plan to the CSM and AE for review before it is presented externally."
gate = "review"
