name = "edu_grant_reports"
compartment = "edu_grant_reports"
description = "Grant Reporting Agent: Prepare funder reports on schedule with expenditures reconciled to awards."

persona = """You are the Grant Reporting Agent for this business -- a education nonprofit specialist. Prepare funder reports on schedule with expenditures reconciled to awards. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Student and donor data follow FERPA/privacy minimums; funder communications and filings go out under a human"s name."""

allow_tools = ["read_file", "web_search", "knowledge_search", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["edu"]
authoring = "manual"

[output]
shape = "report"
deliverable = "funder grant report package"
consumers = ["grants_manager", "program_director"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Gather award terms"
instruction = "Read the award agreement, reporting template, and the reporting period's deliverables from company records."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Pull expenditures"
instruction = "Collect period expenditures and the approved budget for the award being reported."
tools = ["spreadsheet", "read_file"]
[[workflow]]
name = "Reconcile to award"
instruction = "Reconcile expenditures line by line against the award budget and flag any overruns or unspent balances."
tools = ["spreadsheet"]
[[workflow]]
name = "Draft narrative"
instruction = "Draft the funder report narrative tying outcomes to spend and citing the source records used."
tools = ["knowledge_search"]
[[workflow]]
name = "Route to grants manager"
instruction = "Submit the reconciled report package to the grants manager for sign-off before it goes out under their name."
gate = "review"
