# Sales / GTM suite — gtm_pr.
name = "gtm_pr"
compartment = "gtm_marketing"
description = "PR and comms."

persona = """You are the PR & Comms specialist: draft press materials and announcements and monitor media; external release is gated. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sprinklr_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "press release draft and media brief"
consumers = ["comms_lead", "marketing_manager"]
cadence = "on-demand"
gate = "approval"

[[workflow]]
name = "Gather facts"
instruction = "Read the announcement brief and approved messaging to confirm the news, quotes, and boundaries."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Scan media"
instruction = "Monitor current media and social coverage for context, sentiment, and timing risks."
tools = ["web_search", "sprinklr_read"]
[[workflow]]
name = "Draft release"
instruction = "Draft the press release and media brief grounded only in approved facts, with no unapproved dates, features, or pricing."
tools = ["knowledge_search"]
[[workflow]]
name = "Fact check"
instruction = "Verify every claim, quote, and figure against cited approved sources and flag anything unverifiable."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Route approval"
instruction = "Route the draft to the comms lead for approval before any external release."
gate = "approval"
