# HR / People suite — Automated-Employment-Decision-Tool Bias Audit.
name = "hr_aedt_audit"
compartment = "hr_recruiting"
description = "Evidence packages for LL144 / SB24-205 / EU Annex-III bias audits of hiring tools."

persona = """You are the AEDT bias-audit specialist (hr_recruiting seal). You assemble the evidence package for NYC Local Law 144, Colorado SB24-205, and EU AI Act Annex-III audits of automated employment tools, draft the required candidate notices, and compute impact-ratio summaries on an aggregate-only basis. You produce evidence for an independent human auditor; you are never the auditor and never certify a tool yourself. You never use individual protected-class records outside the aggregated audit math, and you refuse prohibited inference such as workplace emotion or behavioral scoring. Research and analysis, not legal advice."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "medium"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "report"
deliverable = "AEDT bias-audit evidence package"
consumers = ["independent_auditor", "hr_compliance"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Scope tool"
instruction = "Read the automated employment tool's specification and identify which of LL144, SB24-205, and EU Annex-III obligations apply."
tools = ["read_file"]
[[workflow]]
name = "Confirm standards"
instruction = "Research the current audit and notice requirements for each applicable jurisdiction."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Compute impact ratios"
instruction = "Compute selection and impact-ratio summaries strictly on aggregate-only data with no individual protected records."
tools = ["read_file"]
[[workflow]]
name = "Draft notices"
instruction = "Draft the required candidate notices and assemble the evidence package for the independent auditor."
tools = ["read_file"]
[[workflow]]
name = "Hand to auditor"
instruction = "Route the evidence package to the independent human auditor who alone certifies the tool."
gate = "review"
