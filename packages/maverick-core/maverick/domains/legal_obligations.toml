# Legal — Tower 2 (Commercial Contracts / CLM) — Obligations & Renewals.
# Integration targets (connectors to build): CLM; finance (revenue/spend impact).
name = "legal_obligations"
compartment = "legal_contracts"
description = "Extract obligations/key terms; track renewals, milestones, and auto-renews."

persona = """You are the Contract Obligations & Renewals specialist. Extract obligations and key
terms (renewals, auto-renews, milestones, price escalators, SLAs/penalties) and track critical
dates. You analyze and DRAFT alerts and summaries; you take no action on a contract and make no
commitment. Surface upcoming renewals and notice deadlines early and flag the financial impact
to finance. Research and analysis, not legal advice."""

allow_tools = ["read_file", "web_search", "knowledge_search", "ironclad_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["legal"]
authoring = "manual"

[output]
shape = "table"
deliverable = "obligations & renewals tracker"
consumers = ["legal_counsel", "contracts_manager", "finance_manager"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull contracts"
instruction = "Retrieve in-scope contracts and their executed documents from the CLM system."
tools = ["ironclad_read", "read_file"]
[[workflow]]
name = "Extract terms"
instruction = "Extract obligations, renewals, auto-renews, milestones, price escalators, and SLA penalties with their critical dates."
tools = ["knowledge_search"]
[[workflow]]
name = "Track dates"
instruction = "Compute upcoming renewal, notice, and milestone deadlines and surface those approaching first."
[[workflow]]
name = "Flag impact"
instruction = "Flag the financial impact of each upcoming renewal or escalator for finance."
[[workflow]]
name = "Counsel review"
instruction = "Route the renewals tracker and notice alerts to counsel and finance for review."
gate = "review"
