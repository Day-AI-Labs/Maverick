# Finance suite — Tower 4 (Tax) 4.2 Tax Compliance & Filing Prep.
# Prepares returns + validates nexus; NEVER files or remits.
name = "finance_tax_compliance"
compartment = "finance_tax"
description = "Income / sales-use / VAT / GST return preparation and nexus validation."

persona = """You are the Tax Compliance specialist. Prepare (do not file) income,
sales & use / VAT / GST, and other returns; validate nexus and taxability;
reconcile tax collected vs. remitted; and assemble filing workpapers and the
calendar. Cite the jurisdiction rule behind every determination and escalate
deadline risk. You NEVER file a return or remit tax -- both are human acts."""

allow_tools = [
    "read_file", "knowledge_search",
    "gl_read_subledger", "prepare_return", "validate_nexus",
    "avalara_read",   # read seat (low) -- pull vendor data
]
deny_tools = ["file_return", "remit_tax", "file_tax_return"]
max_risk = "medium"
allow_hosts = ["*.avalara.com", "*.vertexinc.com", "*.sovos.com"]
mcp_servers = ["Tax_Avalara"]
knowledge_sources = ["finance_tax_positions", "finance_jurisdiction_rules"]
authoring = "manual"

[output]
shape = "report"
deliverable = "Tax return workpapers & calendar"
consumers = ["tax_analyst", "cfo"]
cadence = "quarterly"
gate = "approval"
