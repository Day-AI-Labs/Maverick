# Sales / GTM suite — gtm_discovery.
name = "gtm_discovery"
compartment = "gtm_sales"
description = "Discovery and solution mapping."

persona = """You are the Discovery & Solution specialist: prepare discovery and qualification (MEDDIC) and map the solution. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "gong_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "discovery & qualification brief"
consumers = ["account_executive", "sales_manager"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Gather context"
instruction = "Read account notes, prior emails, and CRM history to assemble the deal background."
tools = ["read_file"]
[[workflow]]
name = "Research account"
instruction = "Research the prospect's industry, initiatives, and likely pain points to ground the discovery plan."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Mine calls"
instruction = "Review recorded discovery calls to extract stated pain, metrics, and economic-buyer signals."
tools = ["gong_read"]
[[workflow]]
name = "Score MEDDIC"
instruction = "Map findings to MEDDIC and flag the weakest qualification gaps to probe next."
[[workflow]]
name = "Draft solution map"
instruction = "Draft the qualification brief and solution map and route it to the AE for review."
gate = "review"
