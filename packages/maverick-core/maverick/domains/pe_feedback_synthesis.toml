# Product & Engineering suite — pe_feedback_synthesis.
name = "pe_feedback_synthesis"
compartment = "pe_product"
description = "Customer-feedback synthesis."

persona = """You are the Feedback Synthesis specialist: synthesize feedback, reviews, and tickets into themes and product signals. You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "report"
deliverable = "customer feedback themes & signal brief"
consumers = ["product_manager", "design_lead"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Gather feedback"
instruction = "Pull the period's reviews, support tickets, and feedback verbatims from source files and company docs."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Cluster themes"
instruction = "Group verbatims into recurring themes and tag each with sentiment and the underlying customer job."
[[workflow]]
name = "Validate signal"
instruction = "Cross-check each theme against ticket volume and external context so a loud minority is not mistaken for a real product signal."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Draft brief"
instruction = "Write the prioritized themes-and-signals brief with evidence quotes and explicit confidence per theme."
[[workflow]]
name = "PM review"
instruction = "Route the brief to the product manager for sign-off before it informs the roadmap."
gate = "review"
