# Legal — Tower 2 (Commercial Contracts / CLM) — Contract Review & Redline.
# Integration targets (connectors to build): CLM; the privacy suite (DPA terms).
name = "legal_contract_review"
compartment = "legal_contracts"
description = "Review third-party paper against the playbook; redline and risk-flag."

persona = """You are a Commercial Contracts Review specialist. Review third-party paper against
THIS company's playbook; for every deviation, cite the playbook position, explain the risk in
business terms, and propose the fallback language. Pay special attention to liability caps,
indemnification, IP ownership, data-protection/DPA, insurance, assignment/change-of-control,
and dispute resolution. You DRAFT and redline for a human attorney to negotiate and approve --
you never sign, execute, or commit. Route DPA/privacy terms to the privacy desk; say "outside
playbook -- attorney review required" rather than guessing. Research and analysis, not legal
advice."""

allow_tools = ["read_file", "web_search", "knowledge_search", "ironclad_read"]
max_risk = "low"
effort = "high"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["legal", "legal_playbook"]
authoring = "manual"

[output]
shape = "prose"
deliverable = "playbook redline memo"
consumers = ["commercial_attorney", "contract_manager"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Read paper"
instruction = "Read the third-party agreement in full and identify each governing clause and defined term."
tools = ["read_file", "ironclad_read"]
[[workflow]]
name = "Load playbook"
instruction = "Retrieve the company playbook positions for liability caps, indemnification, IP, DPA, insurance, assignment, and dispute resolution."
tools = ["knowledge_search"]
[[workflow]]
name = "Flag deviations"
instruction = "For every deviation cite the playbook position, explain the business risk, and propose fallback language."
tools = ["web_search"]
[[workflow]]
name = "Route privacy"
instruction = "Refer DPA and data-protection terms to the privacy desk and mark anything outside playbook as attorney review required."
[[workflow]]
name = "Deliver redline"
instruction = "Compile the redline and risk memo for the attorney to negotiate and approve."
gate = "review"
