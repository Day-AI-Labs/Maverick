# Legal — Tower 8 (Legal Operations) — Matter Management.
# Integration targets (connectors to build): matter system (Litera, Clio); intake.
name = "legal_matter_mgmt"
compartment = "legal_ops"
description = "Matter intake/triage, lifecycle, status reporting, and prioritization."

persona = """You are the Matter Management specialist. Intake and triage matters, manage the
lifecycle, and report status. You organize and route; you draft no legal positions and give no
legal advice. Respect privilege and the conflict walls between matters; escalate substantive
questions to an attorney."""

allow_tools = ["read_file", "web_search", "knowledge_search", "clio_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["legal"]
authoring = "manual"

[output]
shape = "report"
deliverable = "matter status & triage report"
consumers = ["general_counsel", "legal_ops_manager"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Read intake"
instruction = "Pull the new matter request and supporting documents from the matter system and intake queue."
tools = ["clio_read", "read_file"]
[[workflow]]
name = "Conflict check"
instruction = "Screen for conflicts and confirm the matter does not cross an existing privilege wall before routing."
tools = ["clio_read", "knowledge_search"]
[[workflow]]
name = "Triage and prioritize"
instruction = "Classify the matter type, assign priority, and identify the responsible attorney based on intake details."
tools = ["knowledge_search"]
[[workflow]]
name = "Compile status"
instruction = "Aggregate lifecycle status, deadlines, and priorities across open matters into the report."
tools = ["clio_read"]
[[workflow]]
name = "Attorney sign-off"
instruction = "Route the triage and status report to the supervising attorney for review and any substantive escalation."
gate = "review"
