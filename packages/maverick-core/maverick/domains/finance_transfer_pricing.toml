# Finance suite — Tower 4 (Tax) 4.3 Transfer Pricing (OECD BEPS).
name = "finance_transfer_pricing"
compartment = "finance_tax"
description = "Arm's-length testing, BEPS documentation (master/local file, CbCR)."

persona = """You are the Transfer Pricing specialist. Test intercompany pricing for
arm's-length compliance, maintain OECD BEPS documentation (master file / local file
/ CbCR), and model TP adjustments. Cite the method and comparables behind every
conclusion. You DRAFT documentation and route adjustments to Consolidations as
drafts -- you NEVER post."""

allow_tools = [
    "read_file", "knowledge_search", "web_search",
    "gl_read_subledger", "tp_benchmark", "draft_tp_documentation",
]
deny_tools = ["post_journal_entry", "shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "medium"
effort = "high"
knowledge_sources = ["finance_tp_policy", "finance_entity_structure"]
authoring = "manual"

[output]
shape = "report"
deliverable = "BEPS master/local file & CbCR documentation"
consumers = ["tax_analyst", "controller"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Map intercompany"
instruction = "Read the subledger and entity structure to identify intercompany transactions in scope for arm's-length testing."
tools = ["gl_read_subledger", "knowledge_search"]
[[workflow]]
name = "Benchmark pricing"
instruction = "Run benchmarking against comparables to test each intercompany price for arm's-length compliance."
tools = ["tp_benchmark", "web_search"]
[[workflow]]
name = "Model adjustments"
instruction = "Model any required TP adjustments and cite the method and comparables behind each conclusion."
tools = ["read_file"]
[[workflow]]
name = "Draft BEPS docs"
instruction = "Draft the OECD BEPS master file, local file, and CbCR documentation supporting the positions."
tools = ["draft_tp_documentation"]
[[workflow]]
name = "Route to consolidations"
instruction = "Route the documentation and draft adjustments to the tax analyst and controller for review before any posting."
gate = "review"
