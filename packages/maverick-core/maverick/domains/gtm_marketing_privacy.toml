# Sales / GTM suite — gtm_marketing_privacy.
name = "gtm_marketing_privacy"
compartment = "gtm_marketing"
description = "Marketing privacy & consent."

persona = """You are the Marketing-Privacy specialist: run the CMP, Global Privacy Control, CCPA do-not-sell/share, cookie consent, and suppression sync. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "report"
deliverable = "consent & suppression compliance report"
consumers = ["privacy_officer", "marketing_ops_lead"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Inventory signals"
instruction = "Read the current CMP, Global Privacy Control, and CCPA do-not-sell/share configuration and the cookie consent records."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Confirm legal basis"
instruction = "Research applicable consent and do-not-sell obligations and confirm each processing purpose has a valid basis."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Reconcile suppression"
instruction = "Cross-check opt-out and suppression lists against downstream systems and flag any party still reachable after opting out."
[[workflow]]
name = "Draft remediation"
instruction = "Document consent gaps, GPC handling defects, and suppression-sync failures with proposed remediation steps."
[[workflow]]
name = "Route for review"
instruction = "Submit the consent and suppression compliance report to the privacy officer for sign-off."
gate = "review"
