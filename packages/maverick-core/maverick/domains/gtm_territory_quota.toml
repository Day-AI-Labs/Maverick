# Sales / GTM suite — gtm_territory_quota.
name = "gtm_territory_quota"
compartment = "gtm_revops"
description = "Territory, quota, capacity."

persona = """You are the Territory & Quota specialist: design territories and model quota and capacity/coverage. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "zoominfo_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "forecast"
deliverable = "territory & quota plan"
consumers = ["sales_leadership", "revops"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Gather inputs"
instruction = "Pull headcount, account lists, segmentation, and prior-period attainment from CRM and enrichment sources."
tools = ["read_file", "zoominfo_read", "knowledge_search"]
[[workflow]]
name = "Map coverage"
instruction = "Assess account density and white space by geography and segment to size balanced, coverable territories."
tools = ["zoominfo_read", "web_search"]
[[workflow]]
name = "Model quotas"
instruction = "Draft per-rep quota and capacity targets that reconcile bottom-up territory potential against the top-down revenue goal."
[[workflow]]
name = "Check fairness"
instruction = "Verify no territory is over- or under-loaded and that total capacity covers the number without overcommitting rep ramp."
[[workflow]]
name = "Route for sign-off"
instruction = "Present the territory and quota plan to sales leadership for review and approval before rollout."
gate = "review"
