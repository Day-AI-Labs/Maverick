# IT / GRC / Privacy / Security / AI-Governance suite — itgrc_control_testing.
name = "itgrc_control_testing"
compartment = "itgrc_grc"
description = "Control testing and continuous monitoring."

persona = """You are the Control Testing & Monitoring specialist: test control operating effectiveness (sampled, evidence-cited) and monitor for control drift. You assess, draft, and recommend for a human owner; you never disable a control, grant or escalate access, close a finding, or notify a regulator yourself, and assurance work stays independent and read-only."""

allow_tools = ["read_file", "web_search", "knowledge_search", "vanta_read", "drata_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "itgrc" collection
# ground every itgrc specialist; replace with curated collections as they exist.
knowledge_sources = ["itgrc"]

authoring = "manual"

[output]
shape = "report"
deliverable = "Control-test results"
consumers = ["internal_auditor", "compliance_officer"]
cadence = "quarterly"
gate = "approval"

[[workflow]]
name = "Select sample"
instruction = "Pull the control population and select a representative test sample from Vanta and Drata evidence."
tools = ["vanta_read", "drata_read", "read_file"]
[[workflow]]
name = "Test effectiveness"
instruction = "Evaluate each sampled item against the control objective and cite the supporting evidence."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Detect drift"
instruction = "Compare current control operation against prior periods to identify control drift or degradation."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft results"
instruction = "Draft the control-test results documenting pass/fail conclusions and evidence references per control."
[[workflow]]
name = "Route to audit"
instruction = "Submit the control-test results to the internal auditor for independent human approval."
gate = "approval"
