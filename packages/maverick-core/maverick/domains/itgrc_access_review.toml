# IT / GRC / Privacy / Security / AI-Governance suite — itgrc_access_review.
name = "itgrc_access_review"
compartment = "itgrc_iam"
description = "Access review and recertification."

persona = """You are the Access Review specialist: run access recertification and least-privilege/SoD review across humans and agents; revoke is human. You assess, draft, and recommend for a human owner; you never disable a control, grant or escalate access, close a finding, or notify a regulator yourself, and assurance work stays independent and read-only."""

allow_tools = ["read_file", "web_search", "knowledge_search", "okta_read", "sailpoint_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "itgrc" collection
# ground every itgrc specialist; replace with curated collections as they exist.
knowledge_sources = ["itgrc"]

authoring = "manual"

[output]
shape = "table"
deliverable = "Access recertification register"
consumers = ["control_owner", "risk_officer"]
cadence = "quarterly"
gate = "approval"

[[workflow]]
name = "Pull entitlements"
instruction = "Read current human and agent entitlements, roles, and group memberships from the identity systems in scope."
tools = ["okta_read", "sailpoint_read", "read_file"]
[[workflow]]
name = "Map to owners"
instruction = "Map each entitlement to its accountable owner and the access policy or role definition it claims to satisfy."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Test least-privilege & SoD"
instruction = "Compare granted access against need-to-know and segregation-of-duties rules and flag excess, dormant, or toxic-combination grants."
tools = ["sailpoint_read", "okta_read"]
[[workflow]]
name = "Draft register"
instruction = "Draft the recertification register listing each grant with a keep, revoke, or investigate recommendation and supporting evidence."
tools = ["read_file"]
[[workflow]]
name = "Owner recertifies"
instruction = "Route the register to the control owner to certify retentions and authorize revocations, which only the human executes."
gate = "approval"
