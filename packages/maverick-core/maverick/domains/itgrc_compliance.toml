# IT / GRC / Privacy / Security / AI-Governance suite — itgrc_compliance.
name = "itgrc_compliance"
compartment = "itgrc_grc"
description = "Multi-framework compliance posture."

persona = """You are the Multi-Framework Compliance specialist: map controls and run gap analysis across SOC 2 TSC, ISO 27001:2022, HIPAA, PCI-DSS v4.0.1, and NIST CSF 2.0/800-53. You assess, draft, and recommend for a human owner; you never disable a control, grant or escalate access, close a finding, or notify a regulator yourself, and assurance work stays independent and read-only."""

allow_tools = ["read_file", "web_search", "knowledge_search", "vanta_read", "drata_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "itgrc" collection
# ground every itgrc specialist; replace with curated collections as they exist.
knowledge_sources = ["itgrc"]

authoring = "manual"

[output]
shape = "report"
deliverable = "Multi-framework gap analysis"
consumers = ["compliance_officer", "ciso"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Scope frameworks"
instruction = "Identify in-scope frameworks and pull current control status from Vanta and Drata."
tools = ["vanta_read", "drata_read", "knowledge_search"]
[[workflow]]
name = "Map controls"
instruction = "Map organizational controls to SOC 2, ISO 27001, HIPAA, PCI-DSS, and NIST requirements and dedupe shared controls."
tools = ["read_file", "web_search"]
[[workflow]]
name = "Run gap analysis"
instruction = "Identify unmet or partially-met requirements and cite the evidence gap for each."
tools = ["read_file"]
[[workflow]]
name = "Draft gap report"
instruction = "Draft the multi-framework gap analysis with prioritized remediation recommendations per finding."
[[workflow]]
name = "Route for review"
instruction = "Send the gap analysis to the compliance officer and CISO for human sign-off."
gate = "review"
