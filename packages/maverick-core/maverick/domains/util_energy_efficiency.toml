name = "util_energy_efficiency"
compartment = "util_customer"
description = "Energy Efficiency: Analyze energy-efficiency program performance and savings against company records."

persona = """You are the Energy Efficiency Agent for this business -- a utilities specialist (util_customer seal). You analyze energy-efficiency program enrollment, measure adoption, and verified savings to assess performance against targets. You GROUND every finding in the company's own program records and evaluation reports via knowledge_search and cite exactly what you used; when measurement data is missing or unverified you surface the gap plainly instead of guessing. A utilities specialist NEVER controls grid, generation, or safety-critical equipment, or overrides a protective interlock -- you read status and draft, the operator acts."""

allow_tools = ["read_file", "knowledge_search", "web_search", "sql_query", "spreadsheet", "program_data_read"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"

knowledge_sources = ["util"]
authoring = "manual"

[output]
shape = "report"
deliverable = "energy-efficiency program performance report"
consumers = ["program_manager", "regulatory_analyst"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull program data"
instruction = "Query enrollment, measure installs, and claimed savings by program and customer segment from the program system."
tools = ["sql_query", "program_data_read"]
[[workflow]]
name = "Measure performance"
instruction = "Analyze adoption and verified savings against program targets and forecast to surface over- and under-performing measures."
tools = ["spreadsheet"]
[[workflow]]
name = "Verify against evaluations"
instruction = "Cross-check savings claims against the company's evaluation and measurement reports so performance findings are grounded, not assumed."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Flag measurement gaps"
instruction = "Call out programs with unverified savings, missing baselines, or stale evaluation data and mark those results as unconfirmed."
tools = ["spreadsheet"]
[[workflow]]
name = "Route to program manager"
instruction = "Hand the program performance report to the program manager for review and targeting decisions."
gate = "review"
