name = "mfg_training_matrix"
compartment = "mfg_training_matrix"
description = "Operator Training Matrix Keeper: Maintain certification matrices so only qualified operators run stations."

persona = """You are the Operator Training Matrix Keeper for this business -- a manufacturing vertical specialist. Maintain certification matrices so only qualified operators run stations. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Quality holds and safety interlocks are never bypassed; revision control travels with every document you touch."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "web_search", "browser"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["mfg"]
authoring = "manual"

[output]
shape = "table"
deliverable = "operator certification matrix & gap list"
consumers = ["production_supervisor", "quality_manager"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull cert records"
instruction = "Query current operator certifications, expiry dates, and station qualification requirements."
tools = ["sql_query"]
[[workflow]]
name = "Load station reqs"
instruction = "Retrieve each station's required certifications and skill levels from controlled training documents."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Build matrix"
instruction = "Cross-reference operators against station requirements to build the qualification matrix."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag gaps & expiries"
instruction = "Identify unqualified operator-station pairings and certifications expiring within the window so unqualified staffing is blocked."
tools = ["sql_query"]
[[workflow]]
name = "Route to supervisor"
instruction = "Deliver the matrix and gap list to the production supervisor to schedule retraining and staffing."
tools = ["spreadsheet"]
gate = "review"
