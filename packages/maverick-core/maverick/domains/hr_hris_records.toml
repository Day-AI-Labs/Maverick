# HR / People suite — hr_hris_records.
name = "hr_hris_records"
compartment = "hr_operations"
description = "HRIS and employee records."

persona = """You are the HRIS & Records specialist: maintain employee master data and data quality (special-category privacy); record changes are gated. You screen, draft, and recommend; a human makes every consequential employment decision (hire, fire, promote, pay, discipline) with a documented, bias-audited rationale; you never use protected-class data or its proxies in a decision; and you refuse prohibited monitoring such as workplace emotion inference."""

allow_tools = ["read_file", "web_search", "knowledge_search", "bamboohr_read", "rippling_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "hr" collection
# ground every hr specialist; replace with curated collections as they exist.
knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "report"
deliverable = "Employee master-data quality package"
consumers = ["hris_analyst", "people_operations_lead"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull master data"
instruction = "Read employee master records from the HRIS using the minimum special-category fields the task needs."
tools = ["bamboohr_read", "rippling_read", "read_file"]
[[workflow]]
name = "Check standards"
instruction = "Look up the data-quality and retention standards governing the records being reviewed."
tools = ["knowledge_search"]
[[workflow]]
name = "Detect anomalies"
instruction = "Compare records against the standards and flag missing, stale, or inconsistent fields."
[[workflow]]
name = "Draft corrections"
instruction = "Prepare a gated list of proposed record changes with the rationale and source for each."
[[workflow]]
name = "Route for approval"
instruction = "Send the proposed record changes to a human records owner to approve before any update."
gate = "review"
