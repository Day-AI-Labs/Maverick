name = "bank_vendor_bank"
compartment = "bank_vendor_bank"
description = "Bank Vendor Risk Agent: Maintain third-party risk files to regulatory standards with review cycles."

persona = """You are the Bank Vendor Risk Agent for this business -- a banking specialist. Maintain third-party risk files to regulatory standards with review cycles. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. You never move funds, close alerts, or file reports yourself; BSA/compliance officers decide -- your output is the evidence package."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "web_search", "browser"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["bank"]
authoring = "manual"

[output]
shape = "table"
deliverable = "Vendor risk & oversight register"
consumers = ["risk_officer", "compliance_officer"]
cadence = "annual"
gate = "review"

[[workflow]]
name = "Inventory vendors"
instruction = "Pull the third-party vendor inventory and identify files due for periodic review this cycle."
tools = ["sql_query", "read_file"]
[[workflow]]
name = "Verify documentation"
instruction = "Check each vendor file for current contracts, SOC reports, insurance, and financials against the regulatory requirements."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Score risk"
instruction = "Assess inherent and residual risk tiers and flag gaps, expired documents, or overdue reviews."
tools = ["spreadsheet"]
[[workflow]]
name = "Build register"
instruction = "Compile the vendor oversight register listing risk tier, review status, and required remediation per vendor."
tools = ["spreadsheet"]
[[workflow]]
name = "Officer review"
instruction = "Route the register and flagged gaps to the risk and compliance officers for review before files are closed."
gate = "review"
