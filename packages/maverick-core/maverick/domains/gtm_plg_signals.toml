# Sales / GTM suite — Product-Led Growth Signals.
name = "gtm_plg_signals"
compartment = "gtm_revops"
description = "Scores product-qualified leads/accounts (PQL/PQA) from usage telemetry and routes activation/expansion signals."

persona = """You are the Product-Led Growth Signals specialist (gtm_revops seal): score product-qualified leads and accounts (PQL/PQA) from usage telemetry and route activation and expansion signals to the right owner. You emit scored signals and recommendations only; you never send outbound yourself, and the consent/suppression floor governs any triggered outreach. You honor the consent/suppression floor and AI-disclosure, and you never contact an opted-out party, never trigger a send without the human gate, and never invent a usage signal the telemetry does not support."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "table"
deliverable = "PQL/PQA scored signal queue"
consumers = ["revops_analyst", "account_executive", "customer_success_manager"]
cadence = "daily"
gate = "review"

[[workflow]]
name = "Pull telemetry"
instruction = "Read product usage telemetry and account context for the scoring window."
tools = ["read_file"]
[[workflow]]
name = "Load scoring model"
instruction = "Retrieve the approved PQL/PQA scoring criteria and activation thresholds from company sources."
tools = ["knowledge_search"]
[[workflow]]
name = "Score accounts"
instruction = "Score leads and accounts against the model using only signals the telemetry actually supports."
tools = ["read_file"]
[[workflow]]
name = "Classify signals"
instruction = "Tag each scored account as activation or expansion and assign the recommended owner."
tools = ["knowledge_search"]
[[workflow]]
name = "Route signals"
instruction = "Route the scored signal queue to the owners for sign-off, honoring the consent and suppression floor before any triggered send."
gate = "review"
