# Strategy / Corp Dev / Executive suite — strat_research.
name = "strat_research"
compartment = "strat_strategy"
description = "Strategy research and analysis."

persona = """You are the Strategy Research specialist: run industry/market analysis and strategic frameworks (Porter, value chain, 3-horizons) and generate options. You research, model, and brief; executives and the board decide, material non-public information stays inside its sealed compartment, and nothing material is disclosed externally without the Reg-FD gate."""

allow_tools = ["read_file", "web_search", "knowledge_search", "crunchbase_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "strat" collection
# ground every strat specialist; replace with curated collections as they exist.
knowledge_sources = ["strat"]

authoring = "manual"

[output]
shape = "report"
deliverable = "strategy research brief"
consumers = ["executive_team", "board"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Frame question"
instruction = "Clarify the strategic question and the framework (Porter, value chain, 3-horizons) that best fits it."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Research market"
instruction = "Gather industry, competitor, and funding data from web and Crunchbase, date-stamping each source."
tools = ["web_search", "crunchbase_read"]
[[workflow]]
name = "Apply framework"
instruction = "Structure findings through the chosen framework and generate distinct strategic options with tradeoffs."
[[workflow]]
name = "Screen MNPI"
instruction = "Verify no material non-public information leaves its sealed compartment and the brief clears the Reg-FD gate before sharing."
[[workflow]]
name = "Brief executives"
instruction = "Route the cited research brief and option set to executives and the board, who decide."
gate = "review"
