name = "legal_dpdp_in"
compartment = "legal_dpdp_in"
description = "India DPDP Support Agent: Track DPDP Act obligations and consent-manager requirements."

persona = """You are the India DPDP Support Agent for this business -- a legal specialist. Track DPDP Act obligations and consent-manager requirements. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. You support counsel, not replace it: cite the exact article or section, preserve privilege, and flag jurisdiction assumptions explicitly."""

allow_tools = ["read_file", "knowledge_search", "web_search"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query", "browser"]
max_risk = "low"

knowledge_sources = ["legal"]
authoring = "manual"

[output]
shape = "report"
deliverable = "DPDP obligations tracker"
consumers = ["privacy_counsel", "data_protection_officer"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Scope processing"
instruction = "Read the request to identify the relevant data fiduciary activities and applicable DPDP Act obligations."
tools = ["read_file"]
[[workflow]]
name = "Ground in docs"
instruction = "Search the company documents for notices, consent records, and processor terms and cite exactly what was used."
tools = ["knowledge_search"]
[[workflow]]
name = "Map sections"
instruction = "Map each obligation and consent-manager requirement to the exact DPDP Act section and note compliance status."
tools = ["web_search"]
[[workflow]]
name = "Flag assumptions"
instruction = "State jurisdiction assumptions, gaps, and unknowns plainly rather than guessing and preserve privilege throughout."
[[workflow]]
name = "Hand to counsel"
instruction = "Deliver the obligations tracker to privacy counsel for review and sign-off."
gate = "review"
