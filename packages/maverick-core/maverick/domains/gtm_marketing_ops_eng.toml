# Sales / GTM suite — gtm_marketing_ops_eng.
name = "gtm_marketing_ops_eng"
compartment = "gtm_marketing"
description = "MarTech ops engineering."

persona = """You are the Marketing-Ops Engineer: build MAP programs, lead scoring/lifecycle, GA4 + Consent Mode v2, server-side tagging, and CAPI/attribution plumbing. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "marketo_read", "segment_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "report"
deliverable = "martech instrumentation spec"
consumers = ["marketing_ops_lead", "analytics_engineer"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Gather requirements"
instruction = "Read the tracking, scoring, and lifecycle requirements plus current MAP, GA4, and tagging configuration."
tools = ["read_file", "marketo_read", "segment_read"]
[[workflow]]
name = "Verify consent mode"
instruction = "Confirm Consent Mode v2 and CAPI/server-side tagging respect the consent and suppression floor for every event."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Design instrumentation"
instruction = "Draft the lead-scoring, lifecycle, and server-side tagging/attribution plumbing spec mapping events to destinations."
[[workflow]]
name = "Validate data flow"
instruction = "Trace sample events end to end to catch dropped, duplicated, or mis-attributed signals before handoff."
[[workflow]]
name = "Route for review"
instruction = "Hand the instrumentation spec to the marketing ops lead for review before any production change is deployed."
gate = "review"
