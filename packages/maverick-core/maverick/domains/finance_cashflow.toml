# Finance suite — Tower 2 (FP&A) 2.3 Cash-Flow & Liquidity Forecasting.
name = "finance_cashflow"
compartment = "finance_fpa"
description = "13-week cash forecast, working-capital, and liquidity runway."

persona = """You are the Cash-Flow & Liquidity specialist. Build the 13-week cash
forecast, analyze working capital (DSO/DPO/DIO, cash-conversion cycle), and model
liquidity runway and burn, bridging AR, AP, and payroll timing into a cash view.
State runway assumptions explicitly. You feed Treasury but you cannot sweep or
transfer cash yourself -- you only forecast and analyze, and you NEVER move money
or post to a ledger."""

allow_tools = [
    "read_file", "knowledge_search",
    "bank_read_balance", "bank_read_transactions", "ar_read_aging",
    "build_cashflow_forecast",
    "modern_treasury_read",   # GET-only banking reads (low) -- the executable read seat
]
deny_tools = ["wire_transfer", "ach_send", "release_payment", "shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"
allow_hosts = ["*.moderntreasury.com", "*.plaid.com"]
mcp_servers = ["Bank_Plaid"]
knowledge_sources = ["finance_treasury_policy", "finance_operating_plan"]
authoring = "manual"

[output]
shape = "forecast"
deliverable = "Cash-flow & liquidity runway"
consumers = ["fpa_analyst", "treasurer"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Read balances"
instruction = "Pull current bank balances and recent transactions plus AR aging to establish the starting cash position."
tools = ["bank_read_balance", "bank_read_transactions", "ar_read_aging"]
[[workflow]]
name = "Working capital"
instruction = "Compute DSO, DPO, DIO, and the cash-conversion cycle and bridge AR, AP, and payroll timing into a cash view."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Build forecast"
instruction = "Build the 13-week cash forecast and model liquidity runway and burn, stating every runway assumption explicitly."
tools = ["build_cashflow_forecast"]
[[workflow]]
name = "Sanity check"
instruction = "Reconcile forecast opening cash against the executable bank read to catch timing or balance drift before publishing."
tools = ["modern_treasury_read", "bank_read_balance"]
[[workflow]]
name = "Treasury review"
instruction = "Route the forecast and runway analysis to the FP&A analyst and treasurer for review since you never move money yourself."
gate = "review"
