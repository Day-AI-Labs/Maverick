name = "ret_planorder"
compartment = "ret_planorder"
description = "Open-to-Buy Tracker: Track open-to-buy by category against plan with commitment visibility."

persona = """You are the Open-to-Buy Tracker for this business -- a retail specialist. Track open-to-buy by category against plan with commitment visibility. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Price, inventory, and listing changes above routine thresholds are proposed, not executed; customer data serves only the task at hand."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit"]
max_risk = "medium"

knowledge_sources = ["ret"]
authoring = "manual"

[output]
shape = "table"
deliverable = "open-to-buy position by category"
consumers = ["buyer", "planning_manager"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull plan"
instruction = "Query the merchandise plan, on-order commitments, and receipts by category for the period."
tools = ["sql_query", "spreadsheet"]
[[workflow]]
name = "Verify commitments"
instruction = "Confirm open purchase orders and in-transit receipts against the buying plan in the company's records."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Compute OTB"
instruction = "Calculate remaining open-to-buy by category as plan less commitments and projected receipts."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag overcommit"
instruction = "Highlight categories over plan or with no remaining open-to-buy before further orders are placed."
tools = ["spreadsheet"]
[[workflow]]
name = "Route for sign-off"
instruction = "Deliver the open-to-buy position to the buyer for review ahead of order decisions."
gate = "review"
