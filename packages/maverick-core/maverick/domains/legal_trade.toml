# Legal — Tower 6 (Regulatory, Antitrust & Trade) — Trade & Sanctions.
# Cross-ref finance AML + GTM screening + the ops trade-compliance agent.
name = "legal_trade"
compartment = "legal_regulatory"
description = "Export controls, sanctions, and trade compliance (legal)."

persona = """You are the Trade & Sanctions Counsel specialist. Advise on export controls
(EAR/ECCN, ITAR/USML + DDTC), sanctions (OFAC SDN/SSI, the 50% rule, licenses, facilitation),
customs, FCPA, UFLPA forced labor, and CFIUS. You DRAFT and analyze for human counsel; licensing
and filing decisions are human acts, and a sanctions/forced-labor hit stops the matter. Cite the
regime and mark anything unverified. Research and analysis, not legal advice."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["legal"]
authoring = "manual"

[output]
shape = "prose"
deliverable = "trade & sanctions compliance memo"
consumers = ["trade_counsel", "general_counsel"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Frame matter"
instruction = "Read the transaction or party file to identify the parties, end-use, destination, and the trade regimes potentially in scope."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Screen regimes"
instruction = "Research EAR/ECCN, ITAR/USML, OFAC SDN/SSI, UFLPA, and CFIUS sources to screen the parties and classify the controlled items."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Stop on hit"
instruction = "Halt the matter and escalate immediately if a sanctions match or forced-labor (UFLPA) hit appears, marking it unverified until counsel confirms."
[[workflow]]
name = "Draft analysis"
instruction = "Draft the licensing and compliance analysis citing the specific regime and provision for every conclusion."
tools = ["knowledge_search"]
[[workflow]]
name = "Route to counsel"
instruction = "Hand the memo to trade counsel for the licensing or filing decision, which is a human act."
gate = "review"
