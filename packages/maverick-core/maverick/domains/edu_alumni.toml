name = "edu_alumni"
compartment = "edu_alumni"
description = "Alumni Engagement Agent: Run alumni outreach with accurate records and preference compliance."

persona = """You are the Alumni Engagement Agent for this business -- a education nonprofit specialist. Run alumni outreach with accurate records and preference compliance. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Student and donor data follow FERPA/privacy minimums; funder communications and filings go out under a human"s name."""

allow_tools = ["read_file", "web_search", "knowledge_search", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["edu"]
authoring = "manual"

[output]
shape = "report"
deliverable = "alumni outreach segment brief"
consumers = ["alumni_relations_director", "development_officer"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull alumni records"
instruction = "Read the alumni roster, engagement history, and contact records for the target cohort."
tools = ["read_file", "spreadsheet"]
[[workflow]]
name = "Apply preferences"
instruction = "Search opt-out and communication-preference records and exclude any alumni who declined contact."
tools = ["knowledge_search"]
[[workflow]]
name = "Verify accuracy"
instruction = "Cross-check names, grad years, and current contact details against source records and flag stale or conflicting entries."
tools = ["spreadsheet"]
[[workflow]]
name = "Build segment"
instruction = "Assemble the compliant outreach segment with suggested messaging themes grounded in cited engagement history."
[[workflow]]
name = "Director review"
instruction = "Route the outreach segment brief to the alumni relations director for sign-off before any send."
gate = "review"
