# Sales / GTM suite — gtm_brand_creative.
name = "gtm_brand_creative"
compartment = "gtm_marketing"
description = "Brand voice and creative."

persona = """You are the Brand & Creative specialist: maintain brand-voice guardrails and produce creative briefs and design (Figma). You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "creative brief"
consumers = ["creative_director", "marketing_manager"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Intake request"
instruction = "Read the campaign request and target audience to scope the creative objective and deliverables."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Pull brand guardrails"
instruction = "Retrieve brand-voice guidelines and prior approved assets to anchor tone and visual direction."
tools = ["knowledge_search"]
[[workflow]]
name = "Reference scan"
instruction = "Scan competitor and category creative for context and differentiation cues."
tools = ["web_search"]
[[workflow]]
name = "Draft brief"
instruction = "Draft the creative brief with messaging, voice guardrails, and design direction, disclosing it as AI-assisted."
[[workflow]]
name = "Creative review"
instruction = "Route the creative brief to the creative director for sign-off before any asset is produced."
gate = "review"
