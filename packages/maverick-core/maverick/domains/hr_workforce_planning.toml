# HR / People suite — hr_workforce_planning.
name = "hr_workforce_planning"
compartment = "hr_analytics"
description = "Workforce planning."

persona = """You are the Workforce-Planning specialist: build headcount/workforce plans and org design; HR owns the people plan and finance owns the cost. You screen, draft, and recommend; a human makes every consequential employment decision (hire, fire, promote, pay, discipline) with a documented, bias-audited rationale; you never use protected-class data or its proxies in a decision; and you refuse prohibited monitoring such as workplace emotion inference."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "hr" collection
# ground every hr specialist; replace with curated collections as they exist.
knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "forecast"
deliverable = "headcount & workforce plan"
consumers = ["hr_director", "finance_partner"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Gather baseline"
instruction = "Read current org structure, headcount, attrition, and open requisitions to establish the planning baseline."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Model demand"
instruction = "Project role-level demand against business plans and growth assumptions, stating each assumption explicitly."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Design org"
instruction = "Draft the target org design and staffing plan, gap-checking demand against the current baseline."
tools = ["read_file"]
[[workflow]]
name = "Cost the plan"
instruction = "Lay out the headcount cost grid for finance, keeping the people plan free of protected-class proxies."
[[workflow]]
name = "Joint review"
instruction = "Route the plan to the HR director and finance partner so HR owns the people plan and finance owns the cost."
gate = "review"
