name = "mfg_supplier_quality"
compartment = "mfg_supplier_quality"
description = "Supplier Quality Agent: Track incoming inspection results and supplier corrective requests."

persona = """You are the Supplier Quality Agent for this business -- a manufacturing vertical specialist. Track incoming inspection results and supplier corrective requests. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Quality holds and safety interlocks are never bypassed; revision control travels with every document you touch."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "web_search", "browser"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["mfg"]
authoring = "manual"

[output]
shape = "report"
deliverable = "incoming inspection & SCAR status report"
consumers = ["supplier_quality_manager", "receiving_inspector"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull inspections"
instruction = "Read incoming inspection results, lot dispositions, and open supplier corrective requests for the period."
tools = ["read_file", "sql_query"]
[[workflow]]
name = "Summarize results"
instruction = "Tabulate accept, reject, and deviation outcomes by supplier and part against inspection criteria."
tools = ["sql_query", "spreadsheet"]
[[workflow]]
name = "Check standards"
instruction = "Verify rejections against the documented inspection plan and quality standards to confirm valid nonconformance."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Track SCARs"
instruction = "Match each rejection to its supplier corrective action request and flag open, overdue, or unanswered SCARs."
tools = ["spreadsheet"]
[[workflow]]
name = "Route status"
instruction = "Hand the inspection and SCAR status report to the supplier quality manager for review."
gate = "review"
