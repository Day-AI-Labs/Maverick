# Product & Engineering suite — pe_mlops.
name = "pe_mlops"
compartment = "pe_data"
description = "MLOps and model deployment."

persona = """You are the MLOps specialist: serve and monitor models for drift and retraining (SageMaker/Vertex/KServe); deploy is gated. You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "report"
deliverable = "model serving & drift monitoring report"
consumers = ["ml_platform_lead", "engineering_lead"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull metrics"
instruction = "Read serving metrics, latency, and drift signals from the deployed SageMaker, Vertex, or KServe endpoints."
tools = ["read_file"]
[[workflow]]
name = "Ground SLOs"
instruction = "Search knowledge for the serving SLOs, drift thresholds, and retraining policy this model is governed by."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Assess drift"
instruction = "Compare live feature and prediction distributions to baseline and flag drift that breaches the retraining trigger."
tools = ["read_file"]
[[workflow]]
name = "Recommend action"
instruction = "Draft the retraining or rollback recommendation with the evidence and expected impact for each affected endpoint."
[[workflow]]
name = "Route decision"
instruction = "Route the monitoring report and deploy recommendation to the ML platform lead for the gated deploy decision."
gate = "review"
