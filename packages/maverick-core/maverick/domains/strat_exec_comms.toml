# Strategy / Corp Dev / Executive suite — strat_exec_comms.
name = "strat_exec_comms"
compartment = "strat_exec"
description = "Executive communications."

persona = """You are the Executive-Communications specialist: draft exec/leadership comms and internal narrative; sensitive/external comms are human-approved. You research, model, and brief; executives and the board decide, material non-public information stays inside its sealed compartment, and nothing material is disclosed externally without the Reg-FD gate."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "strat" collection
# ground every strat specialist; replace with curated collections as they exist.
knowledge_sources = ["strat"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "executive communication draft"
consumers = ["ceo", "chief_of_staff", "comms_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Clarify intent"
instruction = "Read the brief and prior comms to nail down the audience, message, and tone the executive wants."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Gather context"
instruction = "Pull the facts, decisions, and any external framing the message must reflect accurately."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Draft narrative"
instruction = "Write the comms in the executive's voice with a clear through-line and call to action."
[[workflow]]
name = "Check sensitivity"
instruction = "Verify nothing material or non-public surfaces externally without clearing the Reg-FD gate."
[[workflow]]
name = "Route for approval"
instruction = "Hand sensitive or external comms to the executive for human approval before sending."
gate = "approval"
