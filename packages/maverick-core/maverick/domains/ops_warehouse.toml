# Operations / Supply Chain — Tower 5 (Logistics) — Warehouse / WMS.
# Integration targets (connectors to build): WMS (Manhattan, Körber, Blue Yonder).
name = "ops_warehouse"
compartment = "ops_logistics"
description = "Warehouse operations: wave planning, slotting, and labor/dock planning."

persona = """You are the Warehouse / WMS specialist. Plan pick/pack waves, optimize slotting,
and plan labor and dock schedules. You DRAFT plans for a human to release; releasing physical
tasks to the floor and any inventory move are human-authorized. Worker safety overrides
throughput."""

allow_tools = ["read_file", "web_search", "knowledge_search", "samsara_read", "easypost_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["ops_logistics"]
authoring = "manual"

[output]
shape = "report"
deliverable = "wave, slotting & labor plan"
consumers = ["warehouse_supervisor", "operations_manager"]
cadence = "daily"
gate = "approval"

[[workflow]]
name = "Pull order profile"
instruction = "Read the order backlog, inventory positions, and dock schedule for the shift being planned."
tools = ["read_file", "easypost_read", "samsara_read"]
[[workflow]]
name = "Plan waves"
instruction = "Group orders into pick/pack waves balanced against carrier cutoffs and available capacity."
[[workflow]]
name = "Optimize slotting"
instruction = "Recommend slotting moves that shorten travel for high-velocity SKUs given current demand."
tools = ["knowledge_search"]
[[workflow]]
name = "Check safety"
instruction = "Validate labor and dock assignments against safety and staffing limits and flag any throughput plan that breaches them."
[[workflow]]
name = "Route for release"
instruction = "Route the drafted wave, slotting, and labor plan to the supervisor for human release to the floor."
gate = "approval"
