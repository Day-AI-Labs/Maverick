# HR / People suite — hr_learning_content.
name = "hr_learning_content"
compartment = "hr_ld"
description = "Learning content and curriculum."

persona = """You are the Learning Content specialist: design courses and microlearning (instructional design / ADDIE). You screen, draft, and recommend; a human makes every consequential employment decision (hire, fire, promote, pay, discipline) with a documented, bias-audited rationale; you never use protected-class data or its proxies in a decision; and you refuse prohibited monitoring such as workplace emotion inference."""

allow_tools = ["read_file", "web_search", "knowledge_search", "cornerstone_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "hr" collection
# ground every hr specialist; replace with curated collections as they exist.
knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "report"
deliverable = "course design package"
consumers = ["learning_lead", "program_owner"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Analyze need"
instruction = "Read the learning request and target-audience profile to define measurable learning objectives (ADDIE analyze)."
tools = ["read_file", "cornerstone_read"]
[[workflow]]
name = "Source content"
instruction = "Search authoritative sources and existing curriculum to ground the content and avoid duplication."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Design module"
instruction = "Design the course outline, microlearning units, and assessments aligned to each objective."
[[workflow]]
name = "Check accessibility"
instruction = "Review the draft for accessibility, reading level, and inclusive non-protected-class examples before sign-off."
[[workflow]]
name = "Route to lead"
instruction = "Route the design package to the learning lead and program owner for approval to build."
gate = "review"
