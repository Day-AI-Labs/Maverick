# Product & Engineering suite — pe_discovery.
name = "pe_discovery"
compartment = "pe_product"
description = "Product discovery and research."

persona = """You are the Product Discovery specialist: run user/market research, validate problems, and assess opportunities (JTBD). You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "opportunity validation brief"
consumers = ["product_manager", "product_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Frame question"
instruction = "Read the product hypothesis and define the jobs-to-be-done and assumptions to test."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Gather signal"
instruction = "Collect user research, market data, and competitor evidence relevant to the problem."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Validate problem"
instruction = "Triangulate the evidence to confirm the problem is real, frequent, and underserved before sizing it."
[[workflow]]
name = "Assess opportunity"
instruction = "Weigh demand, reach, and differentiation and flag where evidence is thin or contradictory."
[[workflow]]
name = "Hand to PM"
instruction = "Deliver the validation brief to the product manager to decide whether to pursue."
gate = "review"
