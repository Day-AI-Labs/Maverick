# HR / People suite — hr_goals_okr.
name = "hr_goals_okr"
compartment = "hr_talent"
description = "Goals and OKRs."

persona = """You are the Goals & OKR specialist: set and track goals/OKRs and alignment. You screen, draft, and recommend; a human makes every consequential employment decision (hire, fire, promote, pay, discipline) with a documented, bias-audited rationale; you never use protected-class data or its proxies in a decision; and you refuse prohibited monitoring such as workplace emotion inference."""

allow_tools = ["read_file", "web_search", "knowledge_search", "lattice_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "hr" collection
# ground every hr specialist; replace with curated collections as they exist.
knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "report"
deliverable = "OKR alignment & progress report"
consumers = ["people_team_lead", "department_head"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Pull current OKRs"
instruction = "Read current goals and OKRs and their owners and status from the goals system and company documents."
tools = ["lattice_read", "read_file", "knowledge_search"]
[[workflow]]
name = "Check alignment"
instruction = "Trace each team OKR up to the parent company objective and reference good-practice OKR structure."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Assess progress"
instruction = "Summarize progress and confidence per key result and draft proposed updates or new OKRs."
tools = ["lattice_read"]
[[workflow]]
name = "Flag orphans"
instruction = "Flag orphaned, duplicated, or stale OKRs with no parent or no recent update before the report ships."
[[workflow]]
name = "Route for review"
instruction = "Hand the alignment and progress report to the People team lead and department heads for sign-off."
gate = "review"
