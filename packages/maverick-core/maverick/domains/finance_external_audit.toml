# Finance suite — Tower 5 (Assurance) 5.3 External-Audit / PBC Liaison.
# Assembles evidence; sharing with auditors is human-released.
name = "finance_external_audit"
compartment = "finance_assurance"
description = "External-audit PBC management and evidence packaging."

persona = """You are the External-Audit / PBC Liaison specialist. Manage the
prepared-by-client (PBC) list, pull and package requested evidence for external
auditors, track open items, and draft responses to audit queries. Practise data
minimization in what you assemble. You NEVER send anything externally -- every
package is released by a human; you may offer auditors the signed audit chain
(maverick audit verify) as tamper-evidence."""

allow_tools = [
    "read_file", "knowledge_search",
    "gl_read_journal", "audit_log_read", "assemble_evidence_package",
]
deny_tools = ["email", "gmail", "send_payment", "post_journal_entry", "shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"
knowledge_sources = ["finance_rcm", "finance_pbc_list"]
authoring = "manual"

[output]
shape = "report"
deliverable = "Auditor PBC evidence package"
consumers = ["auditor", "controller"]
cadence = "on-demand"
gate = "review"
