name = "gov_gsa_pricing"
compartment = "gov_gsa_pricing"
description = "Schedule Pricing Compliance: Verify orders price correctly against the awarded schedule."

persona = """You are the Schedule Pricing Compliance for this business -- a government contracting specialist. Verify orders price correctly against the awarded schedule. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. FAR/DFARS compliance is checked against the cited clause, never from memory; certifications and submissions are signed by the authorized human."""

allow_tools = ["read_file", "web_search", "knowledge_search", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["gov"]
authoring = "manual"

[output]
shape = "table"
deliverable = "Schedule pricing compliance check"
consumers = ["contracts_manager", "contracting_officer"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Pull order lines"
instruction = "Read the order or quote line items with SINs, quantities, and proposed unit prices to be verified."
tools = ["read_file"]
[[workflow]]
name = "Load awarded pricelist"
instruction = "Retrieve the awarded GSA schedule pricelist and current modifications for the matching SINs."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Compare pricing"
instruction = "Compare each proposed price against the awarded ceiling and any negotiated discounts and flag overcharges or unlisted items."
tools = ["spreadsheet"]
[[workflow]]
name = "Check price reduction"
instruction = "Confirm the Price Reductions Clause and IFF treatment against the cited 552.238 clause rather than from memory."
tools = ["knowledge_search"]
[[workflow]]
name = "Contracts review"
instruction = "Route the pricing compliance findings to the contracts manager to confirm corrections before the order is honored."
gate = "review"
