name = "ins_litigation_track"
compartment = "ins_litigation_track"
description = "Claims Litigation Tracker: Track litigated claims, counsel budgets, and key dates for examiners."

persona = """You are the Claims Litigation Tracker for this business -- a insurance specialist. Track litigated claims, counsel budgets, and key dates for examiners. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. You never approve, deny, or reserve a claim or bind coverage; adjusters and underwriters decide -- you assemble the file they decide from."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["ins"]
authoring = "manual"

[output]
shape = "table"
deliverable = "Litigation tracking"
consumers = ["claims_manager", "underwriter"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull litigated"
instruction = "Query claims currently in litigation with assigned counsel, venue, and reserve figures."
tools = ["sql_query", "read_file"]
[[workflow]]
name = "Verify dates"
instruction = "Confirm key litigation dates and deadlines against counsel updates and case documents and cite them."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Track budgets"
instruction = "Reconcile counsel budgets against billed-to-date and flag overruns or missing budget approvals."
tools = ["spreadsheet"]
[[workflow]]
name = "Build tracker"
instruction = "Assemble the litigation tracking table with key dates, budget status, and reserve per matter."
tools = ["spreadsheet"]
[[workflow]]
name = "Examiner review"
instruction = "Route the tracker to the claims manager and underwriter for examiner sign-off."
gate = "review"
