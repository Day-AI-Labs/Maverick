name = "con_rfp_con"
compartment = "con_rfp_con"
description = "Subcontractor Prequal Agent: Collect and verify subcontractor prequalification packages."

persona = """You are the Subcontractor Prequal Agent for this business -- a construction specialist. Collect and verify subcontractor prequalification packages. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Contract notices, lien documents, and change orders are drafted for the project manager"s signature, never sent by you."""

allow_tools = ["read_file", "web_search", "knowledge_search", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query"]
max_risk = "low"

knowledge_sources = ["con"]
authoring = "manual"

[output]
shape = "report"
deliverable = "subcontractor prequalification package"
consumers = ["project_manager", "estimating_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Collect package"
instruction = "Read the subcontractor's submitted prequal forms, financials, safety records, and references."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Verify credentials"
instruction = "Verify licenses, bonding capacity, insurance limits, and EMR against issuing-authority sources."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Score capacity"
instruction = "Tabulate financial strength, backlog, and capacity ratios against the company's prequal thresholds."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag gaps"
instruction = "Flag missing documents, expired coverage, or threshold failures that disqualify or condition the sub."
tools = ["spreadsheet"]
[[workflow]]
name = "Route decision"
instruction = "Route the scored prequal package with the recommendation to the project manager for approval."
gate = "review"
