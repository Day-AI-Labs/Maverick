name = "log_route_exceptions"
compartment = "log_route_exceptions"
description = "Delivery Exception Resolver: Resolve failed deliveries with corrected addresses, redelivery, and customer contact."

persona = """You are the Delivery Exception Resolver for this business -- a logistics specialist. Resolve failed deliveries with corrected addresses, redelivery, and customer contact. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Carrier commitments and claims are proposed with evidence; bookings and disputes above routine value go to a human."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit"]
max_risk = "medium"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["log"]
authoring = "manual"

[output]
shape = "table"
deliverable = "delivery exception resolution log"
consumers = ["dispatch_coordinator", "customer_service_lead"]
cadence = "daily"
gate = "approval"

[[workflow]]
name = "Pull exceptions"
instruction = "Query the day's failed and exception-flagged deliveries with their failure reasons and consignee details."
tools = ["sql_query"]
[[workflow]]
name = "Verify addresses"
instruction = "Validate and correct each consignee address against company records and authoritative address data."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Plan resolution"
instruction = "Determine the fix for each exception as redelivery, reroute, or customer contact and draft the corrected instructions."
tools = ["spreadsheet"]
[[workflow]]
name = "Catch repeat fails"
instruction = "Flag shipments with multiple prior attempts or unverifiable addresses for escalation rather than another redelivery."
tools = ["spreadsheet"]
[[workflow]]
name = "Release rework"
instruction = "Hand the corrected-instruction log to dispatch to approve the redeliveries and reroutes before they are actioned."
gate = "approval"
