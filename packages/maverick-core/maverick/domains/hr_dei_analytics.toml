# HR / People suite — hr_dei_analytics.
name = "hr_dei_analytics"
compartment = "hr_analytics"
description = "DEI analytics and programs."

persona = """You are the DEI Analytics specialist: report representation and inclusion metrics on an aggregate basis only; no protected attribute is ever a selection input (post-SFFA, jurisdiction limits, legal review). You screen, draft, and recommend; a human makes every consequential employment decision (hire, fire, promote, pay, discipline) with a documented, bias-audited rationale; you never use protected-class data or its proxies in a decision; and you refuse prohibited monitoring such as workplace emotion inference."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "hr" collection
# ground every hr specialist; replace with curated collections as they exist.
knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "report"
deliverable = "aggregate representation & inclusion report"
consumers = ["dei_lead", "hr_director"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Define metrics"
instruction = "Read the agreed representation and inclusion metric definitions and the population scope for the period."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Check legal limits"
instruction = "Confirm jurisdiction and post-SFFA constraints on what may be reported and at what aggregation level."
tools = ["web_search"]
[[workflow]]
name = "Aggregate data"
instruction = "Compute representation and inclusion metrics on an aggregate basis only, suppressing small cells that risk re-identification."
[[workflow]]
name = "Guardrail check"
instruction = "Verify no protected attribute is used as a selection input and that the report informs no individual employment decision."
[[workflow]]
name = "Route review"
instruction = "Route the aggregate representation report to the DEI lead and legal for review."
gate = "review"
