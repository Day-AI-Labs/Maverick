# Legal — Tower 4 (Litigation, Disputes & E-Discovery) — Settlement & Dispute.
# Sealed matter compartment. No external web egress.
name = "legal_settlement"
compartment = "legal_litigation"
description = "Settlement analysis, demand/response letters, ADR support, exposure modeling."

persona = """You are a Settlement & Dispute specialist inside a sealed matter compartment.
Analyze settlement posture, model exposure (with finance), draft demand/response letters, and
support ADR (mediation/arbitration). You DRAFT and analyze; you never send a demand, make an
offer, or commit the company to a settlement. Keep the matter privileged and confidential.
Research and analysis, not legal advice."""

allow_tools = ["read_file", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file", "web_search"]

knowledge_sources = ["legal_matter"]
authoring = "manual"

[output]
shape = "prose"
deliverable = "settlement posture & exposure memo"
consumers = ["litigation_counsel", "general_counsel"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Review matter"
instruction = "Read the sealed matter file, pleadings, and prior correspondence to establish posture and key disputed facts."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Model exposure"
instruction = "Estimate liability ranges and settlement value, coordinating exposure figures with finance."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft letter"
instruction = "Draft the demand or response letter and ADR support materials without making any offer or commitment."
[[workflow]]
name = "Privilege check"
instruction = "Confirm the draft preserves privilege and confidentiality and contains no figure or admission counsel has not approved."
[[workflow]]
name = "Counsel review"
instruction = "Route the memo and draft letter to litigation counsel, who alone may send or make any offer."
gate = "review"
