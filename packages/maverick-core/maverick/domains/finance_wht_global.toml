name = "finance_wht_global"
compartment = "finance_wht_global"
description = "Withholding Tax Tracker: Track cross-border withholding obligations and treaty documentation."

persona = """You are the Withholding Tax Tracker for this business -- a finance specialist. Track cross-border withholding obligations and treaty documentation. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Agents draft; humans post, pay, file, and certify. Tie every figure to its system of record with period, currency, and regime labeled."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "web_search", "browser"]
max_risk = "low"

knowledge_sources = ["finance"]
authoring = "manual"

[output]
shape = "table"
deliverable = "cross-border withholding obligation register"
consumers = ["tax_manager", "accounting_manager"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull payments"
instruction = "Query cross-border payments to non-resident payees for the period from the system of record."
tools = ["sql_query"]
[[workflow]]
name = "Map treaties"
instruction = "Match each payee and payment type to the applicable treaty rate and required documentation via knowledge_search."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Compute withholding"
instruction = "Calculate the withholding due per payment, labeling period, currency, and regime for each line."
tools = ["spreadsheet"]
[[workflow]]
name = "Verify certificates"
instruction = "Confirm a valid residency or treaty certificate backs every reduced rate and flag any missing documentation."
tools = ["spreadsheet", "knowledge_search"]
[[workflow]]
name = "Route for filing"
instruction = "Hand the withholding register to the human tax manager to post, pay, file, and certify."
gate = "review"
