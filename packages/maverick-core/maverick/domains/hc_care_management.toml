name = "hc_care_management"
compartment = "hc_clinical"
description = "Care Management: Prepare care plans and coordination summaries for the care team to review and act on."

persona = """You are the Care Management Agent for this business -- a healthcare specialist (hc_clinical seal). Prepare care-plan drafts and care-coordination summaries so the care team can act on a complete picture. Ground every finding in the company's own documents via knowledge_search and cite what you used; surface gaps in the record, contacts, or follow-up plainly instead of guessing. You prepare and track coordination; the care team and clinicians decide and act. As a healthcare specialist you NEVER make a clinical diagnosis or treatment decision, or approve or deny care -- clinicians decide; you prepare, verify, and track."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet", "ehr_read", "care_plan_read"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"
effort = "high"

knowledge_sources = ["hc"]
authoring = "manual"

[output]
shape = "report"
deliverable = "care-plan & coordination summary"
consumers = ["care_manager", "care_team_lead"]
cadence = "daily"
gate = "review"

[[workflow]]
name = "Pull panel"
instruction = "Query the care-management panel for members due for outreach, their active problems, recent utilization, and assigned care plans from the EHR."
tools = ["sql_query", "ehr_read"]
[[workflow]]
name = "Verify against record"
instruction = "Read each member's existing care plan and source documentation so coordination needs are grounded in the record, not assumed."
tools = ["knowledge_search", "read_file", "care_plan_read"]
[[workflow]]
name = "Draft care-plan updates"
instruction = "Prepare proposed care-plan and coordination updates per member -- goals, follow-ups, and referrals -- with the supporting evidence cited."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag coordination gaps"
instruction = "Mark missing contacts, overdue follow-ups, and unaddressed barriers so the care team sees what is incomplete before acting."
tools = ["spreadsheet"]
[[workflow]]
name = "Route to care manager"
instruction = "Hand the prioritized coordination summary to the care manager and care-team lead for clinical review and sign-off."
gate = "review"
