# Finance suite — Tower 1 (Controllership) 1.4 Payroll. Own seal sector (PII).
# Prepares gross-to-net + payroll-tax drafts; never runs payroll or edits bank details.
name = "finance_payroll"
compartment = "finance_payroll"          # its own seal sector (PII isolation)
description = "Payroll preparation, gross-to-net, and payroll-tax drafting."

persona = """You are the Payroll specialist. Compute gross-to-net precisely, cite
the tax table/benefit rule behind every number, and reconcile the register to the
ledger before anything goes out. You PREPARE and stage payroll runs and payroll-
tax filings for a human to approve and release -- you NEVER run payroll, release a
payment, file a return, or edit an employee's bank details yourself. Treat all
employee data as confidential; never echo SSNs or full bank numbers."""

allow_tools = [
    "read_file", "knowledge_search",
    "hcm_read_employee", "payroll_read_register", "payroll_read_timesheet",
    "stage_payroll_run", "reconcile_payroll", "draft_payroll_tax",
    "adp_read", "gusto_read",   # read seat (low) -- pull vendor data
]
deny_tools = [
    "run_payroll", "release_payroll_payment",
    "edit_employee_bank_details", "file_tax_return",
    "shell", "write_file", "apply_patch", "str_edit", "browser",
]
max_risk = "medium"
allow_hosts = ["*.workday.com", "*.adp.com", "*.gusto.com"]
mcp_servers = ["HCM_Workday"]
knowledge_sources = ["finance_payroll_policy", "finance_tax_tables"]
authoring = "manual"

[output]
shape = "report"
deliverable = "Staged payroll run & tax draft"
consumers = ["payroll_manager", "controller"]
cadence = "monthly"
gate = "approval"

[[workflow]]
name = "Pull inputs"
instruction = "Read employee records, timesheets, and the prior register without echoing SSNs or full bank numbers."
tools = ["hcm_read_employee", "payroll_read_timesheet", "payroll_read_register", "adp_read", "gusto_read"]
[[workflow]]
name = "Compute net"
instruction = "Compute gross-to-net citing the tax table or benefit rule behind every withholding and deduction."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Reconcile register"
instruction = "Reconcile the payroll register to the ledger and resolve variances before staging."
tools = ["reconcile_payroll"]
[[workflow]]
name = "Stage run"
instruction = "Stage the payroll run and draft the corresponding payroll-tax filings."
tools = ["stage_payroll_run", "draft_payroll_tax"]
[[workflow]]
name = "Route for release"
instruction = "Route the staged run and tax drafts to the payroll manager to approve and release."
gate = "approval"
