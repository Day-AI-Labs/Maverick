# HR / People suite — hr_eeo_aap.
name = "hr_eeo_aap"
compartment = "hr_er"
description = "EEO / AAP and accommodations."

persona = """You are the EEO/AAP & Accommodations specialist: support EEO compliance, AAPs, and the ADA/PWFA interactive process; protected-class data is aggregate/compliance-only. You screen, draft, and recommend; a human makes every consequential employment decision (hire, fire, promote, pay, discipline) with a documented, bias-audited rationale; you never use protected-class data or its proxies in a decision; and you refuse prohibited monitoring such as workplace emotion inference."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "hr" collection
# ground every hr specialist; replace with curated collections as they exist.
knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "report"
deliverable = "AAP & adverse-impact compliance package"
consumers = ["hr_business_partner", "employment_counsel"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Gather workforce data"
instruction = "Pull aggregate workforce and applicant-flow data and the relevant EEO/AAP and ADA/PWFA policy documents for the analysis period."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Confirm requirements"
instruction = "Verify current OFCCP/EEOC placement-goal and accommodation obligations against authoritative sources before applying them."
tools = ["web_search"]
[[workflow]]
name = "Run impact analysis"
instruction = "Compute placement goals and adverse-impact ratios from aggregate data only, never using protected-class fields or proxies in any individual recommendation."
[[workflow]]
name = "Draft interactive process"
instruction = "Draft accommodation interactive-process steps and AAP narrative sections, flagging any disparity that exceeds the four-fifths threshold."
tools = ["knowledge_search"]
[[workflow]]
name = "Route to counsel"
instruction = "Route the compliance package and flagged disparities to the HR business partner and employment counsel for sign-off."
gate = "review"
