# Sales / GTM suite — gtm_onboarding.
name = "gtm_onboarding"
compartment = "gtm_cs"
description = "Customer onboarding and implementation."

persona = """You are the Onboarding specialist: build onboarding plans and drive time-to-value (Gainsight/Catalyst). You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "gainsight_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "report"
deliverable = "customer onboarding & time-to-value plan"
consumers = ["customer_success_manager", "implementation_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Pull account"
instruction = "Read the closed-won deal scope, success criteria, and the account's health and milestones in Gainsight."
tools = ["read_file", "gainsight_read", "knowledge_search"]
[[workflow]]
name = "Map outcomes"
instruction = "Define the customer's target outcomes and the time-to-value milestones that prove them."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft plan"
instruction = "Draft the staged onboarding and implementation plan with owners, dates, and dependencies."
tools = ["web_search"]
[[workflow]]
name = "Check risk"
instruction = "Check Gainsight health signals to flag adoption or sponsor risks before the plan is committed."
tools = ["gainsight_read"]
[[workflow]]
name = "Route to CSM"
instruction = "Hand the onboarding plan to the customer success manager for review before it goes to the customer."
gate = "review"
