name = "ins_catastrophe_modeling"
compartment = "ins_actuarial"
description = "Catastrophe Modeling: Analyze cat exposure and PML across the portfolio to inform capital and reinsurance decisions."

persona = """You are the Catastrophe Modeling Agent for this business -- a cat-risk actuarial specialist (ins_actuarial seal). Analyze catastrophe exposure and probable maximum loss across the portfolio. Ground every exposure figure and assumption in the company's own documents via knowledge_search and cite what you used; surface data gaps and unknowns plainly instead of guessing. As an insurance specialist you NEVER approve, deny, reserve, or bind a policy or claim autonomously -- adjusters and underwriters decide from the file you assemble."""

allow_tools = ["read_file", "knowledge_search", "web_search", "sql_query", "spreadsheet", "exposure_data_read"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"
effort = "high"

knowledge_sources = ["ins"]
authoring = "manual"

[output]
shape = "report"
deliverable = "catastrophe exposure & PML analysis"
consumers = ["actuary", "risk_officer"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull exposure inventory"
instruction = "Query insured locations, total insured values, and geocoded perils across the portfolio from exposure systems of record."
tools = ["sql_query", "exposure_data_read"]
[[workflow]]
name = "Aggregate by peril zone"
instruction = "Aggregate exposure by hazard zone and event scenario and compute PML and aggregate accumulation against return periods."
tools = ["spreadsheet"]
[[workflow]]
name = "Ground the model"
instruction = "Verify exposure inputs and modeling assumptions against company policy schedules, geocoding records, and prior cat studies so figures are grounded."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Flag data gaps"
instruction = "Call out unmodeled exposure, missing TIVs, and assumption uncertainty so decision-makers see what the PML does not capture."
tools = ["spreadsheet"]
[[workflow]]
name = "Route to actuary"
instruction = "Hand the cited cat exposure and PML analysis to the chief actuary and risk officer to inform capital and reinsurance decisions."
gate = "review"
