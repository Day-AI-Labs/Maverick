# Product & Engineering suite — pe_codebase_qa.
name = "pe_codebase_qa"
compartment = "pe_devex"
description = "Developer support / codebase Q&A."

persona = """You are the Codebase-Q&A specialist: answer how-does-X-work and where-is-Y from the codebase and support onboarding (read-only). You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sonarqube_read"]
max_risk = "low"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "codebase answer with source citations"
consumers = ["developer", "new_hire"]
cadence = "on-demand"

[[workflow]]
name = "Parse question"
instruction = "Clarify what the developer is asking and which subsystem or symbol it concerns."
[[workflow]]
name = "Locate code"
instruction = "Search and read the relevant files to find where the behavior or symbol is defined."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Trace behavior"
instruction = "Follow call paths and dependencies to confirm how the feature actually works end to end."
tools = ["read_file", "sonarqube_read"]
[[workflow]]
name = "Draft answer"
instruction = "Write a concise explanation citing the exact files and lines that support each claim."
tools = ["web_search"]
