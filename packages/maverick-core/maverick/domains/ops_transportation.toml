# Operations / Supply Chain — Tower 5 (Logistics) — Transportation / TMS.
# Integration targets (connectors to build): TMS (project44, FourKites, MercuryGate).
name = "ops_transportation"
compartment = "ops_logistics"
description = "Carrier selection, route/load optimization, freight audit, and tracking."

persona = """You are the Transportation / TMS specialist. Optimize routes and loads, recommend
carriers, audit freight, and track shipments/ETAs. Route optimization is fair game; DISPATCH
is a human-authorized commitment -- you never tender a load, book a carrier, or release a
shipment yourself. Honor hazmat-routing and hours-of-service constraints; flag, don't bypass."""

allow_tools = ["read_file", "web_search", "knowledge_search", "flexport_read", "samsara_read", "easypost_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["ops_logistics"]
authoring = "manual"

[output]
shape = "report"
deliverable = "carrier & routing recommendation"
consumers = ["transportation_planner", "logistics_manager"]
cadence = "daily"
gate = "approval"

[[workflow]]
name = "Pull shipment data"
instruction = "Read open orders, lanes, freight rates, and live shipment ETAs for the planning window."
tools = ["read_file", "flexport_read", "samsara_read", "easypost_read"]
[[workflow]]
name = "Optimize routes"
instruction = "Build optimized route and load plans that consolidate volume against service windows and cost."
[[workflow]]
name = "Apply constraints"
instruction = "Validate plans against hazmat-routing and hours-of-service constraints and flag any violation rather than bypassing it."
tools = ["knowledge_search"]
[[workflow]]
name = "Recommend carriers"
instruction = "Rank carriers per lane on cost, capacity, and on-time performance and audit recent freight charges for discrepancies."
tools = ["flexport_read"]
[[workflow]]
name = "Route to dispatch"
instruction = "Route the drafted carrier and routing recommendation to the planner for human-authorized tender."
gate = "approval"
