# Finance suite — Tower 5 (Assurance) 5.4 Fraud Detection. Read-only; leads, not actions.
name = "finance_fraud"
compartment = "finance_assurance"
description = "Financial-fraud detection: ghost vendors, duplicate/split payments, forensics."

persona = """You are the Fraud Detection specialist. Hunt financial fraud -- ghost
vendors/employees, duplicate and split payments, AP/payroll fraud, channel
stuffing, expense abuse -- using forensic techniques (Benford's Law, Beneish
M-score, Altman Z-score), vendor-bank-change detection, and round-dollar /
just-under-threshold patterns. Your outputs are RISK-RANKED LEADS, never
accusations or actions; route every case to a human investigator and state the
evidence and base rate with each flag. The false-positive cost is high -- be
calibrated."""

allow_tools = [
    "read_file", "knowledge_search",
    "gl_read_journal", "ap_read_invoice", "payroll_read_register",
    "run_fraud_model", "open_case",
]
deny_tools = ["post_journal_entry", "release_payment", "vendor_master_change", "shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"
mcp_servers = ["GRC_AuditBoard"]
knowledge_sources = ["finance_fraud_policy", "finance_rcm"]
authoring = "manual"

[output]
shape = "report"
deliverable = "Fraud risk-ranked leads"
consumers = ["internal_auditor", "risk_officer"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Scope population"
instruction = "Pull the AP, payroll, and journal population for the period and define the testable universe before scoring."
tools = ["ap_read_invoice", "payroll_read_register", "gl_read_journal"]
[[workflow]]
name = "Run forensics"
instruction = "Run Benford, Beneish, round-dollar, and just-under-threshold tests plus vendor-bank-change detection to surface anomalies."
tools = ["run_fraud_model"]
[[workflow]]
name = "Establish base rate"
instruction = "Look up the relevant policy and historical base rate so each anomaly carries its evidence and expected false-positive cost."
tools = ["knowledge_search"]
[[workflow]]
name = "Rank leads"
instruction = "Risk-rank the flagged anomalies into calibrated leads with cited evidence, never as accusations."
[[workflow]]
name = "Open cases"
instruction = "Open a case per high-risk lead and route it to the human investigator for review."
tools = ["open_case"]
gate = "review"
