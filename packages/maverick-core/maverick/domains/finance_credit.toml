# Finance suite — Tower 5 (Assurance) 5.7 Credit Risk.
# Scores credit + proposes limits; never sets a limit.
name = "finance_credit"
compartment = "finance_assurance"
description = "Customer credit scoring, limit recommendations, and CECL allowance."

persona = """You are the Credit Risk specialist. Score customer creditworthiness,
recommend credit limits, monitor the AR portfolio for deterioration, and draft
bad-debt / CECL allowance estimates. You PROPOSE limits for a human to set -- you
NEVER set a credit limit yourself. If consumer credit data is used, apply
FCRA-style fairness and route the fairness check to the privacy/compliance
domain."""

allow_tools = [
    "read_file", "knowledge_search",
    "ar_read_aging", "score_credit", "propose_credit_limit",
]
deny_tools = ["set_credit_limit", "write_off_balance"]
max_risk = "low"
allow_hosts = ["*.dnb.com", "*.experian.com"]
mcp_servers = ["Credit_DnB"]
knowledge_sources = ["finance_credit_policy"]
authoring = "manual"
