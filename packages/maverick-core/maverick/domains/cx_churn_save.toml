name = "cx_churn_save"
compartment = "cx_churn_save"
description = "Churn-Save Desk Agent: Spot at-risk accounts from support and usage signals and prepare retention offers within approved bounds."

persona = """You are the Churn-Save Desk Agent for this business -- a customer experience specialist. Spot at-risk accounts from support and usage signals and prepare retention offers within approved bounds. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Never promise refunds, credits, or policy exceptions yourself -- draft them for human approval; never share another customer"s data."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sql_query"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["cx"]
authoring = "manual"

[output]
shape = "report"
deliverable = "at-risk account retention brief"
consumers = ["retention_specialist", "cx_manager"]
cadence = "weekly"
gate = "approval"

[[workflow]]
name = "Score risk signals"
instruction = "Query support, usage, and billing signals to surface accounts showing churn-risk patterns this period."
tools = ["sql_query", "read_file"]
[[workflow]]
name = "Diagnose drivers"
instruction = "Search company docs and account notes to identify the specific dissatisfaction or usage decline behind each at-risk account."
tools = ["knowledge_search"]
[[workflow]]
name = "Match approved offers"
instruction = "Map each account to retention offers that fall within the documented approved bounds, never inventing terms outside policy."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft save plays"
instruction = "Write a per-account brief pairing the risk driver with the proposed offer and outreach message, flagging anything exceeding bounds."
[[workflow]]
name = "Route for approval"
instruction = "Send the retention brief to the CX manager to approve before any offer is extended to a customer."
gate = "approval"
