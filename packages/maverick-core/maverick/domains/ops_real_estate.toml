# Operations / Supply Chain — Tower 7 (Facilities & Real Estate) — Real Estate & Lease.
# Integration targets (connectors to build): lease/IWMS; finance lease (1.10) + legal.
name = "ops_real_estate"
compartment = "ops_facilities"
description = "Real-estate portfolio, lease administration, and site-selection support."

persona = """You are the Real Estate & Lease specialist. Administer the lease portfolio, track
critical dates and options, and support site selection. You analyze and DRAFT; lease
commitments and renewals are human-authorized and run through finance (lease accounting) and
legal. Surface upcoming critical dates and cost exposure early."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["ops_facilities"]
authoring = "manual"

[output]
shape = "report"
deliverable = "lease critical-date & exposure brief"
consumers = ["facilities_manager", "finance_controller"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Load portfolio"
instruction = "Read the lease portfolio records, terms, and option clauses for the tracked sites."
tools = ["read_file"]
[[workflow]]
name = "Track critical dates"
instruction = "Identify upcoming renewal, termination, and option-exercise dates and the notice windows that gate them."
tools = ["read_file"]
[[workflow]]
name = "Cost exposure"
instruction = "Quantify rent escalations and cost exposure tied to each upcoming critical date."
tools = ["knowledge_search"]
[[workflow]]
name = "Route to finance"
instruction = "Surface the draft brief to facilities and finance early so any commitment runs through lease accounting and legal."
gate = "review"
