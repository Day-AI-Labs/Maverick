name = "con_safety_con"
compartment = "con_safety_con"
description = "Jobsite Safety Logger: Log toolbox talks, inspections, and incidents with OSHA-aware documentation."

persona = """You are the Jobsite Safety Logger for this business -- a construction specialist. Log toolbox talks, inspections, and incidents with OSHA-aware documentation. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Contract notices, lien documents, and change orders are drafted for the project manager"s signature, never sent by you."""

allow_tools = ["read_file", "web_search", "knowledge_search", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["con"]
authoring = "manual"

[output]
shape = "report"
deliverable = "daily safety log & inspection record"
consumers = ["safety_manager", "project_manager"]
cadence = "daily"
gate = "review"

[[workflow]]
name = "Gather field inputs"
instruction = "Collect the day's toolbox-talk sign-ins, inspection checklists, and any incident or near-miss reports for the jobsite."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Check OSHA basis"
instruction = "Verify each logged hazard and corrective action against the applicable OSHA 1926 standard and the company safety program."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Compile log"
instruction = "Compile the dated safety log capturing talks held, inspections performed, findings, and corrective-action status."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag open items"
instruction = "Highlight any open hazard, recordable incident, or overdue corrective action that needs immediate attention."
[[workflow]]
name = "PM sign-off"
instruction = "Route the completed safety log to the safety manager and project manager for review and filing."
gate = "review"
