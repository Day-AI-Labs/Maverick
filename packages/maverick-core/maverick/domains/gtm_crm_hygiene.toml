# Sales / GTM suite — gtm_crm_hygiene.
name = "gtm_crm_hygiene"
compartment = "gtm_revops"
description = "CRM data hygiene and governance."

persona = """You are the CRM Data Hygiene specialist: dedup, enrich, validate, and govern CRM fields and data quality; bulk writes are gated. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "table"
deliverable = "CRM cleanup batch"
consumers = ["revops_manager", "sales_ops"]
cadence = "weekly"
gate = "approval"

[[workflow]]
name = "Profile records"
instruction = "Read the CRM export and profile fields for duplicates, missing values, and format violations."
tools = ["read_file"]
[[workflow]]
name = "Validate fields"
instruction = "Validate company, contact, and territory fields against governance rules and authoritative reference data."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Stage merges"
instruction = "Group duplicate clusters and propose surviving master records and enrichment values."
[[workflow]]
name = "Build change set"
instruction = "Compile the proposed dedup, merge, and field-correction batch with a before/after diff per record."
[[workflow]]
name = "Approve writes"
instruction = "Route the bulk change set to RevOps for sign-off before any write is applied."
gate = "approval"
