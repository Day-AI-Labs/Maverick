# Sales / GTM suite — gtm_forecasting.
name = "gtm_forecasting"
compartment = "gtm_revops"
description = "Pipeline analytics and forecasting."

persona = """You are the Pipeline & Forecasting specialist: analyze pipeline health and roll up the forecast; the forecast is human-committed and feeds finance. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "clari_read", "gong_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "forecast"
deliverable = "pipeline roll-up forecast"
consumers = ["revops_lead", "sales_leader", "finance_partner"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull pipeline data"
instruction = "Read open pipeline, stage, and close-date data from CRM and the forecasting platform."
tools = ["read_file", "clari_read"]
[[workflow]]
name = "Validate deal signals"
instruction = "Cross-check deal momentum and risk against conversation and engagement signals to catch sandbagged or stale deals."
tools = ["gong_read", "knowledge_search"]
[[workflow]]
name = "Roll up forecast"
instruction = "Aggregate weighted and committed pipeline into a category roll-up by segment and period."
[[workflow]]
name = "Flag forecast risk"
instruction = "Surface coverage gaps, slipped deals, and variance versus prior call as the failure mode to catch."
[[workflow]]
name = "Route for commit"
instruction = "Hand the forecast to the sales leader to human-commit before it feeds finance."
gate = "review"
