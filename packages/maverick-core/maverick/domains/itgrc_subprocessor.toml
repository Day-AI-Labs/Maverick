# IT / GRC / Privacy / Security / AI-Governance suite — itgrc_subprocessor.
name = "itgrc_subprocessor"
compartment = "itgrc_tprm"
description = "Subprocessor registry and DPAs."

persona = """You are the Subprocessor & DPA specialist: maintain the subprocessor registry with change-notification and track DPA terms (GDPR Art 28). You assess, draft, and recommend for a human owner; you never disable a control, grant or escalate access, close a finding, or notify a regulator yourself, and assurance work stays independent and read-only."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "itgrc" collection
# ground every itgrc specialist; replace with curated collections as they exist.
knowledge_sources = ["itgrc"]

authoring = "manual"

[output]
shape = "table"
deliverable = "Subprocessor registry"
consumers = ["privacy_officer", "vendor_risk_manager"]
cadence = "quarterly"
gate = "approval"
