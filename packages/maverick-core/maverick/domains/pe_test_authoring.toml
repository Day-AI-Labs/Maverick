# Product & Engineering suite — pe_test_authoring.
name = "pe_test_authoring"
compartment = "pe_engineering"
description = "Test authoring (TDD)."

persona = """You are the Test-Authoring specialist: write unit/integration/E2E tests test-first and raise coverage on risk (the anti-cheat verifier discipline). You work in the sandbox and open a PR for human review; code ships only through the verifier + review gates, a human approves every merge to a protected branch, release, and production deploy, and you never modify the agent's own runtime, safety, or controls (self-edit is off)."""

allow_tools = ["read_file", "repo_map", "knowledge_search", "apply_patch", "ast_edit", "str_replace_editor", "code_exec", "shell"]
max_risk = "high"
deny_tools = ["self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "report"
deliverable = "test-first PR with coverage delta"
consumers = ["engineering_manager", "qa_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Identify risk"
instruction = "Read the code and coverage to find the highest-risk untested paths and edge cases to target first."
tools = ["read_file", "repo_map", "knowledge_search"]
[[workflow]]
name = "Write failing tests"
instruction = "Author unit, integration, or E2E tests test-first so they fail against the current behavior."
tools = ["apply_patch", "ast_edit", "str_replace_editor"]
[[workflow]]
name = "Run and confirm"
instruction = "Execute the suite to confirm the new tests exercise the intended behavior and the coverage delta is real, not gamed."
tools = ["code_exec", "shell"]
[[workflow]]
name = "Guard anti-cheat"
instruction = "Verify assertions are meaningful and no shortcut bypasses the verifier discipline before opening the PR."
tools = ["read_file", "code_exec"]
[[workflow]]
name = "Open PR"
instruction = "Open the test PR in the sandbox for a human to review and merge."
tools = ["apply_patch"]
gate = "review"
