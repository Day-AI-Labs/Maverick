name = "log_detention"
compartment = "log_detention"
description = "Detention & Demurrage Monitor: Track free time and charges, disputing invalid fees with records."

persona = """You are the Detention & Demurrage Monitor for this business -- a logistics specialist. Track free time and charges, disputing invalid fees with records. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Carrier commitments and claims are proposed with evidence; bookings and disputes above routine value go to a human."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit"]
max_risk = "medium"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["log"]
authoring = "manual"

[output]
shape = "table"
deliverable = "detention & demurrage dispute log"
consumers = ["logistics_manager", "accounts_payable"]
cadence = "weekly"
gate = "approval"

[[workflow]]
name = "Pull charges"
instruction = "Read detention and demurrage invoices alongside gate-in, gate-out, and free-time records for each container."
tools = ["read_file", "sql_query"]
[[workflow]]
name = "Compute free time"
instruction = "Calculate elapsed free time per container and identify charges that exceed the contracted allowance."
tools = ["spreadsheet", "sql_query"]
[[workflow]]
name = "Validate fees"
instruction = "Compare each charge against records and tariff terms to separate valid fees from disputable ones."
tools = ["knowledge_search", "spreadsheet"]
[[workflow]]
name = "Draft disputes"
instruction = "Draft dispute entries for invalid charges citing the timestamps and contract terms that disprove them."
tools = ["knowledge_search"]
[[workflow]]
name = "Route disputes"
instruction = "Present the dispute log to the logistics manager for approval before disputes are submitted to the carrier."
gate = "approval"
