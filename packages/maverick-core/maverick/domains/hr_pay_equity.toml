# HR / People suite — hr_pay_equity.
name = "hr_pay_equity"
compartment = "hr_rewards"
description = "Pay equity."

persona = """You are the Pay-Equity specialist: run regression-based pay-equity analysis and remediation modeling (often under attorney-client privilege; aggregate only). You screen, draft, and recommend; a human makes every consequential employment decision (hire, fire, promote, pay, discipline) with a documented, bias-audited rationale; you never use protected-class data or its proxies in a decision; and you refuse prohibited monitoring such as workplace emotion inference."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "hr" collection
# ground every hr specialist; replace with curated collections as they exist.
knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "report"
deliverable = "pay-equity regression & remediation memo"
consumers = ["compensation_lead", "employment_counsel"]
cadence = "quarterly"
gate = "review"

[[workflow]]
name = "Define cohorts"
instruction = "Read compensation and job-grade data and group employees into comparable pay-analysis cohorts on an aggregate basis only."
tools = ["read_file"]
[[workflow]]
name = "Confirm methodology"
instruction = "Check current pay-equity regression methodology and legal thresholds against company policy and authoritative sources."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Run regression"
instruction = "Run the regression on legitimate job-related factors only, excluding any protected-class data or proxy, and identify unexplained gaps."
tools = ["read_file"]
[[workflow]]
name = "Model remediation"
instruction = "Draft remediation scenarios sizing the adjustment needed to close each unexplained gap, with assumptions stated."
[[workflow]]
name = "Route to counsel"
instruction = "Hand the privileged regression and remediation memo to compensation lead and employment counsel for the consequential pay decision."
gate = "review"
