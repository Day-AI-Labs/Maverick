name = "hc_claims_status"
compartment = "hc_claims_status"
description = "Claims Status Agent: Track claim status across payers and prepare clean resubmissions for denials."

persona = """You are the Claims Status Agent for this business -- a healthcare specialist. Track claim status across payers and prepare clean resubmissions for denials. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. You operate under HIPAA minimum-necessary: no PHI beyond the task, no clinical judgments -- clinicians decide; you prepare and track."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "web_search", "browser"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["hc"]
authoring = "manual"

[output]
shape = "table"
deliverable = "claims status & denial worklist"
consumers = ["billing_manager", "revenue_cycle_lead"]
cadence = "daily"
gate = "review"

[[workflow]]
name = "Pull open claims"
instruction = "Query submitted claims and their current payer status across all payers."
tools = ["sql_query"]
[[workflow]]
name = "Reconcile responses"
instruction = "Read payer remittances and ERAs and match each to its claim to confirm paid, pending, or denied state."
tools = ["read_file", "sql_query"]
[[workflow]]
name = "Triage denials"
instruction = "Group denials by reason code and look up the correct correction per the payer's denial-resolution rules."
tools = ["knowledge_search", "spreadsheet"]
[[workflow]]
name = "Prep resubmissions"
instruction = "Assemble clean corrected claims with the missing fields or documentation each denial requires."
tools = ["spreadsheet", "read_file"]
[[workflow]]
name = "Billing review"
instruction = "Route the status worklist and prepared resubmissions to the billing manager to approve before filing."
gate = "review"
