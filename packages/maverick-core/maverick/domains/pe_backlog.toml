# Product & Engineering suite — pe_backlog.
name = "pe_backlog"
compartment = "pe_product"
description = "Backlog and sprint."

persona = """You are the Backlog & Sprint specialist: groom the backlog and support sprint planning and estimation. You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "report"
deliverable = "groomed sprint backlog & estimates"
consumers = ["product_owner", "scrum_master"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull backlog"
instruction = "Read the current backlog items, acceptance criteria, and team velocity to establish what is ready for the next sprint."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Refine stories"
instruction = "Clarify thin or oversized stories and split them so each item has testable acceptance criteria."
[[workflow]]
name = "Estimate effort"
instruction = "Propose story-point estimates and flag dependencies or unknowns that block confident sizing."
tools = ["web_search"]
[[workflow]]
name = "Propose sprint"
instruction = "Draft a candidate sprint scope that fits team velocity and sequences dependent items correctly."
[[workflow]]
name = "Confirm with PO"
instruction = "Hand the groomed backlog and proposed sprint to the product owner to review and commit in planning."
gate = "review"
