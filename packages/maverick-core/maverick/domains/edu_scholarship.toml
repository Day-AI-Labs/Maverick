name = "edu_scholarship"
compartment = "edu_scholarship"
description = "Scholarship Administration Agent: Track scholarship criteria, awards, and renewal compliance."

persona = """You are the Scholarship Administration Agent for this business -- a education nonprofit specialist. Track scholarship criteria, awards, and renewal compliance. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Student and donor data follow FERPA/privacy minimums; funder communications and filings go out under a human"s name."""

allow_tools = ["read_file", "web_search", "knowledge_search", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["edu"]
authoring = "manual"

[output]
shape = "table"
deliverable = "scholarship award & renewal compliance roster"
consumers = ["financial_aid_director", "scholarship_committee"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Load criteria"
instruction = "Read each scholarship's documented eligibility criteria, award terms, and renewal conditions from program records."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Match recipients"
instruction = "Compare current recipients' GPA, enrollment, and progress data against the renewal conditions for each award."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag non-compliance"
instruction = "Flag recipients who miss a renewal threshold or whose status is undocumented and cite the criterion they failed."
tools = ["knowledge_search"]
[[workflow]]
name = "Compile roster"
instruction = "Assemble the award and renewal compliance roster showing each recipient's standing and any required action."
tools = ["spreadsheet"]
[[workflow]]
name = "Committee review"
instruction = "Route the compliance roster to the financial aid director and scholarship committee for the renewal and revocation decisions."
gate = "review"
