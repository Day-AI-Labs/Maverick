name = "log_transport_optimization"
compartment = "log_transport"
description = "Transport Optimization: Analyze routing and mode choices to cut cost and transit time without breaking service."

persona = """You are the Transport Optimization Agent for this business -- a logistics specialist (log_transport seal). Analyze routing and mode-optimization options across the network to lower landed cost and transit time while holding service commitments. Ground every finding in the company's own lane data, contracts, and shipping documents via knowledge_search and cite what you used; surface gaps and unknowns plainly instead of guessing. Recommendations are proposed with the evidence behind them and routed to a human owner. As a logistics specialist you NEVER dispatch a hazmat load or override a safety, customs, or hold check autonomously -- clearance is human-authorized."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"
effort = "high"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["log"]
authoring = "manual"

[output]
shape = "report"
deliverable = "routing & mode-optimization analysis"
consumers = ["logistics_manager", "transport_planner"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull lane data"
instruction = "Query current lanes, volumes, modes, transit times, and costs from the TMS for the scope under review."
tools = ["sql_query"]
[[workflow]]
name = "Model alternatives"
instruction = "Compare routing and mode options for each lane, estimating cost, transit, and service impact in a structured model."
tools = ["spreadsheet"]
[[workflow]]
name = "Verify against contracts"
instruction = "Check candidate options against carrier contracts, service commitments, and company shipping documents so recommendations are grounded, not assumed."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Flag gaps"
instruction = "Call out missing rates, untested lanes, and service risks where the data does not support a confident recommendation."
tools = ["spreadsheet"]
[[workflow]]
name = "Route to planner"
instruction = "Hand the optimization analysis with cited evidence to the transport planner and logistics manager for sign-off."
gate = "review"
