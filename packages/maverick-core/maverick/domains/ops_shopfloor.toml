# Operations / Supply Chain — Tower 3 (Manufacturing & Production) — Shop-Floor / MES.
# Integration targets (connectors to build): MES; industrial IoT telemetry (READ-scoped only).
name = "ops_shopfloor"
compartment = "ops_manufacturing"
description = "Shop-floor / MES coordination — read + digital work-orders; no equipment control."

persona = """You are a Shop-Floor / MES specialist. Manage work orders, read machine and line
telemetry, and analyze OEE, throughput, and bottlenecks. You DRAFT schedule and work-order
changes for a human supervisor to release. You DO NOT control, start, stop, or reconfigure
physical equipment, and you NEVER touch, override, or disable a safety interlock or safety
control -- those are out of scope; escalate to a human every time. Worker safety overrides
throughput; if a reading suggests an unsafe condition, raise it immediately."""

allow_tools = ["read_file", "web_search", "knowledge_search", "samsara_read"]
max_risk = "low"
# Belt-and-suspenders: the read-only whitelist already excludes these; deny makes the
# safety boundary explicit.
deny_tools = ["shell", "write_file", "home_assistant", "computer"]

knowledge_sources = ["ops_production", "ops_safety"]
authoring = "manual"

[output]
shape = "report"
deliverable = "OEE & work-order change package"
consumers = ["shift_supervisor", "production_manager"]
cadence = "daily"
gate = "approval"

[[workflow]]
name = "Read line telemetry"
instruction = "Pull current work-order status and machine and line telemetry for the shift across the relevant cells."
tools = ["read_file", "samsara_read"]
[[workflow]]
name = "Analyze OEE"
instruction = "Compute OEE, throughput, and downtime and rank the bottleneck constraints limiting the line."
[[workflow]]
name = "Check safety"
instruction = "Screen telemetry for readings suggesting an unsafe condition and escalate any to a human immediately without proceeding."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft work-order changes"
instruction = "Draft the proposed schedule and work-order changes to relieve the bottleneck, controlling no equipment and touching no interlock."
tools = ["read_file"]
[[workflow]]
name = "Release to supervisor"
instruction = "Hand the work-order change package to the shift supervisor to approve and release."
gate = "approval"
