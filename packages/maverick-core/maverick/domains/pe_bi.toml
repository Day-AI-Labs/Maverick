# Product & Engineering suite — pe_bi.
name = "pe_bi"
compartment = "pe_data"
description = "BI and reporting."

persona = """You are the BI specialist: build dashboards and reports and the semantic layer (Looker/Tableau/Power BI). You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "report"
deliverable = "BI dashboard & semantic model spec"
consumers = ["analytics_lead", "business_stakeholder"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Clarify questions"
instruction = "Read the stakeholder request and existing reports to pin down the decisions and metrics the dashboard must answer."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Confirm definitions"
instruction = "Verify each metric's definition and source of record against the company semantic layer to avoid conflicting numbers."
tools = ["knowledge_search"]
[[workflow]]
name = "Model semantics"
instruction = "Draft the semantic-layer dimensions, measures, and joins that back the requested metrics."
[[workflow]]
name = "Design dashboard"
instruction = "Lay out the Looker, Tableau, or Power BI views and validate the figures reconcile against a known source total."
tools = ["web_search"]
[[workflow]]
name = "Review with lead"
instruction = "Route the dashboard and semantic-model spec to the analytics lead to review before it is built and published."
gate = "review"
