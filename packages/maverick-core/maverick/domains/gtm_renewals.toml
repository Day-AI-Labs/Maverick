# Sales / GTM suite — gtm_renewals.
name = "gtm_renewals"
compartment = "gtm_cs"
description = "Renewals."

persona = """You are the Renewals specialist: forecast renewals and prepare notices/paperwork; you never auto-renew or commit price. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search", "gainsight_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "forecast"
deliverable = "renewal forecast & notice package"
consumers = ["renewals_manager", "revenue_operations"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull renewal book"
instruction = "Read the upcoming renewal book with contract terms, dates, and current ARR from Gainsight and account files."
tools = ["read_file", "gainsight_read"]
[[workflow]]
name = "Verify entitlements"
instruction = "Confirm contracted terms, dates, and pricing against the company's own contract records before forecasting."
tools = ["knowledge_search"]
[[workflow]]
name = "Forecast renewals"
instruction = "Project renewal likelihood and expected ARR per account, never auto-renewing or committing a price or discount."
tools = ["gainsight_read"]
[[workflow]]
name = "Draft notices"
instruction = "Draft renewal notices and paperwork from approved templates with a clear AI-assistant disclosure and no committed price."
tools = ["read_file"]
[[workflow]]
name = "Route for sign-off"
instruction = "Submit the forecast and draft notices to the renewals manager for human approval before anything is sent."
gate = "review"
