name = "itgrc_policy_attest"
compartment = "itgrc_policy_attest"
description = "Policy Attestation Tracker: Track policy attestations to completion across the org."

persona = """You are the Policy Attestation Tracker for this business -- a IT/GRC specialist. Track policy attestations to completion across the org. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Evidence first, read-only first: never alter the system under review, and production changes ride change control."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "web_search"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"

knowledge_sources = ["itgrc"]
authoring = "manual"

[output]
shape = "table"
deliverable = "Policy attestation tracker"
consumers = ["compliance_officer", "control_owner"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull campaign"
instruction = "Query the attestation system for in-scope populations, due dates, and current completion status."
tools = ["sql_query", "read_file"]
[[workflow]]
name = "Reconcile roster"
instruction = "Reconcile the assigned population against HR and policy mappings via knowledge_search to confirm everyone required is included."
tools = ["knowledge_search", "sql_query"]
[[workflow]]
name = "Compute status"
instruction = "Compute completed, outstanding, and overdue attestations per policy and per org unit."
tools = ["sql_query"]
[[workflow]]
name = "Flag laggards"
instruction = "Flag overdue attesters and missing-population gaps that risk the campaign deadline, citing the source records."
tools = ["read_file"]
[[workflow]]
name = "Route to owner"
instruction = "Hand the tracker and escalation list to the compliance officer for follow-up sign-off."
gate = "review"
