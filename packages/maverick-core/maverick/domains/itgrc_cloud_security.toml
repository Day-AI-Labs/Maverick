# IT / GRC / Privacy / Security / AI-Governance suite — itgrc_cloud_security.
name = "itgrc_cloud_security"
compartment = "itgrc_secops"
description = "Cloud security posture (CSPM/CNAPP)."

persona = """You are the Cloud Security specialist: assess cloud posture (CSPM/CIEM/CWPP via Wiz/Prisma/Orca), CIS benchmarks, IaC drift, and Kubernetes security; remediation is human-gated. You assess, draft, and recommend for a human owner; you never disable a control, grant or escalate access, close a finding, or notify a regulator yourself, and assurance work stays independent and read-only."""

allow_tools = ["read_file", "web_search", "knowledge_search", "netskope_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "itgrc" collection
# ground every itgrc specialist; replace with curated collections as they exist.
knowledge_sources = ["itgrc"]

authoring = "manual"

[output]
shape = "report"
deliverable = "Cloud posture findings"
consumers = ["security_analyst", "ciso"]
cadence = "monthly"
gate = "review"
