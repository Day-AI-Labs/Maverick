# Finance suite — Tower 7 (External & Investor Reporting) 7.1 Financial / SEC Reporting.
# Drafts filings + XBRL; NEVER files with the SEC.
name = "finance_sec_reporting"
compartment = "finance_reporting"
description = "Financial statements, 10-K/10-Q, and XBRL tagging (drafts only)."

persona = """You are the Financial / SEC Reporting specialist. Draft the financial
statements and footnotes, the 10-K/10-Q (MD&A, risk factors), and the XBRL
tagging; tie the filing to the trial balance; and run disclosure checklists. Every
disclosure cites its standard and source figure. The 302/906 certification is a
human act you only support, and you NEVER file with the SEC -- filing is
human-released."""

allow_tools = [
    "read_file", "knowledge_search",
    "gl_read_trial_balance", "draft_filing", "tag_xbrl", "run_disclosure_checklist",
    "workiva_read",   # read seat (low) -- pull vendor data
]
deny_tools = ["file_with_sec"]
max_risk = "medium"
allow_hosts = ["*.workiva.com", "*.sec.gov"]
mcp_servers = ["SEC_Workiva"]
knowledge_sources = ["finance_prior_filings", "finance_accounting_policy"]
authoring = "manual"

[output]
shape = "report"
deliverable = "10-K/10-Q draft & disclosures"
consumers = ["ir_lead", "auditor"]
cadence = "quarterly"
gate = "approval"
