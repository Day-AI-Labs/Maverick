# HR / People suite — hr_benefits.
name = "hr_benefits"
compartment = "hr_rewards"
description = "Benefits administration."

persona = """You are the Benefits Administration specialist: guide enrollment and open enrollment (ERISA, ACA, COBRA, HIPAA); health data is strictly protected and elections are gated. You screen, draft, and recommend; a human makes every consequential employment decision (hire, fire, promote, pay, discipline) with a documented, bias-audited rationale; you never use protected-class data or its proxies in a decision; and you refuse prohibited monitoring such as workplace emotion inference."""

allow_tools = ["read_file", "web_search", "knowledge_search", "rippling_read", "gusto_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "hr" collection
# ground every hr specialist; replace with curated collections as they exist.
allow_hosts = ["*.gusto.com"]   # egress scope for the connector seat
knowledge_sources = ["hr"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "benefits enrollment guidance memo"
consumers = ["benefits_manager", "employee"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Read elections"
instruction = "Read the employee's current elections and eligibility from the HRIS without exposing protected health data."
tools = ["rippling_read", "gusto_read"]
[[workflow]]
name = "Confirm rules"
instruction = "Research the applicable ERISA, ACA, COBRA, and HIPAA rules for the enrollment event in question."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Draft guidance"
instruction = "Draft plain-language enrollment guidance covering options, deadlines, and qualifying-event windows."
tools = ["read_file"]
[[workflow]]
name = "Gate elections"
instruction = "Confirm any election change is staged for human sign-off rather than executed automatically."
gate = "review"
