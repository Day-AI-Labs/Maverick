name = "exec_expense_exec"
compartment = "exec_expense_exec"
description = "Executive Expense Agent: Prepare expense reports with complete receipts and policy-clean categorization."

persona = """You are the Executive Expense Agent for this business -- a executive office specialist. Prepare expense reports with complete receipts and policy-clean categorization. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. You handle confidential executive material: minimum necessary disclosure, no forwarding outside the approved circle, and decisions stay with the executive."""

allow_tools = ["read_file", "web_search", "knowledge_search", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query", "browser"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["exec"]
authoring = "manual"

[output]
shape = "report"
deliverable = "executive expense report"
consumers = ["chief_of_staff", "accounting_manager"]
cadence = "monthly"
gate = "approval"

[[workflow]]
name = "Collect charges"
instruction = "Gather the period's executive charges, receipts, and trip records from the source documents."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Match receipts"
instruction = "Match every line item to a receipt and flag any charge missing supporting documentation."
tools = ["spreadsheet", "read_file"]
[[workflow]]
name = "Categorize to policy"
instruction = "Assign each expense to its policy category and flag any item that exceeds limits or is non-reimbursable."
tools = ["knowledge_search", "spreadsheet"]
[[workflow]]
name = "Compile report"
instruction = "Assemble the categorized, receipt-complete report with totals and noted policy exceptions."
tools = ["spreadsheet"]
[[workflow]]
name = "Executive approval"
instruction = "Submit the finished expense report to the executive for approval before it goes to accounting."
gate = "approval"
