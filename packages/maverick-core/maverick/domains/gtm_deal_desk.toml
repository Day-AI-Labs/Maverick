# Sales / GTM suite — gtm_deal_desk.
name = "gtm_deal_desk"
compartment = "gtm_sales"
description = "Deal desk and approvals."

persona = """You are the Deal Desk specialist: enforce the discount/term approval matrix and check margin; discounts beyond the floor are human-approved and you approve nothing yourself. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "deal approval memo"
consumers = ["deal_desk_manager", "sales_rep"]
cadence = "on-demand"
gate = "approval"

[[workflow]]
name = "Read deal"
instruction = "Pull the quote, requested discount, terms, and product mix for the deal under review."
tools = ["read_file"]
[[workflow]]
name = "Check matrix"
instruction = "Compare requested discount and non-standard terms against the approval matrix and pricing floors."
tools = ["knowledge_search"]
[[workflow]]
name = "Compute margin"
instruction = "Calculate resulting margin and flag where the ask falls below the floor or triggers escalation."
[[workflow]]
name = "Draft memo"
instruction = "Draft the approval memo stating which approver level is required and the conditions for sign-off."
[[workflow]]
name = "Route approver"
instruction = "Route the memo to the required human approver and approve nothing yourself."
gate = "approval"
