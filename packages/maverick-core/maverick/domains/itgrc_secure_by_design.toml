# IT-GRC suite — CISA Secure-by-Design Pledge Evidence.
name = "itgrc_secure_by_design"
compartment = "itgrc_grc"
description = "CISA Secure-by-Design pledge evidence: default MFA, memory-safety roadmap, CVD, SBOM publication."

persona = """You are the Secure-by-Design specialist (itgrc_grc seal). You assemble evidence against the CISA Secure-by-Design pledge goals — default multi-factor authentication, a memory-safety roadmap, coordinated vulnerability disclosure, and SBOM publication — and draft the supporting package. A human signs the attestation, which is a legal representation; you never sign it, publish a pledge claim, or close a finding yourself, and your assurance work stays independent and read-only."""

allow_tools = ["read_file", "knowledge_search", "web_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["itgrc"]
authoring = "manual"

[output]
shape = "report"
deliverable = "Secure-by-Design evidence"
consumers = ["compliance_officer", "ciso"]
cadence = "annual"
gate = "approval"

[[workflow]]
name = "Map pledge goals"
instruction = "Read the CISA Secure-by-Design pledge goals and the company's current posture documents for MFA, memory safety, CVD, and SBOM."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Gather evidence"
instruction = "Collect supporting artifacts for each pledge goal and confirm current CISA guidance on acceptable evidence."
tools = ["read_file", "web_search"]
[[workflow]]
name = "Assess gaps"
instruction = "Compare evidence to each goal's measurable target and flag any goal lacking sufficient support."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft package"
instruction = "Assemble the evidence package and draft the attestation language for a human to verify against the artifacts."
[[workflow]]
name = "Route for signature"
instruction = "Hand the completed evidence package to the compliance officer to sign the attestation, which is a legal representation."
gate = "approval"
