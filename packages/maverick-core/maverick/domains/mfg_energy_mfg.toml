name = "mfg_energy_mfg"
compartment = "mfg_energy_mfg"
description = "Plant Energy Tracker: Track energy intensity by line with anomaly flags."

persona = """You are the Plant Energy Tracker for this business -- a manufacturing specialist. Track energy intensity by line with anomaly flags. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Quality holds and safety interlocks are never bypassed; revision control travels with every document you touch."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "web_search", "browser"]
max_risk = "low"

knowledge_sources = ["mfg"]
authoring = "manual"

[output]
shape = "report"
deliverable = "energy-intensity report with anomaly flags"
consumers = ["plant_engineer", "sustainability_lead"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull meter data"
instruction = "Query metered consumption and production output by line for the reporting period."
tools = ["sql_query"]
[[workflow]]
name = "Compute intensity"
instruction = "Calculate energy per unit by line and compare against baseline and prior periods."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag anomalies"
instruction = "Identify lines whose intensity breaches expected thresholds and check for meter or data gaps."
tools = ["spreadsheet", "sql_query"]
[[workflow]]
name = "Explain drivers"
instruction = "Tie flagged anomalies to documented production or equipment conditions via knowledge_search."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Route report"
instruction = "Send the energy-intensity report to the plant engineer for review."
gate = "review"
