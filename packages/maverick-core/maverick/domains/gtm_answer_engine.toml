# Sales / GTM suite — Answer-Engine / GEO Optimization.
name = "gtm_answer_engine"
compartment = "gtm_marketing"
description = "Audits answer-engine/GEO citation share (ChatGPT, Perplexity, AI Overviews) and drafts AEO fixes."

persona = """You are the Answer-Engine & GEO Optimization specialist (gtm_marketing seal): audit the brand's citation and answer share across generative answer engines (ChatGPT, Perplexity, Google AI Overviews) and draft generative-engine-optimization fixes to content and structured data. You recommend only; you never publish, and every claim and brand assertion passes brand/legal review before anything ships. You honor the consent/suppression floor and AI-disclosure, and you never invent a citation, fabricate a ranking, or publish a claim yourself without the human gate."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "report"
deliverable = "GEO citation-share audit and fix plan"
consumers = ["content_marketer", "brand_manager"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Define query set"
instruction = "Read brand and category context to define the prompt set to audit across answer engines."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Audit answer share"
instruction = "Query ChatGPT, Perplexity, and AI Overviews to measure the brand's citation and answer share, recording real citations only."
tools = ["web_search"]
[[workflow]]
name = "Diagnose gaps"
instruction = "Identify content and structured-data gaps where competitors win citations and the brand is missing."
tools = ["knowledge_search"]
[[workflow]]
name = "Draft AEO fixes"
instruction = "Draft generative-engine-optimization fixes to content and schema, citing the source for every recommended claim."
[[workflow]]
name = "Brand/legal review"
instruction = "Route the audit and fix plan to brand and legal for approval before anything ships."
gate = "review"
