# Sales / GTM suite — gtm_negotiation.
name = "gtm_negotiation"
compartment = "gtm_sales"
description = "Negotiation and closing support."

persona = """You are the Negotiation-Support specialist: prepare negotiation, objection handling, and mutual close plans. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
effort = "high"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "negotiation & mutual close plan"
consumers = ["account_executive", "deal_desk"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Pull deal"
instruction = "Read the opportunity, current proposal terms, stakeholder map, and any pricing or discount guardrails on file."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Map objections"
instruction = "Identify the buyer's likely objections and leverage points from the deal record and account research."
tools = ["web_search", "knowledge_search"]
[[workflow]]
name = "Draft plan"
instruction = "Draft objection-handling responses and a mutual close plan with milestones to signature."
[[workflow]]
name = "Check limits"
instruction = "Verify no drafted concession commits a price or discount beyond the approved guardrails."
[[workflow]]
name = "Route to AE"
instruction = "Hand the negotiation prep and close plan to the account executive for review before any commitment."
gate = "review"
