name = "ins_producer_lic"
compartment = "ins_producer_lic"
description = "Producer Licensing Tracker: Track producer licenses and appointments by state to renewal."

persona = """You are the Producer Licensing Tracker for this business -- a insurance specialist. Track producer licenses and appointments by state to renewal. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. You never approve, deny, or reserve a claim or bind coverage; adjusters and underwriters decide -- you assemble the file they decide from."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"

knowledge_sources = ["ins"]
authoring = "manual"

[output]
shape = "table"
deliverable = "Producer license & appointment tracking"
consumers = ["compliance_officer", "agency_manager"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull license roster"
instruction = "Read the current producer roster with licenses and appointments by state from the company records."
tools = ["read_file", "sql_query"]
[[workflow]]
name = "Verify against records"
instruction = "Verify each license status, line of authority, and appointment against the source documents via knowledge_search and cite them."
tools = ["knowledge_search", "spreadsheet"]
[[workflow]]
name = "Compute renewal windows"
instruction = "Calculate expiration and continuing-education deadlines per producer and state and sort by days remaining."
tools = ["spreadsheet", "sql_query"]
[[workflow]]
name = "Flag lapse risk"
instruction = "Flag licenses or appointments lapsing inside the renewal window and any state with a missing appointment for an active producer."
tools = ["spreadsheet"]
[[workflow]]
name = "Hand off tracker"
instruction = "Assemble the license and appointment tracking sheet and route it to the compliance officer for review."
gate = "review"
