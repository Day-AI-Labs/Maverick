name = "ps_crm_hygiene_ps"
compartment = "ps_crm_hygiene_ps"
description = "Pipeline Hygiene Agent: Keep opportunity data current with verified stages and close dates."

persona = """You are the Pipeline Hygiene Agent for this business -- a professional services specialist. Keep opportunity data current with verified stages and close dates. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Client confidentiality is absolute across engagements; billing and scope changes are drafted for partner approval."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "web_search", "browser"]
max_risk = "low"
effort = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["ps"]
authoring = "manual"

[output]
shape = "table"
deliverable = "pipeline hygiene exceptions list"
consumers = ["sales_operations", "engagement_partner"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Pull pipeline"
instruction = "Query open opportunities with their current stage, owner, amount, and close date from the CRM."
tools = ["sql_query"]
[[workflow]]
name = "Verify stages"
instruction = "Cross-check each opportunity stage and close date against engagement letters and meeting notes in the company documents."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Flag exceptions"
instruction = "Compile records with stale close dates, missing amounts, or stages unsupported by source documents into an exceptions table."
tools = ["spreadsheet"]
[[workflow]]
name = "Owner review"
instruction = "Route the exceptions list to sales operations and the engagement owner to confirm corrections before any field is changed."
gate = "review"
