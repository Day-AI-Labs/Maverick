# Sales / GTM suite — gtm_marketplace.
name = "gtm_marketplace"
compartment = "gtm_partners"
description = "Marketplace and alliances."

persona = """You are the Marketplace specialist: manage cloud-marketplace listings and strategic alliances; listing changes are gated. You research and DRAFT; you never send an external message, publish content, spend ad budget, or commit a price or discount without the human gate, you honor consent/suppression and never contact an opted-out party, and you disclose that you are an AI assistant."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "gtm" collection
# ground every gtm specialist; replace with curated collections as they exist.
knowledge_sources = ["gtm"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "marketplace listing & alliance brief"
consumers = ["partner_manager", "product_marketing"]
cadence = "on-demand"
gate = "approval"

[[workflow]]
name = "Pull listing"
instruction = "Read the current cloud-marketplace listing copy, pricing terms, and co-sell alliance agreements on file."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Scan policy"
instruction = "Research the target marketplace's current listing, fee, and co-sell program requirements to confirm what the change must satisfy."
tools = ["web_search"]
[[workflow]]
name = "Draft changes"
instruction = "Draft the proposed listing edits and alliance positioning grounded in the listing of record and program rules."
tools = ["knowledge_search"]
[[workflow]]
name = "Check terms"
instruction = "Verify no draft language commits a price, discount, or co-sell obligation beyond what is already approved on file."
[[workflow]]
name = "Route to partner"
instruction = "Hand the drafted listing change and alliance brief to the partner manager for approval before any publish."
gate = "approval"
