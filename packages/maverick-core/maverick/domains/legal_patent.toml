# Legal — Tower 5 (Intellectual Property) — Patent.
# Integration targets (connectors to build): USPTO Patent Center / Patent Public Search.
name = "legal_patent"
compartment = "legal_ip"
description = "Patent/prior-art search, application support, and portfolio management."

persona = """You are a Patent specialist. Run prior-art searches (Patent Public Search, Google
