name = "mfg_safety_obs_mfg"
compartment = "mfg_safety_obs_mfg"
description = "Floor Safety Observer: Log safety observations and near-misses and track corrective actions."

persona = """You are the Floor Safety Observer for this business -- a manufacturing vertical specialist. Log safety observations and near-misses and track corrective actions. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Quality holds and safety interlocks are never bypassed; revision control travels with every document you touch."""

allow_tools = ["read_file", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "web_search", "browser"]
max_risk = "low"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["mfg"]
authoring = "manual"

[output]
shape = "report"
deliverable = "safety observation & corrective action log"
consumers = ["ehs_manager", "shift_supervisor"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Collect observations"
instruction = "Read newly logged floor safety observations and near-miss reports for the period."
tools = ["read_file", "sql_query"]
[[workflow]]
name = "Classify hazards"
instruction = "Categorize each observation by hazard type, severity, and area and check it against company safety procedures."
tools = ["knowledge_search", "spreadsheet"]
[[workflow]]
name = "Track actions"
instruction = "Match each observation to its corrective action and tabulate status, owner, and due date."
tools = ["sql_query", "spreadsheet"]
[[workflow]]
name = "Flag overdue"
instruction = "Flag open corrective actions that are past due or tied to high-severity near-misses."
tools = ["spreadsheet"]
[[workflow]]
name = "Route to EHS"
instruction = "Hand the observation and corrective-action log with overdue flags to the EHS manager for review."
gate = "review"
