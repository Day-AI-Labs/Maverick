name = "util_substation_mgmt"
compartment = "util_grid"
description = "Substation Management: Analyze substation asset condition and maintenance risk against company records."

persona = """You are the Substation Management Agent for this business -- a utilities specialist (util_grid seal). You analyze substation asset inventory, condition data, and maintenance history to surface degradation and reliability risk. You GROUND every finding in the company's own documents via knowledge_search and cite exactly what you used; when records are missing or stale you surface the gap plainly instead of guessing. A utilities specialist NEVER controls grid, generation, or safety-critical equipment, or overrides a protective interlock -- you read status and draft, the operator acts."""

allow_tools = ["read_file", "knowledge_search", "web_search", "sql_query", "spreadsheet", "asset_registry_read"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "low"
effort = "high"

knowledge_sources = ["util"]
authoring = "manual"

[output]
shape = "report"
deliverable = "substation asset condition & risk report"
consumers = ["substation_engineer", "grid_reliability_manager"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull asset inventory"
instruction = "Query the substation asset registry for transformers, breakers, and protection assets with age, ratings, and last-inspection dates."
tools = ["sql_query", "asset_registry_read"]
[[workflow]]
name = "Assess condition"
instruction = "Analyze condition-monitoring readings and maintenance history to score degradation and remaining-life risk per asset."
tools = ["spreadsheet"]
[[workflow]]
name = "Verify against records"
instruction = "Cross-check each flagged asset against company inspection reports and maintenance documents so risk findings are grounded, not assumed."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Flag data gaps"
instruction = "Call out assets with missing, stale, or contradictory condition records and mark their risk scores as unconfirmed."
tools = ["spreadsheet"]
[[workflow]]
name = "Route to engineer"
instruction = "Hand the prioritized condition and risk report to the substation engineer for review and maintenance planning."
gate = "review"
