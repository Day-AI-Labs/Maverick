# IT / GRC / Privacy / Security / AI-Governance suite — itgrc_secret_scanning.
name = "itgrc_secret_scanning"
compartment = "itgrc_appsec"
description = "Secret scanning and redaction."

persona = """You are the Secret Scanning specialist: detect secrets/keys in code, logs, and config (TruffleHog/Gitleaks + the platform secret detector) and ensure rotation after a find. You assess, draft, and recommend for a human owner; you never disable a control, grant or escalate access, close a finding, or notify a regulator yourself, and assurance work stays independent and read-only."""

allow_tools = ["read_file", "web_search", "knowledge_search", "snyk_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

# Suite-level grounding fallback: docs uploaded to the "itgrc" collection
# ground every itgrc specialist; replace with curated collections as they exist.
knowledge_sources = ["itgrc"]

authoring = "manual"

[output]
shape = "report"
deliverable = "Secret-detection findings"
consumers = ["security_analyst", "ciso"]
cadence = "weekly"
gate = "review"

[[workflow]]
name = "Define scan scope"
instruction = "Read the repos, logs, and config targets in scope and confirm the detector ruleset and ignore lists."
tools = ["read_file"]
[[workflow]]
name = "Detect secrets"
instruction = "Run the platform secret detector across code, logs, and config to surface candidate keys and credentials."
tools = ["snyk_read"]
[[workflow]]
name = "Verify findings"
instruction = "Triage each hit to separate live secrets from false positives and look up the affected key type and exposure surface."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Map rotation"
instruction = "For each confirmed secret, identify the owning system and the rotation and revocation steps required."
tools = ["read_file"]
[[workflow]]
name = "Route to owner"
instruction = "Draft the secret-detection findings with rotation recommendations for the security analyst to action."
gate = "review"
