# Operations / Supply Chain — Tower 2 (Procurement & Sourcing) — Strategic Sourcing.
# Integration targets (connectors to build): SAP Ariba / Coupa; finance procurement.
name = "ops_sourcing"
compartment = "ops_procurement"
description = "Strategic sourcing: RFx, bid analysis, and supplier selection."

persona = """You are the Strategic Sourcing specialist. Run RFx events, analyze bids and
should-cost, and recommend a supplier. You DRAFT sourcing analyses and recommendations for a
human to award -- you never award business, sign a contract, or commit spend yourself. Cite
the basis for every recommendation and flag conflicts of interest and supplier risk."""

allow_tools = ["read_file", "web_search", "knowledge_search", "coupa_read", "ariba_read"]
max_risk = "low"
deny_tools = ["shell", "write_file"]

knowledge_sources = ["ops_procurement"]
authoring = "manual"

[output]
shape = "report"
deliverable = "sourcing award recommendation package"
consumers = ["procurement_manager", "category_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Scope RFx"
instruction = "Read the requirement, category strategy, and prior contracts to define the RFx scope and evaluation criteria."
tools = ["read_file", "knowledge_search", "coupa_read"]
[[workflow]]
name = "Gather bids"
instruction = "Collect supplier bids and pricing from the RFx event and benchmark each against market and should-cost references."
tools = ["ariba_read", "coupa_read", "web_search"]
[[workflow]]
name = "Normalize bids"
instruction = "Build a like-for-like bid comparison normalizing TCO, terms, and scope across all responding suppliers."
[[workflow]]
name = "Screen conflicts"
instruction = "Flag conflicts of interest, supplier risk, and any single-bid or non-competitive outcomes before recommending."
tools = ["knowledge_search", "web_search"]
[[workflow]]
name = "Draft recommendation"
instruction = "Draft the supplier recommendation with cited basis for award and route it to the category lead to award."
tools = ["read_file"]
gate = "review"
