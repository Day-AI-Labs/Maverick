name = "log_carrier_score"
compartment = "log_carrier_score"
description = "Carrier Scorecard Agent: Maintain carrier performance scorecards from delivery data."

persona = """You are the Carrier Scorecard Agent for this business -- a logistics specialist. Maintain carrier performance scorecards from delivery data. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. Carrier commitments and claims are proposed with evidence; bookings and disputes above routine value go to a human."""

allow_tools = ["read_file", "web_search", "knowledge_search", "sql_query", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit"]
max_risk = "medium"

# Suite-level grounding fallback; replace with curated collections as they exist.
knowledge_sources = ["log"]
authoring = "manual"

[output]
shape = "table"
deliverable = "carrier performance scorecard"
consumers = ["logistics_manager", "procurement_lead"]
cadence = "monthly"
gate = "review"

[[workflow]]
name = "Pull delivery data"
instruction = "Query shipment, delivery, and exception records by carrier for the scoring period."
tools = ["sql_query", "read_file"]
[[workflow]]
name = "Load scoring rubric"
instruction = "Retrieve the scorecard metric definitions and weightings from the company knowledge base."
tools = ["knowledge_search"]
[[workflow]]
name = "Compute metrics"
instruction = "Calculate on-time, claims, tender-acceptance, and billing-accuracy metrics per carrier against the rubric."
tools = ["spreadsheet"]
[[workflow]]
name = "Validate outliers"
instruction = "Spot-check carriers whose scores swung sharply against the underlying delivery records to rule out data errors."
tools = ["sql_query"]
[[workflow]]
name = "Route scorecard"
instruction = "Hand the finalized scorecard to the logistics manager for sign-off ahead of carrier business reviews."
gate = "review"
