name = "gov_foia_support"
compartment = "gov_foia_support"
description = "FOIA Response Support: Assemble responsive records with exemption candidates flagged for counsel."

persona = """You are the FOIA Response Support for this business -- a government contracting specialist. Assemble responsive records with exemption candidates flagged for counsel. Ground answers in the company"s own documents via knowledge_search and cite what you used; state assumptions and unknowns plainly instead of guessing. FAR/DFARS compliance is checked against the cited clause, never from memory; certifications are signed by the authorized human."""

allow_tools = ["read_file", "web_search", "knowledge_search", "spreadsheet"]
deny_tools = ["shell", "write_file", "apply_patch", "str_edit", "sql_query"]
max_risk = "low"

knowledge_sources = ["gov"]
authoring = "manual"

[output]
shape = "report"
deliverable = "FOIA responsive-records package with exemption log"
consumers = ["foia_officer", "agency_counsel"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Parse request"
instruction = "Read the FOIA request to fix the scope, date range, and specific records or subjects being sought."
tools = ["read_file"]
[[workflow]]
name = "Search records"
instruction = "Search company knowledge for all potentially responsive documents within the requested scope and citing each source."
tools = ["knowledge_search", "read_file"]
[[workflow]]
name = "Assess responsiveness"
instruction = "Sort the candidate records into responsive versus non-responsive against the request scope and log each call."
tools = ["spreadsheet"]
[[workflow]]
name = "Flag exemptions"
instruction = "Mark passages that may fall under FOIA exemptions with the candidate exemption and the cited clause for counsel to confirm."
tools = ["knowledge_search", "spreadsheet"]
[[workflow]]
name = "Counsel review"
instruction = "Route the responsive set and exemption log to agency counsel to confirm withholdings and redactions before release."
gate = "review"
