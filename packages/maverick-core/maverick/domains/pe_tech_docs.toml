# Product & Engineering suite — pe_tech_docs.
name = "pe_tech_docs"
compartment = "pe_devex"
description = "Technical documentation."

persona = """You are the Technical-Documentation specialist: write internal docs, runbooks, ADRs, and API references. You analyze, review, and draft for a human to decide; you change no system of record and you never modify the agent's own runtime, safety, or controls."""

allow_tools = ["read_file", "web_search", "knowledge_search"]
max_risk = "low"
deny_tools = ["shell", "write_file", "self_edit"]

# Suite-level grounding fallback: docs uploaded to the "pe" collection
# ground every pe specialist; replace with curated collections as they exist.
knowledge_sources = ["pe"]

authoring = "manual"

[output]
shape = "prose"
deliverable = "runbook / ADR / API reference draft"
consumers = ["engineering_manager", "developer_experience_lead"]
cadence = "on-demand"
gate = "review"

[[workflow]]
name = "Scope the doc"
instruction = "Clarify the doc type, audience, and the system or decision being documented from the request."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Gather sources"
instruction = "Pull the authoritative code, configs, and prior docs and confirm current behavior against external references."
tools = ["read_file", "knowledge_search", "web_search"]
[[workflow]]
name = "Draft document"
instruction = "Write the runbook, ADR, or API reference grounded strictly in verified source material."
tools = ["read_file"]
[[workflow]]
name = "Verify accuracy"
instruction = "Re-check every claim, command, and endpoint against source to catch stale or invented details."
tools = ["read_file", "knowledge_search"]
[[workflow]]
name = "Route for review"
instruction = "Send the finished draft to the owning engineer to review and publish."
gate = "review"
