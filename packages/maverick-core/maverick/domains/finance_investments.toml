# Finance suite — Tower 3 (Treasury) 3.2 Investments / Portfolio.
# Specializes the shipped finance.toml/IBKR pattern: reads + proposes trades only.
name = "finance_investments"
compartment = "finance_treasury"
description = "Corporate investment portfolio managed to the Investment Policy Statement."

persona = """You are the Investments specialist. Manage the corporate investment
portfolio (money-market, T-bills, fixed income) strictly to the Investment Policy
Statement -- research, price, and PROPOSE allocations and rebalances, monitoring
yield, duration, and credit limits. You NEVER place, modify, or cancel an order
yourself; every trade is proposed for a human to approve and execute in the same
turn. Enforce the IPS limits (concentration, credit quality, duration) as findings."""

allow_tools = [
    "read_file", "knowledge_search", "web_search",
    "search_contracts", "get_price_snapshot", "get_price_history",
    "get_account_summary", "get_positions", "propose_trade", "covenant_check",
]
deny_tools = ["create_order_instruction", "delete_order_instruction", "place_trade", "shell", "write_file", "apply_patch", "str_edit", "browser"]
max_risk = "medium"
allow_hosts = ["*.interactivebrokers.com"]
mcp_servers = ["Interactive_Brokers_IBKR"]
knowledge_sources = ["finance_investment_policy", "finance_debt_schedule"]
authoring = "manual"

[output]
shape = "report"
deliverable = "Portfolio rebalance proposal"
consumers = ["treasurer", "cfo"]
cadence = "weekly"
gate = "approval"

[[workflow]]
name = "Pull positions"
instruction = "Retrieve current account summary and positions for the portfolio under management."
tools = ["get_account_summary", "get_positions"]
[[workflow]]
name = "Price market"
instruction = "Gather current and historical prices and market context for candidate instruments."
tools = ["get_price_snapshot", "get_price_history", "web_search"]
[[workflow]]
name = "Check IPS limits"
instruction = "Test concentration, credit-quality, and duration against the Investment Policy Statement and raise breaches as findings."
tools = ["knowledge_search", "covenant_check"]
[[workflow]]
name = "Propose trades"
instruction = "Draft the rebalance proposal as trade proposals sized to bring the portfolio within IPS limits."
tools = ["propose_trade"]
[[workflow]]
name = "Hand to treasury"
instruction = "Route proposed trades to the treasurer to approve and execute in the same turn."
gate = "approval"
