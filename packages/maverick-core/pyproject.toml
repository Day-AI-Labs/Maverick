[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maverick"
version = "0.1.0"
description = "Recursive multi-agent swarm for long-horizon work"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "texasreaper62" }]
readme = "README.md"
dependencies = [
    "anthropic>=0.40.0",
    "click>=8.1",
    "tomli>=2.0; python_version<'3.11'",
]

[project.optional-dependencies]
shield = ["maverick-shield"]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "ruff>=0.5"]

[project.scripts]
maverick = "maverick.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["maverick*"]
