<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maverick</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #0b0e14;
        color: #e6e6e6;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash { text-align: center; max-width: 28rem; padding: 1rem; }
      .dot {
        width: 14px; height: 14px; border-radius: 50%;
        background: #f5a623; margin: 0 auto 1rem;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse { 50% { opacity: 0.25; } }
      h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 0.5rem; }
      p { font-size: 0.85rem; color: #9aa4b2; line-height: 1.5; margin: 0.25rem 0; }
      code { background: #1c2230; padding: 0.1rem 0.35rem; border-radius: 4px; }
      #hint { display: none; }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="dot"></div>
      <h1>Waiting for the local Maverick dashboard&hellip;</h1>
      <p>Connecting to <code>http://127.0.0.1:8765</code>.</p>
      <p id="hint">
        Still nothing after a few seconds &mdash; the shell could not start it
        for you. Install the CLI and run <code>maverick dashboard</code>, then
        this window will connect by itself.
      </p>
    </div>
    <script>
      // Poll the auth-exempt health endpoint; navigate once it answers.
      // The Rust shell may still be spawning `maverick dashboard`, so keep
      // trying and surface a hint if it never comes up.
      var DASH = "http://127.0.0.1:8765";
      var tries = 0;
      function probe() {
        tries += 1;
        if (tries > 8) {
          document.getElementById("hint").style.display = "block";
        }
        fetch(DASH + "/healthz", { cache: "no-store" })
          .then(function (res) {
            if (res.ok) {
              window.location.replace(DASH + "/");
            } else {
              setTimeout(probe, 700);
            }
          })
          .catch(function () { setTimeout(probe, 700); });
      }
      probe();
    </script>
  </body>
</html>
